  /* =====================================================================
   *  SECTION 3 — GENERATOR (pure functions, no React / no DOM)
   * =====================================================================
   *  generateBoard(config) -> a plain board object the UI can render.
   *  Kept entirely UI-free so the future stat tracker / other boards reuse it.
   * =================================================================== */

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Expand { fields:4, ... } into a flat shuffled array of resource keys.
  function buildResourcePool(tileCounts) {
    const pool = [];
    for (const [res, n] of Object.entries(tileCounts)) {
      for (let i = 0; i < n; i++) pool.push(res);
    }
    return shuffle(pool);
  }

  // For each hex index, the indices of its on-board, token-bearing neighbours.
  function buildAdjacency(hexes) {
    const index = new Map();
    hexes.forEach((h, i) => index.set(hexKey(h.q, h.r), i));
    return hexes.map((h) =>
      DIRECTIONS
        .map((d) => index.get(hexKey(h.q + d.q, h.r + d.r)))
        .filter((i) => i !== undefined)
    );
  }

  // Assign the token multiset to `hexes` so that no two red tokens (6/8) are
  // adjacent, plus any per-hex constraints supplied via `forbid(hex, value)`
  // (returns true if `value` is NOT allowed on `hex` — e.g. no reds on gold,
  // no low values on forest/pasture).
  //
  // Hexes with a pre-set `.lockedToken` value (Phase B+: locked small island
  // tokens, fixed-resource hexes that already carry a token) keep that value
  // and are excluded from `tokenSet`, but still participate in the adjacency
  // graph so the no-adjacent-red rule sees them.
  //
  // Fast path: rejection sampling. Guaranteed fallback: randomized backtracking.
  function placeTokens(hexes, tokenSet, redTokens, forbid) {
    const adj = buildAdjacency(hexes);
    const isRed = (v) => redTokens.includes(v);
    const forbidFn = forbid || (() => false);

    // Separate locked positions (already have a token) from unlocked ones.
    const lockedAt = [];   // [{ idx, value }]
    const openIdx = [];    // indices to fill from tokenSet
    hexes.forEach((h, i) => {
      if (h.lockedToken !== undefined && h.lockedToken !== null) {
        lockedAt.push({ idx: i, value: h.lockedToken });
      } else {
        openIdx.push(i);
      }
    });

    const writeLocked = (assignment) => {
      lockedAt.forEach(({ idx, value }) => { assignment[idx] = value; });
    };
    const valid = (assignment) =>
      assignment.every((v, i) =>
        !forbidFn(hexes[i], v) &&
        (!isRed(v) || adj[i].every((j) => !isRed(assignment[j])))
      );

    for (let attempt = 0; attempt < 2000; attempt++) {
      const shuffled = shuffle(tokenSet);
      const assignment = new Array(hexes.length).fill(null);
      writeLocked(assignment);
      openIdx.forEach((idx, j) => { assignment[idx] = shuffled[j]; });
      if (valid(assignment)) return assignment;
    }

    // Backtracking fallback — fills only the open positions, respecting locked
    // values in the adjacency check. Capped at MAX_STEPS so a pathologically
    // constrained scenario can never hang the UI; on cap we fall back to the
    // last-attempted shuffle (which the caller can re-attempt by regenerating).
    const tokens = shuffle(tokenSet);
    const tokIndices = tokens.map((_, i) => i); // pre-allocated once
    const used = new Array(tokens.length).fill(false);
    const assignment = new Array(hexes.length).fill(null);
    writeLocked(assignment);

    const order = shuffle(openIdx.slice());
    const MAX_STEPS = 200000;
    let steps = 0;
    let aborted = false;
    const bt = (k) => {
      if (aborted) return false;
      if (++steps > MAX_STEPS) { aborted = true; return false; }
      if (k === order.length) return true;
      const pos = order[k];
      const tokOrder = shuffle(tokIndices.slice());
      for (const ti of tokOrder) {
        if (used[ti]) continue;
        const v = tokens[ti];
        if (forbidFn(hexes[pos], v)) continue;
        if (isRed(v) && adj[pos].some((j) => assignment[j] !== null && isRed(assignment[j]))) {
          continue;
        }
        used[ti] = true;
        assignment[pos] = v;
        if (bt(k + 1)) return true;
        used[ti] = false;
        assignment[pos] = null;
      }
      return false;
    };
    if (bt(0)) return assignment;

    // Backtracking exhausted/aborted — fill any remaining open slots from the
    // unused tokens in shuffled order. May leave a few adjacent-red pairs in
    // degenerate cases, but never freezes; the user can press Regenerate.
    let ti = 0;
    for (const pos of order) {
      if (assignment[pos] !== null) continue;
      while (ti < tokens.length && used[ti]) ti++;
      if (ti >= tokens.length) break;
      assignment[pos] = tokens[ti];
      used[ti] = true;
      ti++;
    }
    return assignment;
  }

  function generateBoard(config) {
    // Seafarers boards carry an explicit per-hex `layout`; route them to the
    // island-aware generator. Base-game configs fall through unchanged.
    if (config.layout) return generateSeafarersBoard(config);

    // 1. Resources -> hexes
    const pool = buildResourcePool(config.tileCounts);
    const tiles = config.hexes.map((h, i) => ({
      q: h.q,
      r: h.r,
      resource: pool[i],
      token: null,
      red: false,
    }));

    // 2. Number tokens onto every non-desert hex (no adjacent reds)
    const tokenHexes = tiles.filter((t) => t.resource !== 'desert');
    const tokenValues = placeTokens(tokenHexes, config.numberTokens, config.redTokens);
    tokenHexes.forEach((t, i) => {
      t.token = tokenValues[i];
      t.red = config.redTokens.includes(tokenValues[i]);
    });

    // 3. Ports — randomize which type lands at each fixed perimeter slot.
    // Base game configs store ports in legacy land+my_dir form; convert to
    // the sea+user_dir form the Port component now expects.
    const types = shuffle(config.portTypes);
    const ports = config.portPositions.map((p, i) => ({ ...landPortToSea(p), type: types[i] }));

    // 4. Water frame (deterministic from the land layout)
    const water = waterRing(config.hexes);

    return { config, tiles, ports, water };
  }

  // Seafarers generator: an explicit per-hex layout with multiple islands and
  // a sea fill. Produces the SAME { config, tiles, ports, water } shape the
  // renderer already understands — water = sea hexes, tiles = everything else
  // (land / gold / fog / desert) — so no rendering rework is needed.
  function generateSeafarersBoard(config) {
    // 1. Resources for the randomized hexes. Two modes:
    //    (a) `assignTiles(layout) -> Map<key, resource>` for region-specific
    //        pools (Phase B scenarios — e.g. main vs small islands).
    //    (b) `randomTiles` count map, assigned sequentially from a single
    //        shuffled pool (Phase A demo, Four Islands, anywhere one pool fits).
    //    Fixed types ('gold' / 'fog' / 'desert' / explicit resource) pass through.
    const assignments = config.assignTiles ? config.assignTiles(config.layout) : null;
    let pool, pi = 0;
    if (!assignments) pool = buildResourcePool(config.randomTiles || {});

    const tiles = [];
    const sea = [];
    config.layout.forEach((h) => {
      if (h.type === 'sea') { sea.push({ q: h.q, r: h.r }); return; }
      let resource;
      if (h.type === 'random') {
        resource = assignments ? assignments.get(hexKey(h.q, h.r)) : pool[pi++];
      } else {
        resource = h.type; // gold/fog/desert/fixed resource (fields/forest/...)
      }
      // assignTiles or random pools may return 'sea' — treat those as ocean.
      if (resource === 'sea') { sea.push({ q: h.q, r: h.r }); return; }
      const hasLockedToken = h.token !== undefined && h.token !== null;
      const hasToken2 = h.token2 !== undefined && h.token2 !== null;
      // Lake hexes carry an embedded multi-disc token set baked into the tile
      // itself — exclude them from standard token placement and attach the
      // fixed numbers directly.
      const embedded = EMBEDDED_TOKENS[resource];
      tiles.push({
        q: h.q, r: h.r, resource,
        region: h.region, // present on type:'random' hexes; lets per-region token placement target them
        token: hasLockedToken ? h.token : null,
        token2: hasToken2 ? h.token2 : null, // Cloth for Catan: dual-token hex (second number)
        tokens: embedded ? embedded.slice() : null, // Lakes (lake_a / lake_b): fixed embedded discs
        red: hasLockedToken && config.redTokens.includes(h.token),
        red2: hasToken2 && config.redTokens.includes(h.token2),
        lockedToken: hasLockedToken ? h.token : undefined,
        noToken: !!h.noToken || !!embedded, // lakes carry embedded tokens, not standard
      });
    });

    // 2. Number tokens on every producing hex. Excluded: desert, fog, and
    //    hexes flagged `noToken` in the layout (e.g. Forgotten Tribe outer
    //    islands). Locked tokens (layout-supplied `token`) stay in place but
    //    still participate in the no-adjacent-red check via `placeTokens`.
    //    `config.forbidToken(tile, value)` adds scenario-specific constraints
    //    (e.g. no reds on gold, no low values on forest/pasture).
    //
    //    Per-island mode: when `config.tokensPerRegion` is set ({ region: [
    //    tokens...] }), each island's token list is shuffled into its own
    //    hexes independently — the spec for fog scenarios calls for this.
    const handledRegions = new Set();
    if (config.tokensPerRegion) {
      for (const [region, tokens] of Object.entries(config.tokensPerRegion)) {
        handledRegions.add(region);
        const regionHexes = tiles.filter((t) =>
          t.region === region && t.resource !== 'desert' && t.resource !== 'fog' && !t.noToken
        );
        if (regionHexes.length === 0) continue;
        const tokenValues = placeTokens(regionHexes, tokens, config.redTokens, config.forbidToken);
        regionHexes.forEach((t, i) => {
          if (t.lockedToken !== undefined) return;
          t.token = tokenValues[i];
          t.red = config.redTokens.includes(tokenValues[i]);
        });
      }
    }
    // `numberTokens` (single shared pool) — covers any producing hexes that
    // weren't placed via `tokensPerRegion`. Scenarios may use either or BOTH
    // (e.g. Fishing-on-Catan: fishing_grounds via per-region pool, all land
    // hexes via the single standard pool).
    if (config.numberTokens) {
      const tokenHexes = tiles.filter((t) =>
        t.resource !== 'desert' && t.resource !== 'fog' && !t.noToken &&
        !handledRegions.has(t.region) && t.token === null
      );
      if (tokenHexes.length > 0) {
        const tokenValues = placeTokens(tokenHexes, config.numberTokens, config.redTokens, config.forbidToken);
        tokenHexes.forEach((t, i) => {
          if (t.lockedToken !== undefined) return; // already set from layout
          t.token = tokenValues[i];
          t.red = config.redTokens.includes(tokenValues[i]);
        });
      }
    }

    // 3. Ports on sea hexes adjacent to land. Three input forms accepted:
    //    - number → autoPorts evenly distributes that many around the coast
    //    - [[q,r], ...] sea-hex coordinates → resolved to {q,r,dir} anchored
    //      on an adjacent land hex (each port faces the land it serves)
    //    - [{q,r,dir}, ...] already-resolved positions → used as-is.
    //    The renderer expects the {q,r,dir} form (q,r = the coastal LAND hex,
    //    dir = neighbour direction toward the sea hex hosting the port marker).
    const landCoords = tiles.map((t) => ({ q: t.q, r: t.r }));
    let positions;
    if (typeof config.ports === 'number') {
      // autoPorts returns land-anchored data; convert to sea+user_dir.
      positions = autoPorts(landCoords, config.ports).map(landPortToSea);
    } else {
      const landSet = new Set(tiles.map((t) => hexKey(t.q, t.r)));
      positions = config.ports.map((p) => {
        const coord = Array.isArray(p) ? { q: p[0], r: p[1] } : p;
        // Phase D: explicit {q,r,dir} (sea+user_dir) — use directly.
        if (coord.dir !== undefined) return coord;
        // Legacy fallback: resolve adjacent land then convert.
        const landP = resolveSeaPort(coord, landSet);
        return landP ? landPortToSea(landP) : null;
      }).filter(Boolean);
    }
    const types = shuffle(config.portTypes);
    const ports = positions.map((p, i) => ({ ...p, type: types[i] }));

    // SHIP ROUTES (future Seafarers phase): players build ship routes along sea
    // edges between coastal settlements. The generator would attach a
    // `shipRoutes` array here (e.g. { from:{q,r,corner}, to:{q,r,corner} }), and
    // <Board> would render a <ShipRoutes> layer for it — above the water,
    // below the ports. (See the matching note in <Board>.)

    return { config, tiles, ports, water: sea };
  }


  /* =====================================================================
   *  SECTION 4 — UI COMPONENTS (React + SVG)
   * =====================================================================
   *  Components only READ the board object produced above. All randomness
   *  and game rules live in Section 3.
   * =================================================================== */

  const HEX_SIZE = 46; // circumradius in SVG units

  // Standard Catan pip count for a number (dots under the token).
  const pipCount = (n) => 6 - Math.abs(7 - n);

  function NumberToken({ cx, cy, value, red }) {
    const r = HEX_SIZE * 0.42;
    const textColor = red ? '#c01818' : '#1b1b1b';
    const pips = pipCount(value);
    const pipR = 1.5;
    const gap = 4.5;
    const startX = cx - ((pips - 1) * gap) / 2;
    return (
      <g>
        <circle cx={cx} cy={cy} r={r} fill="#f2e6c7" stroke="#3a2f1c" strokeWidth="1" />
        <text
          x={cx}
          y={cy - 2}
          textAnchor="middle"
          dominantBaseline="central"
          fontSize={HEX_SIZE * 0.42}
          fontWeight="700"
          fill={textColor}
        >
          {value}
        </text>
        {Array.from({ length: pips }).map((_, i) => (
          <circle key={i} cx={startX + i * gap} cy={cy + r * 0.55} r={pipR} fill={textColor} />
        ))}
      </g>
    );
  }

  // Cloth for Catan: hexes that produce on either of two numbers. Numbers
  // stack vertically inside a slightly taller token area; each keeps the
  // standard red colour for 6/8 and its pip dots beneath.
  // Cloth-for-Catan dual-token hex: renders two separate side-by-side number
  // discs, each looking like a standalone Catan chit (circle + number + pips).
  // Replaces the earlier ellipse-with-divider style so dual-token hexes read
  // as "two different discs" instead of "one disc split in half".
  function DualNumberToken({ cx, cy, value, value2, red, red2 }) {
    const r = HEX_SIZE * 0.30;
    const dx = r * 1.05;   // half the center-to-center horizontal separation
    const colorA = red  ? '#c01818' : '#1b1b1b';
    const colorB = red2 ? '#c01818' : '#1b1b1b';
    const fontSize = HEX_SIZE * 0.24;
    const pipR = 1.0;
    const pipGap = 2.4;
    const pipsA = pipCount(value);
    const pipsB = pipCount(value2);
    const startXA = (cx - dx) - ((pipsA - 1) * pipGap) / 2;
    const startXB = (cx + dx) - ((pipsB - 1) * pipGap) / 2;
    const pipY = cy + r * 0.5;
    return (
      <g>
        {/* Left disc */}
        <circle cx={cx - dx} cy={cy} r={r} fill="#f2e6c7" stroke="#3a2f1c" strokeWidth="1" />
        <text x={cx - dx} y={cy - r * 0.12} textAnchor="middle" dominantBaseline="central"
          fontSize={fontSize} fontWeight="700" fill={colorA}>{value}</text>
        {Array.from({ length: pipsA }).map((_, i) => (
          <circle key={`a${i}`} cx={startXA + i * pipGap} cy={pipY} r={pipR} fill={colorA} />
        ))}
        {/* Right disc */}
        <circle cx={cx + dx} cy={cy} r={r} fill="#f2e6c7" stroke="#3a2f1c" strokeWidth="1" />
        <text x={cx + dx} y={cy - r * 0.12} textAnchor="middle" dominantBaseline="central"
          fontSize={fontSize} fontWeight="700" fill={colorB}>{value2}</text>
        {Array.from({ length: pipsB }).map((_, i) => (
          <circle key={`b${i}`} cx={startXB + i * pipGap} cy={pipY} r={pipR} fill={colorB} />
        ))}
      </g>
    );
  }

  // Multi-disc number token — renders an array of discs in a layout that
  // depends on count. Used for Fishing-on-Catan lake hexes (lake_a has 4
  // embedded discs, lake_b has 2). Each disc honours the standard red-token
  // colour rule via `reds`.
  function MultiNumberToken({ cx, cy, values, reds }) {
    if (!values || values.length === 0) return null;
    if (values.length === 1) {
      return <NumberToken cx={cx} cy={cy} value={values[0]} red={reds && reds[0]} />;
    }
    const small = HEX_SIZE * 0.24; // small disc radius
    const fontSize = HEX_SIZE * 0.22;
    // 2 discs: side-by-side. 3+ discs: 2-row grid (top row first).
    const layout2 = [
      { dx: -small * 1.2, dy: 0 },
      { dx:  small * 1.2, dy: 0 },
    ];
    const layout4 = [
      { dx: -small * 1.2, dy: -small * 1.2 },
      { dx:  small * 1.2, dy: -small * 1.2 },
      { dx: -small * 1.2, dy:  small * 1.2 },
      { dx:  small * 1.2, dy:  small * 1.2 },
    ];
    const layout = values.length === 2 ? layout2 : layout4;
    return (
      <g>
        {values.map((v, i) => {
          const pos = layout[i] || { dx: 0, dy: 0 };
          const red = !!(reds && reds[i]);
          const color = red ? '#c01818' : '#1b1b1b';
          return (
            <g key={i}>
              <circle cx={cx + pos.dx} cy={cy + pos.dy} r={small}
                fill="#f2e6c7" stroke="#3a2f1c" strokeWidth="1" />
              <text x={cx + pos.dx} y={cy + pos.dy} textAnchor="middle" dominantBaseline="central"
                fontSize={fontSize} fontWeight="700" fill={color}>{v}</text>
            </g>
          );
        })}
      </g>
    );
  }

  // Wavy river path drawn across a hex from one side to the opposite side.
  // Used for `_river` tile variants in Rivers of Catan.
  function riverPath(cx, cy, size) {
    // Span from the west corner to the east corner (corners 3 and 0).
    const c3 = hexCorner(cx, cy, size, 3);
    const c0 = hexCorner(cx, cy, size, 0);
    const dx = c0.x - c3.x;
    const my = (c3.y + c0.y) / 2;
    const amp = size * 0.18;
    // Cubic-like wavy curve through 4 control points.
    return [
      `M ${c3.x} ${my}`,
      `C ${c3.x + dx * 0.25} ${my - amp},`,
      `  ${c3.x + dx * 0.25} ${my + amp},`,
      `  ${c3.x + dx * 0.5} ${my}`,
      `C ${c3.x + dx * 0.75} ${my - amp},`,
      `  ${c3.x + dx * 0.75} ${my + amp},`,
      `  ${c0.x} ${my}`,
    ].join(' ');
  }

  function Hex({ tile }) {
    const meta = RESOURCES[tile.resource];
    const { x, y } = axialToPixel(tile.q, tile.r, HEX_SIZE);

    // Fog hex (Seafarers): rendered face-down — hidden terrain shown as a
    // tile back with a "?" until it's revealed during play.
    if (tile.resource === 'fog') {
      return (
        <g>
          <polygon points={hexPolygonPoints(x, y, HEX_SIZE)} fill={meta.color}
            stroke="#9ca3af" strokeWidth="1.5" strokeDasharray="4 3" strokeLinejoin="round" />
          <text x={x} y={y} textAnchor="middle" dominantBaseline="central"
            fontSize={HEX_SIZE * 0.7} fontWeight="700" fill="#d1d5db">?</text>
          <title>Fog tile — revealed when a road or ship reaches an adjacent intersection</title>
        </g>
      );
    }

    return (
      <g>
        <polygon
          points={hexPolygonPoints(x, y, HEX_SIZE)}
          fill={meta.color}
          stroke="#0c1116"
          strokeWidth="2"
          strokeLinejoin="round"
        />
        {/* River overlay for *_river tile variants. */}
        {meta.river && (
          <path d={riverPath(x, y, HEX_SIZE)} fill="none"
            stroke="#7fc4ec" strokeWidth="3" strokeLinecap="round" opacity="0.85" />
        )}
        <text
          x={x}
          y={y - HEX_SIZE * 0.6}
          textAnchor="middle"
          dominantBaseline="central"
          fontSize="11"
          fontWeight="600"
          fill="rgba(0,0,0,0.62)"
        >
          {meta.label}
        </text>
        {/* Gold field: star marks "produces any resource". */}
        {tile.resource === 'gold' && (
          <text x={x} y={y - HEX_SIZE * 0.32} textAnchor="middle" dominantBaseline="central"
            fontSize="13" fill="rgba(0,0,0,0.6)">★</text>
        )}
        {/* Fishing grounds: small fish glyph above the token. */}
        {tile.resource === 'fishing_grounds' && (
          <text x={x} y={y - HEX_SIZE * 0.3} textAnchor="middle" dominantBaseline="central"
            fontSize="16" fill="rgba(255,255,255,0.85)">🐟</text>
        )}
        {/* Special-tile glyph (castle / quarry / glassworks / watering hole). */}
        {meta.glyph && (
          <text x={x} y={y + HEX_SIZE * 0.05} textAnchor="middle" dominantBaseline="central"
            fontSize={HEX_SIZE * 0.6} fill="rgba(0,0,0,0.7)">{meta.glyph}</text>
        )}
        {/* Lake: render embedded multi-disc tokens (lake_a = 4 discs, lake_b = 2). */}
        {tile.tokens && tile.tokens.length > 0 ? (
          <MultiNumberToken cx={x} cy={y + HEX_SIZE * 0.05}
            values={tile.tokens}
            reds={tile.tokens.map((v) => v === 6 || v === 8)} />
        ) : tile.token !== null && tile.token2 !== null && tile.token2 !== undefined ? (
          <DualNumberToken cx={x} cy={y + HEX_SIZE * 0.05}
            value={tile.token} value2={tile.token2} red={tile.red} red2={tile.red2} />
        ) : tile.token !== null ? (
          <NumberToken cx={x} cy={y + HEX_SIZE * 0.05} value={tile.token} red={tile.red} />
        ) : null}
      </g>
    );
  }

  // Port direction convention (user spec, Phase D):
  //   port.{q,r} = the SEA hex hosting the port marker
  //   port.dir   = direction (0..5) from sea center toward the adjacent land:
  //                0=E  1=SE  2=SW  3=W  4=NW  5=NE   (60° per step)
  // The wedge points toward the land hex; docks run from the marker to the two
  // corners of that edge. No adjacent-land auto-detection — data drives this.
  function Port({ port }) {
    const meta = PORTS_META[port.type];
    if (port.dir === undefined || port.dir === null) {
      console.warn('Port missing direction at', port.q, port.r); // data error per spec
      return null;
    }
    const { x: cx, y: cy } = axialToPixel(port.q, port.r, HEX_SIZE);

    // The edge in `dir` direction is bounded by hex corners (dir) and (dir+1).
    const cA = hexCorner(cx, cy, HEX_SIZE, port.dir);
    const cB = hexCorner(cx, cy, HEX_SIZE, (port.dir + 1) % 6);

    // Marker sits slightly offset from the sea center toward the land edge.
    const angle = port.dir * (Math.PI / 3);
    const markerOffset = HEX_SIZE * 0.18;
    const mx = cx + Math.cos(angle) * markerOffset;
    const my = cy + Math.sin(angle) * markerOffset;
    const rad = HEX_SIZE * 0.42;

    return (
      <g>
        <line x1={mx} y1={my} x2={cA.x} y2={cA.y} stroke="#c9a35b" strokeWidth="2.5" strokeLinecap="round" />
        <line x1={mx} y1={my} x2={cB.x} y2={cB.y} stroke="#c9a35b" strokeWidth="2.5" strokeLinecap="round" />
        <circle cx={mx} cy={my} r={rad} fill={meta.color} stroke="#0c1116" strokeWidth="2" />
        {port.type === '3:1' ? (
          <text x={mx} y={my} textAnchor="middle" dominantBaseline="central"
            fontSize="13" fontWeight="700" fill="#f7f7f7">
            3:1
          </text>
        ) : (
          <g>
            <text x={mx} y={my - 4} textAnchor="middle" dominantBaseline="central"
              fontSize="11" fontWeight="700" fill="#f7f7f7">
              {meta.label}
            </text>
            <text x={mx} y={my + 8} textAnchor="middle" dominantBaseline="central"
              fontSize="10" fontWeight="700" fill="#f7f7f7">
              2:1
            </text>
          </g>
        )}
      </g>
    );
  }

  function WaterHex({ hex }) {
    const { x, y } = axialToPixel(hex.q, hex.r, HEX_SIZE);
    return (
      <polygon
        points={hexPolygonPoints(x, y, HEX_SIZE)}
        fill={RESOURCES.water.color}
        stroke="#0c1116"
        strokeWidth="2"
        strokeLinejoin="round"
      />
    );
  }

  function Board({ board }) {
    // Fit the viewBox to the water frame (the outermost layer) plus a margin
    // for the hex corners. Ports sit on the water ring, so they're covered too.
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    [...board.water, ...board.tiles].forEach((h) => {
      const { x, y } = axialToPixel(h.q, h.r, HEX_SIZE);
      minX = Math.min(minX, x); maxX = Math.max(maxX, x);
      minY = Math.min(minY, y); maxY = Math.max(maxY, y);
    });
    const pad = HEX_SIZE * 1.2;
    const vbX = minX - pad;
    const vbY = minY - pad;
    const vbW = (maxX - minX) + pad * 2;
    const vbH = (maxY - minY) + pad * 2;

    return (
      <svg viewBox={`${vbX} ${vbY} ${vbW} ${vbH}`} role="img" aria-label="Catan board">
        {board.water.map((w) => <WaterHex key={hexKey(w.q, w.r)} hex={w} />)}
        {/* SHIP ROUTES (future Seafarers phase) render HERE — above the water
            and below the land/ports — e.g. {board.shipRoutes?.map(...)}. */}
        {board.tiles.map((t) => <Hex key={hexKey(t.q, t.r)} tile={t} />)}
        {board.ports.map((p, i) => <Port key={i} port={p} />)}
      </svg>
    );
  }

  // Legend shows only the hex types present on the current board (so Seafarers
  // adds Gold/Fog automatically). For the base game this yields the same
  // six terrains + Water as before.
  function Legend({ board }) {
    const present = new Set(board.tiles.map((t) => t.resource));
    const order = [
      'fields', 'forest', 'pasture', 'mountains', 'hills', 'desert', 'gold', 'fog',
      // Traders & Barbarians + Fishing types:
      'mountain_river', 'hills_river', 'pasture_river', 'swamp_river',
      'lake_a', 'lake_b', 'fishing_grounds',
      'watering_hole', 'castle', 'quarry', 'glassworks',
    ];
    const items = order.filter((k) => present.has(k));
    // Collapse lake_a + lake_b into one "Lake" legend entry when both present.
    const dedup = [];
    const seen = new Set();
    items.forEach((k) => {
      const label = RESOURCES[k].label;
      if (seen.has(label)) return;
      seen.add(label);
      dedup.push(k);
    });
    dedup.push('water');
    return (
      <div className="legend">
        {dedup.map((k) => (
          <span key={k}>
            <i style={{ background: RESOURCES[k].color }} />
            {RESOURCES[k].label}
          </span>
        ))}
      </div>
    );
  }

  // "Set Up Your Board" — physical tiles + number-token chits for the current
  // map. Counts are read off the generated board, so it refreshes on every
  // regenerate / board switch. Tiles listed in physical-setup order.
  function SetupList({ board }) {
    const tileCounts = {};
    board.tiles.forEach((t) => { tileCounts[t.resource] = (tileCounts[t.resource] || 0) + 1; });

    // "Number Tokens" — standard land discs only. Fishing-grounds discs come
    // from a separate pool and are listed under their own heading; lake hexes
    // carry embedded discs printed on the tile itself (not chits).
    const tokenCounts = {};
    board.tiles.forEach((t) => {
      if (t.token !== null && t.resource !== 'fishing_grounds') {
        tokenCounts[t.token] = (tokenCounts[t.token] || 0) + 1;
      }
    });
    const tokenOrder = Object.keys(tokenCounts).map(Number).sort((a, b) => a - b);

    const TILE_ORDER = [
      'forest', 'pasture', 'fields', 'hills', 'mountains', 'desert', 'gold', 'fog',
      // Traders & Barbarians + Fishing types:
      'mountain_river', 'hills_river', 'pasture_river', 'swamp_river',
      'lake_a', 'lake_b', 'fishing_grounds',
      'watering_hole', 'castle', 'quarry', 'glassworks',
    ];
    const rows = TILE_ORDER
      .filter((k) => tileCounts[k])
      .map((k) => ({ key: k, ...RESOURCES[k], qty: tileCounts[k] }));

    // Port markers are now sea-anchored (Phase D): port.{q,r} IS the sea hex
    // hosting the marker. Split the water frame into plain water vs. those
    // "Port Hex" tiles (a separate 3D print).
    const portHexKeys = new Set(board.ports.map((p) => hexKey(p.q, p.r)));
    const portHexCount = board.water.filter((w) => portHexKeys.has(hexKey(w.q, w.r))).length;
    rows.push({ key: 'water', ...RESOURCES.water, qty: board.water.length - portHexCount });
    rows.push({ key: 'portHex', ...RESOURCES.portHex, qty: portHexCount });

    return (
      <div className="setup">
        <h2>Set Up Your Board</h2>
        <div className="setup-group">
          <h3>Tiles</h3>
          <ul>
            {rows.map((row) => (
              <li key={row.key}>
                <span className="name">
                  <i className="swatch" style={{ background: row.color }} />
                  {row.setup}
                </span>
                <span className="qty">×{row.qty}</span>
              </li>
            ))}
          </ul>
        </div>
        <div className="setup-group">
          <h3>Number Tokens</h3>
          <p className="tokens-line">
            {tokenOrder.map((n) => `${n} ×${tokenCounts[n]}`).join(',  ')}
          </p>
        </div>
        {board.config?.fishingTokens && (
          <div className="setup-group">
            <h3>Fishing Tokens</h3>
            <p className="tokens-line">{board.config.fishingTokens.join(', ')}</p>
          </div>
        )}
        {board.config?.fogPool && (
          <div className="setup-group">
            <h3>Fog Pool (face-down)</h3>
            <ul>
              {Object.entries(board.config.fogPool)
                .filter(([, n]) => n > 0)
                .map(([k, n]) => (
                  <li key={k}>
                    <span className="name">
                      <i className="swatch" style={{ background: RESOURCES[k].color }} />
                      {RESOURCES[k].setup || RESOURCES[k].label}
                    </span>
                    <span className="qty">×{n}</span>
                  </li>
                ))}
            </ul>
            <h3 style={{ marginTop: 14 }}>Fog Tokens (place when revealed)</h3>
            <p className="tokens-line">{board.config.fogTokens.join(', ')}</p>
          </div>
        )}
      </div>
    );
  }

  /* =====================================================================
   *  STAT TRACKER — persistence + helpers
   * =====================================================================
   *  localStorage shape:
   *    "catan_roster"      — array<{id, name, color, isGuest}>
   *    "catan_active_game" — single in-progress game object (or null)
   *    "catan_games"       — array of completed game objects
   *
   *  All helpers are pure JS — no React deps — so they can be reused by the
   *  GAME and stats screens added in Phases B/C.
   * =================================================================== */

  const ROSTER_KEY = 'catan_roster';
  const ACTIVE_GAME_KEY = 'catan_active_game';
  const GAMES_KEY = 'catan_games';

  // Eight pre-set player colours (spec list, in order).
  const PLAYER_COLORS = [
    { name: 'Red',    hex: '#E63946' },
    { name: 'Blue',   hex: '#457B9D' },
    { name: 'Green',  hex: '#2D6A4F' },
    { name: 'Yellow', hex: '#E9C46A' },
    { name: 'Orange', hex: '#F4A261' },
    { name: 'Brown',  hex: '#9B2226' },
    { name: 'Purple', hex: '#6A4C93' },
    { name: 'White',  hex: '#F1FAEE' },
  ];

  // Safe JSON read with a default. localStorage may throw under privacy
  // settings, so wrap every access.
  function lsRead(key, fallback) {
    try {
      const v = window.localStorage.getItem(key);
      return v == null ? fallback : JSON.parse(v);
    } catch { return fallback; }
  }
  function lsWrite(key, value) {
    try { window.localStorage.setItem(key, JSON.stringify(value)); } catch {}
  }
  function lsDelete(key) {
    try { window.localStorage.removeItem(key); } catch {}
  }

  function loadRoster()   { return lsRead(ROSTER_KEY, []); }
  function saveRoster(r)  { lsWrite(ROSTER_KEY, r); }
  function loadGames()    { return lsRead(GAMES_KEY, []); }
  function saveGames(g)   { lsWrite(GAMES_KEY, g); }
  function loadActiveGame()  { return lsRead(ACTIVE_GAME_KEY, null); }
  function saveActiveGame(g) { lsWrite(ACTIVE_GAME_KEY, g); }
  function clearActiveGame() { lsDelete(ACTIVE_GAME_KEY); }

  // Random-enough id for placements / players / games.
  function makeId(prefix) {
    return `${prefix || 'id'}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 7)}`;
  }

  // 2/12 post-processor — mutates the generated board so that every hex
  // currently showing token 2 OR token 12 displays a combined 2/12 disc via
  // the existing DualNumberToken (tile.token=2, tile.token2=12). Hex count
  // and pool size are unchanged; only the visual + production-rule changes.
  // For stat tracking: a hex with token2=12 produces on both 2 and 12 rolls.
  function applyDoubledisc(board) {
    if (!board) return board;
    board.tiles.forEach((t) => {
      if (t.token === 2 || t.token === 12) {
        t.token = 2;
        t.token2 = 12;
        t.red = false;
        t.red2 = false;
      }
    });
    return board;
  }

  // Helper: does this board config support the 2/12 toggle? Only base game
  // boards (which carry the standard 2/12 in their token pool) make sense.
  function supportsDoubledisc(config) {
    if (!config || !config.numberTokens) return false;
    return config.numberTokens.includes(2) && config.numberTokens.includes(12);
  }

  // Game-state helpers used by GameScreen + post-game / lifetime stats.
  // All take a `game` object (see saveActiveGame schema) and return derived
  // data — none mutate.

  // Initial blank game built from the SETUP + MAP_GEN flow.
  function createGame(flowData) {
    const players = flowData.players.map((p, i) => ({
      id: p.id, name: p.name, color: p.color, isGuest: !!p.isGuest, turnOrder: i,
    }));
    const firstIdx = Math.max(0, players.findIndex((p) => p.id === flowData.firstPlayerId));
    const meta = flowData.boardMeta || {};
    return {
      id: makeId('game'),
      date: new Date().toISOString(),
      status: 'active',
      expansion: {
        category: meta.category || 'base',
        boardId: meta.baseId || null,
        name: meta.configName || 'Base Game',
      },
      vpTarget: flowData.vpTarget || 10,
      useDoubledisc: !!flowData.useDoubledisc,
      players,
      board: flowData.board,
      firstPlayerId: flowData.firstPlayerId,
      currentTurn: 1,
      currentPlayerIndex: firstIdx,
      rolls: [],
      robberEvents: [],
      placements: [],
      largestArmy: null,
      longestRoad: null,
      strongestPortsTrophy: null,
      devCardVPs: Object.fromEntries(players.map((p) => [p.id, 0])),
      scores: {},
      winner: null,
      totalTurns: 0,
    };
  }

  // User-spec direction (0=E,1=SE,2=SW,3=W,4=NW,5=NE) → my internal
  // DIRECTIONS index (0=E,1=NE,2=NW,3=W,4=SW,5=SE).
  const USER_TO_MY_DIR = [0, 5, 4, 3, 2, 1];

  // Set of hexKeys that have a port at one of their edges (the "port-adjacent
  // hex" the spec talks about — i.e. the land hex a port faces / serves).
  function portAdjacentHexKeys(board) {
    const set = new Set();
    if (!board?.ports) return set;
    for (const port of board.ports) {
      if (port.dir === undefined || port.dir === null) continue;
      const d = DIRECTIONS[USER_TO_MY_DIR[port.dir]];
      set.add(hexKey(port.q + d.q, port.r + d.r));
    }
    return set;
  }

  // Per-player VP earned by placing settlements/cities on port-adjacent hexes.
  // A placement counts once (1 for settlement, 2 for city) if ANY of its
  // touched hexes is port-adjacent.
  function computePortPieceVPs(game) {
    const out = {};
    if (!game?.players) return out;
    game.players.forEach((p) => { out[p.id] = 0; });
    if (!game.board || !game.placements) return out;
    const portHexes = portAdjacentHexKeys(game.board);
    if (portHexes.size === 0) return out;
    game.placements.forEach((pl) => {
      if (pl.type === 'road') return;
      if (!pl.hexKeys.some((k) => portHexes.has(k))) return;
      out[pl.playerId] += pl.type === 'city' ? 2 : 1;
    });
    return out;
  }

  // Per-player auto-calculated VP totals (settlements + cities + achievements
  // + dev card VPs). Used live during the game and at end-game.
  function computeVP(game) {
    const out = {};
    if (!game?.players) return out;
    const placements = game.placements || [];
    game.players.forEach((p) => {
      const mine = placements.filter((pl) => pl.playerId === p.id);
      let vp = 0;
      vp += mine.filter((x) => x.type === 'settlement').length;
      vp += mine.filter((x) => x.type === 'city').length * 2;
      if (game.largestArmy === p.id) vp += 2;
      if (game.longestRoad === p.id) vp += 2;
      if (game.strongestPortsTrophy === p.id) vp += 2;
      vp += (game.devCardVPs?.[p.id] || 0);
      out[p.id] = vp;
    });
    return out;
  }

  // Player who currently qualifies for the Strongest Ports Trophy — first to
  // reach 3 port-VPs. Returns null if no one qualifies.
  function detectPortsTrophy(game) {
    const portVPs = computePortPieceVPs(game);
    for (const p of game.players) {
      if ((portVPs[p.id] || 0) >= 3) return p.id;
    }
    return null;
  }

  // Per-player resource production: replay every roll and tally adjacent
  // hex production. Settlements add 1; cities add 2. Handles dual-token
  // (2/12 disc) hexes via the existing tile.token2 field.
  const HEX_RESOURCE = {
    forest: 'wood', hills: 'brick', fields: 'wheat', mountains: 'ore', pasture: 'wool',
  };
  function computeResourceProduction(game) {
    const out = {};
    if (!game?.players) return out;
    game.players.forEach((p) => {
      out[p.id] = { wood: 0, brick: 0, wheat: 0, ore: 0, wool: 0 };
    });
    if (!game.board || !game.rolls || !game.placements) return out;
    const byKey = {};
    game.board.tiles.forEach((t) => { byKey[hexKey(t.q, t.r)] = t; });
    game.rolls.forEach((roll) => {
      const total = roll.total;
      game.placements.forEach((pl) => {
        if (pl.type === 'road') return;
        const mult = pl.type === 'city' ? 2 : 1;
        pl.hexKeys.forEach((hk) => {
          const tile = byKey[hk];
          if (!tile) return;
          const produces = tile.token === total || tile.token2 === total;
          if (!produces) return;
          const res = HEX_RESOURCE[tile.resource];
          if (!res) return;
          out[pl.playerId][res] += mult;
        });
      });
    });
    return out;
  }

  // Probabilities of each total (2..12) for two fair d6, used for the live
  // dist chart overlay and the luck score.
  const ROLL_PROBABILITY = {
    2: 1/36, 3: 2/36, 4: 3/36, 5: 4/36, 6: 5/36,
    7: 6/36, 8: 5/36, 9: 4/36, 10: 3/36, 11: 2/36, 12: 1/36,
  };

  // Player resource-production expected value over the whole game. Used as
  // the denominator for the luck score (Phase C).
  function computeExpectedProduction(game) {
    const out = {};
    if (!game?.players) return out;
    game.players.forEach((p) => { out[p.id] = 0; });
    if (!game.board || !game.placements || !game.rolls) return out;
    const totalRolls = game.rolls.length;
    if (totalRolls === 0) return out;
    const byKey = {};
    game.board.tiles.forEach((t) => { byKey[hexKey(t.q, t.r)] = t; });
    game.placements.forEach((pl) => {
      if (pl.type === 'road') return;
      const mult = pl.type === 'city' ? 2 : 1;
      pl.hexKeys.forEach((hk) => {
        const tile = byKey[hk];
        if (!tile) return;
        if (!HEX_RESOURCE[tile.resource]) return;
        let p = (ROLL_PROBABILITY[tile.token] || 0);
        if (tile.token2) p += (ROLL_PROBABILITY[tile.token2] || 0);
        out[pl.playerId] += p * mult * totalRolls;
      });
    });
    return out;
  }

  // Per-player luck: actual resource production / expected. 1.0 = neutral.
  function computeLuckScores(game) {
    const out = {};
    if (!game?.players) return out;
    const prod = computeResourceProduction(game);
    const expected = computeExpectedProduction(game);
    game.players.forEach((p) => {
      const actual = Object.values(prod[p.id] || {}).reduce((a, b) => a + b, 0);
      const exp = expected[p.id] || 0;
      out[p.id] = exp > 0 ? actual / exp : null;
    });
    return out;
  }

  // Land/producing hexes from a board (filters out water, desert, sea, fog).
  function producingHexes(board) {
    if (!board?.tiles) return [];
    return board.tiles.filter((t) => HEX_RESOURCE[t.resource] && (t.token != null || t.token2 != null));
  }

  // Roll-distribution count: { 2: n, 3: n, ..., 12: n } from a game's rolls.
  function rollDistribution(rolls) {
    const out = {};
    for (let i = 2; i <= 12; i++) out[i] = 0;
    (rolls || []).forEach((r) => { out[r.total] = (out[r.total] || 0) + 1; });
    return out;
  }

  /* =====================================================================
   *  GeneratorView — the map-generator UI that was previously the entire App.
   * =====================================================================
   *  Lives inside MapGenScreen (during stat-tracker game flow) and inside
   *  HomeScreen via the "Just generate a map" path. Accepts optional props
   *  to lock the player count (used when the surrounding stat-tracker flow
   *  already knows how many players are playing).
   *
   *  Props:
   *    showDoubledisc — boolean. If true, surface the 2/12 disc checkbox for
   *      base-game configs that support it.
   *    onBoardChange  — (board, meta) => void. Notify the parent whenever
   *      the board, useDoubledisc flag, or config changes. Lets the
   *      stat-tracker flow know which board the user "approved".
   *    initial — { category, baseId, sfKey, sfCount, tbKey, tbCount,
   *      useDoubledisc } — initial state. Persists between MAP_GEN re-entries.
   * =================================================================== */
  function GeneratorView({ showDoubledisc = false, onBoardChange, initial }) {
    const init = initial || {};
    const [category, setCategory] = React.useState(init.category || 'base');
    const [baseId, setBaseId] = React.useState(init.baseId || BOARDS[0].id);
    const [sfKey,   setSfKey]   = React.useState(init.sfKey   || SEAFARERS_CHOICES[0].key);
    const [sfCount, setSfCount] = React.useState(init.sfCount || null);
    const [tbKey,   setTbKey]   = React.useState(init.tbKey   || TRADERS_CHOICES[0].key);
    const [tbCount, setTbCount] = React.useState(init.tbCount || null);
    const [useDoubledisc, setUseDoubledisc] = React.useState(!!init.useDoubledisc);

    const isTrad = category === 'traders';
    const choices = isTrad ? TRADERS_CHOICES : SEAFARERS_CHOICES;
    const byKey   = isTrad ? TRADERS_BY_KEY  : SEAFARERS_BY_KEY;
    const scenarioKey = isTrad ? tbKey   : sfKey;
    const playerCount = isTrad ? tbCount : sfCount;
    const currentScenario = byKey[scenarioKey];
    const currentCount = currentScenario.counts.find((c) => c.label === playerCount);
    const scenarioId = currentCount ? currentCount.id : null;

    const buildConfig = (cat, bId, sId) => {
      if (cat === 'base') return BOARDS.find((b) => b.id === bId);
      if (cat === 'seafarers') return sId ? seafarersConfig(sId) : null;
      if (cat === 'traders')   return sId ? tradersConfig(sId)   : null;
      return null;
    };

    const generateWithToggle = (cfg, dbl) => {
      if (!cfg) return null;
      const b = generateBoard(cfg);
      return dbl && supportsDoubledisc(cfg) ? applyDoubledisc(b) : b;
    };

    const [board, setBoard] = React.useState(() =>
      generateWithToggle(buildConfig('base', init.baseId || BOARDS[0].id), !!init.useDoubledisc)
    );

    // Surface every board change to the parent so it can capture the
    // "approved" board for downstream screens (GAME).
    React.useEffect(() => {
      if (!onBoardChange) return;
      const cfg = buildConfig(category, baseId, scenarioId);
      onBoardChange(board, {
        category, baseId, sfKey, sfCount, tbKey, tbCount, useDoubledisc,
        scenarioId, configName: cfg?.name,
      });
    }, [board, useDoubledisc]); // eslint-disable-line

    const regen = (cat, bId, sId, dbl) => {
      const cfg = buildConfig(cat, bId, sId);
      setBoard(generateWithToggle(cfg, dbl !== undefined ? dbl : useDoubledisc));
    };
    const currentScenarioId = (cat) => {
      if (cat === 'seafarers') {
        const c = SEAFARERS_BY_KEY[sfKey].counts.find((x) => x.label === sfCount);
        return c ? c.id : null;
      }
      if (cat === 'traders') {
        const c = TRADERS_BY_KEY[tbKey].counts.find((x) => x.label === tbCount);
        return c ? c.id : null;
      }
      return null;
    };
    const regenerate = () => regen(category, baseId, currentScenarioId(category));
    const pickCategory = (cat) => { setCategory(cat); regen(cat, baseId, currentScenarioId(cat)); };
    const pickBase = (id) => { setBaseId(id); regen('base', id, null); };
    const pickScenarioKey = (key) => {
      const map = isTrad ? TRADERS_BY_KEY  : SEAFARERS_BY_KEY;
      const setKey   = isTrad ? setTbKey   : setSfKey;
      const setCount = isTrad ? setTbCount : setSfCount;
      setKey(key);
      const scen = map[key];
      const auto = scen.counts.length === 1 ? scen.counts[0] : null;
      setCount(auto ? auto.label : null);
      regen(category, baseId, auto ? auto.id : null);
    };
    const pickCount = (label) => {
      const count = currentScenario.counts.find((c) => c.label === label);
      if (!count) return;
      const setCount = isTrad ? setTbCount : setSfCount;
      setCount(label);
      regen(category, baseId, count.id);
    };
    const toggleDoubledisc = (next) => {
      setUseDoubledisc(next);
      regen(category, baseId, currentScenarioId(category), next);
    };

    const config = buildConfig(category, baseId, scenarioId);
    const showDoubledisscRow = showDoubledisc && supportsDoubledisc(config);

    return (
      <>
        {/* Top-level category */}
        <div className="seg">
          <button className={'seg-btn' + (category === 'base' ? ' active' : '')}
            onClick={() => pickCategory('base')}>Base Game</button>
          <button className={'seg-btn' + (category === 'seafarers' ? ' active' : '')}
            onClick={() => pickCategory('seafarers')}>Seafarers</button>
          <button className={'seg-btn' + (category === 'traders' ? ' active' : '')}
            onClick={() => pickCategory('traders')}>T &amp; B</button>
        </div>

        {category === 'base' ? (
          <div className="seg">
            {BOARDS.map((b) => (
              <button key={b.id}
                className={'seg-btn' + (b.id === baseId ? ' active' : '')}
                onClick={() => pickBase(b.id)}>{b.short}</button>
            ))}
          </div>
        ) : (
          <div className="sf-controls">
            <select className="scenario-select" value={scenarioKey}
              onChange={(e) => pickScenarioKey(e.target.value)}>
              {choices.map((s) => (
                <option key={s.key} value={s.key}>{s.name}</option>
              ))}
            </select>
            <div className="seg">
              {currentScenario.counts.map((c) => (
                <button key={c.label}
                  className={'seg-btn' + (c.label === playerCount ? ' active' : '')}
                  onClick={() => pickCount(c.label)}>{c.label}</button>
              ))}
            </div>
          </div>
        )}

        {showDoubledisscRow && (
          <label className="toggle-row">
            <input type="checkbox" checked={useDoubledisc}
              onChange={(e) => toggleDoubledisc(e.target.checked)} />
            <span>
              Use 2/12 disc
              <div className="desc">Hexes showing 2 or 12 use the combined 2/12 disc and produce on both rolls.</div>
            </span>
          </label>
        )}

        {board ? (
          <>
            <p className="subtitle">{config?.name || 'Scenario not implemented'}</p>
            <div className="board-wrap">
              <Board board={board} />
            </div>
            <button className="btn" onClick={regenerate}>↻ Regenerate</button>
            <Legend board={board} />
            <SetupList board={board} />
          </>
        ) : (
          <p className="subtitle" style={{ opacity: 0.7 }}>Select a player count to load the board.</p>
        )}
      </>
    );
  }

  /* =====================================================================
   *  SCREEN COMPONENTS
   * =====================================================================
   *  Each receives { onNavigate, flowData, setFlowData } and renders a
   *  full-screen view. `flowData` accumulates as the user moves Home →
   *  Setup → MapGen → Game.
   * =================================================================== */

  function HomeScreen({ onNavigate, activeGame, totalGames, onDiscardActive }) {
    return (
      <div className="app">
        <h1 className="home-title">Catan</h1>
        <p className="home-sub">Map Generator &amp; Stat Tracker</p>

        {activeGame && (
          <div className="active-banner">
            <div className="title">Game in progress</div>
            <div className="who">{activeGame.players.map((p) => p.name).join(', ')}</div>
            <div className="row">
              <button className="primary" onClick={() => onNavigate('game')}>Resume</button>
              <button onClick={() => { if (confirm('Discard the in-progress game?')) onDiscardActive(); }}>
                Discard
              </button>
            </div>
          </div>
        )}

        <div className="home-actions">
          <button className="btn" onClick={() => onNavigate('setup')}>New Game</button>
          <button className="btn secondary" onClick={() => onNavigate('map_gen_only')}>Just Generate a Map</button>
          <button className="btn secondary" onClick={() => onNavigate('history')}>Previous Games</button>
          <button className="btn secondary" onClick={() => onNavigate('lifetime_stats')}>Lifetime Stats</button>
        </div>

        <p className="home-meta">{totalGames} game{totalGames === 1 ? '' : 's'} played</p>
      </div>
    );

  // Roster sheet: pick a saved player, or create a new one.
  function PlayerPickerSheet({ roster, takenColors, takenIds, onClose, onPickExisting, onCreateNew, onCreateGuest }) {
    const [mode, setMode] = React.useState('list'); // 'list' | 'new' | 'guest'
    const [name, setName] = React.useState('');
    const [color, setColor] = React.useState(null);

    const available = roster.filter((p) => !takenIds.includes(p.id));
    const colorTaken = (hex) => takenColors.includes(hex);

    const submit = () => {
      if (!name.trim() || !color) return;
      if (mode === 'new') onCreateNew(name.trim(), color);
      if (mode === 'guest') onCreateGuest(name.trim(), color);
      onClose();
    };

    return (
      <div className="sheet-backdrop" onClick={onClose}>
        <div className="sheet" onClick={(e) => e.stopPropagation()}>
          {mode === 'list' && (
            <>
              <h3>Pick a player</h3>
              {available.length === 0 ? (
                <p className="subtitle" style={{ margin: '4px 0 8px' }}>
                  No saved players available {roster.length ? '(all already added)' : 'yet'}.
                </p>
              ) : (
                available.map((p) => (
                  <button key={p.id} className="player-row"
                    onClick={() => { onPickExisting(p); onClose(); }}>
                    <span className="dot" style={{ background: p.color }} />
                    <span className="name">{p.name}</span>
                  </button>
                ))
              )}
              <div className="actions">
                <button onClick={() => setMode('new')}>+ New Player</button>
                <button onClick={() => setMode('guest')}>+ Add Guest</button>
              </div>
            </>
          )}
          {(mode === 'new' || mode === 'guest') && (
            <>
              <h3>{mode === 'guest' ? 'Add Guest' : 'New Player'}</h3>
              <div className="field">
                <label className="setup-group" style={{ margin: 0 }}>
                  <h3 style={{ margin: '0 0 6px' }}>Name</h3>
                </label>
                <input type="text" autoFocus value={name}
                  onChange={(e) => setName(e.target.value)} placeholder="e.g. Alex" />
              </div>
              <div className="field">
                <h3 style={{ margin: '0 0 6px', fontSize: '0.7rem', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.7px', color: 'var(--muted)' }}>Color</h3>
                <div className="color-swatches">
                  {PLAYER_COLORS.map((c) => (
                    <button key={c.hex} title={c.name}
                      className={'color-swatch' + (color === c.hex ? ' selected' : '') + (colorTaken(c.hex) ? ' disabled' : '')}
                      style={{ background: c.hex }}
                      disabled={colorTaken(c.hex)}
                      onClick={() => setColor(c.hex)} />
                  ))}
                </div>
              </div>
              <div className="actions">
                <button onClick={() => setMode('list')}>← Back</button>
                <button className="primary" disabled={!name.trim() || !color} onClick={submit}>
                  {mode === 'guest' ? 'Add Guest' : 'Add Player'}
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    );
  }

  function SetupScreen({ onNavigate, flowData, setFlowData, roster, setRoster }) {
    // Local state: player count, player slots, vp target.
    const [playerCount, setPlayerCount] = React.useState(flowData.playerCount || 4);
    const [players, setPlayers] = React.useState(flowData.players || []);
    const [vpTarget, setVpTarget] = React.useState(flowData.vpTarget || 10);
    const [pickerSlot, setPickerSlot] = React.useState(null); // slot index waiting for a pick

    const takenColors = players.map((p) => p.color);
    const takenIds = players.filter((p) => !p.isGuest).map((p) => p.id);

    const setSlot = (i, p) => {
      setPlayers((cur) => {
        const next = cur.slice();
        next[i] = p;
        return next;
      });
    };
    const clearSlot = (i) => {
      setPlayers((cur) => cur.filter((_, idx) => idx !== i));
    };

    const handlePickExisting = (p) => {
      setSlot(pickerSlot, { id: p.id, name: p.name, color: p.color, isGuest: false });
    };
    const handleCreateNew = (name, color) => {
      const id = makeId('p');
      const newP = { id, name, color, isGuest: false };
      const nextRoster = [...roster, newP];
      setRoster(nextRoster);
      saveRoster(nextRoster);
      setSlot(pickerSlot, newP);
    };
    const handleCreateGuest = (name, color) => {
      const id = makeId('g');
      setSlot(pickerSlot, { id, name, color, isGuest: true });
    };

    const ready = players.length === playerCount && players.every(Boolean);

    const proceed = () => {
      const nextData = {
        ...flowData,
        playerCount,
        players: players.map((p, i) => ({ ...p, turnOrder: i })),
        vpTarget,
      };
      setFlowData(nextData);
      onNavigate('map_gen', nextData);
    };

    // If playerCount drops below filled slots, trim.
    React.useEffect(() => {
      if (players.length > playerCount) setPlayers((cur) => cur.slice(0, playerCount));
    }, [playerCount]); // eslint-disable-line

    return (
      <div className="app">
        <h1>New Game</h1>
        <div className="stepper">
          <section>
            <h2>Expansion</h2>
            <div className="display-value">Base Game</div>
          </section>

          <section>
            <h2>Player count</h2>
            <div className="seg">
              {[3, 4, 5, 6].map((n) => (
                <button key={n}
                  className={'seg-btn' + (n === playerCount ? ' active' : '')}
                  onClick={() => setPlayerCount(n)}>{n}</button>
              ))}
            </div>
          </section>

          <section>
            <h2>Players</h2>
            {Array.from({ length: playerCount }).map((_, i) => {
              const p = players[i];
              if (!p) {
                return (
                  <button key={i} className="player-row placeholder" onClick={() => setPickerSlot(i)}>
                    <span className="dot" style={{ background: 'transparent', borderStyle: 'dashed' }} />
                    <span className="name">+ Add player {i + 1}</span>
                  </button>
                );
              }
              return (
                <div key={i} className="player-row" onClick={() => setPickerSlot(i)}>
                  <span className="dot" style={{ background: p.color }} />
                  <span className="name">{p.name}</span>
                  {p.isGuest && <span className="badge">Guest</span>}
                  <button className="remove" onClick={(e) => { e.stopPropagation(); clearSlot(i); }}>×</button>
                </div>
              );
            })}
          </section>

          <section>
            <h2>VP target</h2>
            <div className="seg">
              {[10, 12, 13, 15].map((n) => (
                <button key={n}
                  className={'seg-btn' + (n === vpTarget ? ' active' : '')}
                  onClick={() => setVpTarget(n)}>{n}</button>
              ))}
            </div>
          </section>

          <div style={{ display: 'flex', gap: 10 }}>
            <button className="btn secondary" style={{ flex: 1 }} onClick={() => onNavigate('home')}>← Back</button>
            <button className="btn" style={{ flex: 2 }} disabled={!ready} onClick={proceed}>
              Continue →
            </button>
          </div>
        </div>

        {pickerSlot !== null && (
          <PlayerPickerSheet
            roster={roster}
            takenColors={takenColors}
            takenIds={takenIds}
            onClose={() => setPickerSlot(null)}
            onPickExisting={handlePickExisting}
            onCreateNew={handleCreateNew}
            onCreateGuest={handleCreateGuest}
          />
        )}
      </div>
    );
  }

  function MapGenScreen({ onNavigate, flowData, setFlowData }) {
    // The generator is constrained to the base game by default for the
    // stat-tracker flow. We capture the user-approved board on every
    // change via onBoardChange.
    const [pendingBoard, setPendingBoard] = React.useState(null);
    const [pendingMeta, setPendingMeta] = React.useState(null);
    const [firstPlayerId, setFirstPlayerId] = React.useState(flowData.firstPlayerId || null);

    const handleBoardChange = React.useCallback((board, meta) => {
      setPendingBoard(board);
      setPendingMeta(meta);
    }, []);

    const startGame = () => {
      if (!pendingBoard || !firstPlayerId) return;
      const next = {
        ...flowData,
        board: pendingBoard,
        boardMeta: pendingMeta,
        firstPlayerId,
        useDoubledisc: !!pendingMeta?.useDoubledisc,
      };
      setFlowData(next);
      onNavigate('game', next);
    };

    return (
      <div className="app">
        <h1>Set Up the Board</h1>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, justifyContent: 'center' }}>
          {flowData.players.map((p) => (
            <span key={p.id} className="player-chip">
              <span className="dot" style={{ background: p.color }} />
              {p.name}
            </span>
          ))}
        </div>

        <GeneratorView
          showDoubledisc
          onBoardChange={handleBoardChange}
          initial={flowData.boardMeta}
        />

        {pendingBoard && (
          <>
            <div className="setup-group" style={{ width: '100%', maxWidth: 420 }}>
              <h3 style={{ fontSize: '0.7rem', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.7px', color: 'var(--muted)', margin: '4px 0 8px', textAlign: 'center' }}>
                Who goes first?
              </h3>
              <div className="first-player-grid">
                {flowData.players.map((p) => (
                  <button key={p.id}
                    className={'first-player-btn' + (p.id === firstPlayerId ? ' selected' : '')}
                    onClick={() => setFirstPlayerId(p.id)}>
                    <span className="dot" style={{ background: p.color }} />
                    {p.name}
                  </button>
                ))}
              </div>
            </div>

            <div style={{ display: 'flex', gap: 10, width: '100%', maxWidth: 420 }}>
              <button className="btn secondary" style={{ flex: 1 }} onClick={() => onNavigate('setup')}>
                ← Back
              </button>
              <button className="btn" style={{ flex: 2 }} disabled={!firstPlayerId} onClick={startGame}>
                Start Game →
              </button>
            </div>
          </>
        )}
      </div>
    );
  }

  // Standalone generator view for the "Just Generate a Map" home shortcut —
