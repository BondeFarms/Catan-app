  // Colored badge for a luck-score value (1.0 = neutral). Renders "—" if null.
  function LuckBar({ score }) {
    if (score == null) return <span style={{ color: 'var(--muted)' }}>—</span>;
    const color = score >= 1.05 ? '#5C8A3C' : score <= 0.95 ? '#E63946' : 'var(--muted)';
    return (
      <span style={{ color, fontWeight: 650 }}>
        {score.toFixed(2)}
        {score >= 1.1  && ' 🍀'}
        {score <= 0.85 && ' 🙁'}
      </span>
    );
  }

  // Dev Card row inside the Roll phase — log a dev card play before the
  // dice are rolled. Knight delegates to the existing knight modal via
  // `onPlayKnight`; other cards just record into devCardEvents.
  function DevCardRow({ game, setGame, currentPlayer, onPlayKnight }) {
    const [open, setOpen] = React.useState(false);
    const [picker, setPicker] = React.useState(null); // {card} for resource pickers

    const logEvent = (card, meta = {}) => {
      const next = {
        ...game,
        devCardEvents: [
          ...(game.devCardEvents || []),
          { turn: game.currentTurn, playerId: currentPlayer.id, card, meta },
        ],
      };
      setGame(next);
      setOpen(false);
      setPicker(null);
    };

    const playVP = () => {
      const next = {
        ...game,
        devCardVPs: {
          ...game.devCardVPs,
          [currentPlayer.id]: (game.devCardVPs?.[currentPlayer.id] || 0) + 1,
        },
        devCardEvents: [
          ...(game.devCardEvents || []),
          { turn: game.currentTurn, playerId: currentPlayer.id, card: 'vp', meta: {} },
        ],
      };
      setGame(next);
      setOpen(false);
    };

    return (
      <div className="devcard-row">
        <button className="btn secondary" onClick={() => setOpen((o) => !o)}>
          🎴 {open ? 'Hide Dev Cards' : 'Play Dev Card'}
        </button>
        {open && (
          <div className="devcard-options">
            <button onClick={() => { setOpen(false); onPlayKnight && onPlayKnight(); }}>⚔ Knight</button>
            <button onClick={() => logEvent('road_building')}>🛣 Road Building</button>
            <button onClick={() => setPicker({ card: 'year_of_plenty' })}>🌾 Year of Plenty</button>
            <button onClick={() => setPicker({ card: 'monopoly' })}>💰 Monopoly</button>
            <button onClick={playVP} style={{ gridColumn: 'span 2' }}>🏆 Victory Point Card (+1 VP)</button>
          </div>
        )}
        {picker && <DevCardResourcePicker
          card={picker.card}
          onCancel={() => setPicker(null)}
          onConfirm={(meta) => logEvent(picker.card, meta)} />}
      </div>
    );
  }

  // Resource picker for Year of Plenty (pick 2) / Monopoly (pick 1).
  function DevCardResourcePicker({ card, onCancel, onConfirm }) {
    const need = card === 'year_of_plenty' ? 2 : 1;
    const [picked, setPicked] = React.useState([]);
    const RESOURCES_LIST = ['wood', 'brick', 'wheat', 'ore', 'wool'];
    const pick = (r) => {
      if (picked.length >= need) return;
      setPicked([...picked, r]);
    };
    const title = card === 'year_of_plenty' ? 'Year of Plenty — pick 2 resources' : 'Monopoly — pick the resource';
    return (
      <div className="modal-backdrop" onClick={onCancel}>
        <div className="modal" onClick={(e) => e.stopPropagation()}>
          <h3>{title}</h3>
          <p className="subtitle" style={{ margin: '0 0 6px' }}>
            Picked: {picked.length ? picked.join(', ') : '(none)'}
          </p>
          <div className="devcard-options">
            {RESOURCES_LIST.map((r) => (
              <button key={r} onClick={() => pick(r)}
                disabled={picked.length >= need}
                style={{ textTransform: 'capitalize' }}>{r}</button>
            ))}
          </div>
          <div className="row">
            <button onClick={onCancel}>Cancel</button>
            <button className="primary" disabled={picked.length !== need}
              onClick={() => onConfirm({ resources: picked })}>Confirm</button>
          </div>
        </div>
      </div>
    );
  }

  // Always-accessible in-game stats panel (collapsible).
  function LiveStatsSection({ game }) {
    const [open, setOpen] = React.useState(false);
    const counts = rollDistribution(game.rolls);
    const totalRolls = game.rolls.length;
    const expected = {};
    Object.entries(ROLL_PROBABILITY).forEach(([k, p]) => { expected[k] = p * totalRolls; });
    const hotCold = computeHotCold(game.rolls);
    const luck = computeLuckScores(game);
    const actual = computeResourceProduction(game);
    const exp = computeExpectedProduction(game);
    const vp = computeVP(game);
    const target = game.vpTarget || 10;
    const ordered = game.players.slice().sort((a, b) => vp[b.id] - vp[a.id]);

    const hasRobberData = (game.robberEvents || []).filter((e) => e.targetPlayerId).length > 0;

    // Most targeted / most aggressive — derived from robberEvents.
    const targetedTally = {}, byTally = {};
    (game.robberEvents || []).forEach((ev) => {
      if (ev.targetPlayerId) targetedTally[ev.targetPlayerId] = (targetedTally[ev.targetPlayerId] || 0) + 1;
      if (ev.playerId)       byTally[ev.playerId] = (byTally[ev.playerId] || 0) + 1;
    });
    const topOf = (m) => Object.entries(m).sort((a, b) => b[1] - a[1])[0];
    const mostTargeted = topOf(targetedTally);
    const mostAggro    = topOf(byTally);

    return (
      <div className="collapsible-section">
        <div className="collapsible-header" onClick={() => setOpen((o) => !o)}>
          <span>📊 Live Stats</span>
          <span>{open ? '▴' : '▾'}</span>
        </div>
        {open && (
          <div className="collapsible-body">
            <div>
              <div className="section-label">Roll Distribution ({totalRolls})</div>
              <RollDistChart counts={counts} expected={totalRolls > 0 ? expected : undefined} height={100} />
              {hotCold && (
                <div style={{ fontSize: '0.78rem', color: 'var(--muted)', marginTop: 6 }}>
                  {hotCold.hot && <>Hot 🔥 <b>{hotCold.hot.n}</b> · rolled {hotCold.hot.actual}× (exp {hotCold.hot.expected.toFixed(1)})</>}
                  {hotCold.hot && hotCold.cold && <> · </>}
                  {hotCold.cold && <>Cold ❄️ <b>{hotCold.cold.n}</b> · rolled {hotCold.cold.actual}× (exp {hotCold.cold.expected.toFixed(1)})</>}
                </div>
              )}
            </div>

            <div>
              <div className="section-label">Luck Score</div>
              {totalRolls < 5 ? (
                <p className="subtitle" style={{ margin: 0, fontSize: '0.78rem' }}>Not enough rolls yet (need 5+).</p>
              ) : (
                game.players.map((p) => (
                  <div key={p.id} className="stat-row">
                    <span className="dot" style={{ background: p.color }} />
                    <span className="name">{p.name}</span>
                    <span className="val"><LuckBar score={luck[p.id]} /></span>
                  </div>
                ))
              )}
            </div>

            <div>
              <div className="section-label">Production — Actual vs Expected</div>
              {totalRolls < 3 ? (
                <p className="subtitle" style={{ margin: 0, fontSize: '0.78rem' }}>Not enough rolls yet (need 3+).</p>
              ) : (
                <div className="live-stats-table">
                  <span className="h">Player</span>
                  <span className="h num">Actual</span>
                  <span className="h num">Exp.</span>
                  <span className="h num">Luck</span>
                  {game.players.map((p) => {
                    const a = Object.values(actual[p.id] || {}).reduce((s, v) => s + v, 0);
                    const e = exp[p.id] || 0;
                    const r = e > 0 ? a / e : null;
                    return (
                      <React.Fragment key={p.id}>
                        <span><span className="dot" style={{ background: p.color, display:'inline-block', width:8, height:8, borderRadius:'50%', marginRight:5 }} />{p.name}</span>
                        <span className="num">{a}</span>
                        <span className="num">{e.toFixed(1)}</span>
                        <span className="num"><LuckBar score={r} /></span>
                      </React.Fragment>
                    );
                  })}
                </div>
              )}
            </div>

            {hasRobberData && (
              <div>
                <div className="section-label">Robber Activity</div>
                <div style={{ fontSize: '0.82rem' }}>
                  {mostTargeted && (() => {
                    const pl = game.players.find((p) => p.id === mostTargeted[0]);
                    return pl ? <div>Most targeted: <b>{pl.name}</b> ({mostTargeted[1]}×)</div> : null;
                  })()}
                  {mostAggro && (() => {
                    const pl = game.players.find((p) => p.id === mostAggro[0]);
                    return pl ? <div>Most aggressive: <b>{pl.name}</b> ({mostAggro[1]} robber move{mostAggro[1] === 1 ? '' : 's'})</div> : null;
                  })()}
                </div>
              </div>
            )}

            <div>
              <div className="section-label">Current VP</div>
              {ordered.map((p, i) => {
                const v = vp[p.id] || 0;
                const pct = Math.min(100, (v / target) * 100);
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '  ';
                return (
                  <div key={p.id} style={{ display: 'flex', alignItems: 'center', gap: 8, margin: '4px 0' }}>
                    <span style={{ width: 18 }}>{medal}</span>
                    <span className="dot" style={{ background: p.color }} />
                    <span style={{ flex: 1, fontSize: '0.85rem' }}>{p.name}</span>
                    <span style={{ fontWeight: 700, fontSize: '0.85rem', width: 36, textAlign: 'right' }}>{v} VP</span>
                    <div style={{ width: 80, height: 6, borderRadius: 3, background: 'rgba(255,255,255,0.08)' }}>
                      <div className="vp-snap-bar" style={{ width: `${pct}%`, background: p.color }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    );
  }

  function GameScreen({ onNavigate, flowData, activeGame, setActiveGame, onGameComplete }) {
    // Either resume an existing active game, or create a new one from flow.
    const [game, setGameState] = React.useState(() => {
      if (activeGame) return activeGame;
      const fresh = createGame(flowData);
      saveActiveGame(fresh);
      return fresh;
    });
    const [settingsOpen, setSettingsOpen] = React.useState(false);
    // Turn flow: Roll phase logs the roll then advances to Build. End Turn
    // (bottom of Build) loops back to Roll for the next player.
    // turnAdvanceCounter bumps on every advance so RollPhaseContent can reset
    // its undo buffer.
    const [hasRolledThisTurn, setHasRolledThisTurn] = React.useState(false);
    const [turnPhase, setTurnPhase] = React.useState('roll'); // 'roll' | 'build'
    const [turnAdvanceCounter, setTurnAdvanceCounter] = React.useState(0);

    const setGame = (next) => {
      setGameState(next);
      setActiveGame(next);
      saveActiveGame(next);
    };

    const advanceTurn = (g) => {
      const nextIdx = (g.currentPlayerIndex + 1) % g.players.length;
      const nextTurnNum = nextIdx === 0 ? g.currentTurn + 1 : g.currentTurn;
      setGame({ ...g, currentPlayerIndex: nextIdx, currentTurn: nextTurnNum });
      setHasRolledThisTurn(false);
      setTurnPhase('roll');
      setTurnAdvanceCounter((c) => c + 1);
    };
    const endTurn = () => {
      if (!hasRolledThisTurn && !confirm('End turn without rolling?')) return;
      // Snapshot VP for the turn that's about to end so GameDetail / lifetime
      // can show VP-over-time, milestones, comeback, clutch factor, etc.
      const snapshot = { turn: game.currentTurn, vp: computeVP(game) };
      const withSnapshot = {
        ...game,
        vpHistory: [...(game.vpHistory || []), snapshot],
      };
      advanceTurn(withSnapshot);
    };

    const handleRollLogged = () => {
      setHasRolledThisTurn(true);
      setTurnPhase('build');
    };
    const handleRollUndone = () => {
      setHasRolledThisTurn(false);
      // Stay on roll phase if the user undid the roll.
    };

    const currentPlayer = game.players[game.currentPlayerIndex];
    const myRolls = game.rolls.filter((r) => r.turn === game.currentTurn && r.playerId === currentPlayer.id);
    const lastRollTotal = myRolls.length ? myRolls[myRolls.length - 1].total : null;

    const endGame = (completed) => {
      onGameComplete(completed);
    };

    const abandonGame = () => {
      clearActiveGame();
      setActiveGame(null);
      onNavigate('home');
    };

    const goToGameStateAndEnd = () => {
      setSettingsOpen(false);
      // GameStateSection has its own collapsible state; scroll to it on close.
      window.setTimeout(() => {
        const sec = document.querySelector('.collapsible-section:last-of-type');
        if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 50);
    };

    return (
      <div className="app">
        <div className="game-header">
          <div className="current">
            <span className="dot" style={{ background: currentPlayer.color }} />
            <span className="name">{currentPlayer.name}</span>
          </div>
          <span className="turn">T{game.currentTurn}</span>
          <button className="gear" onClick={() => setSettingsOpen(true)} aria-label="Settings">⚙</button>
        </div>

        {/* Phase 1 — Roll */}
        {turnPhase === 'roll' ? (
          <div className="phase-section active">
            <div className="phase-header">
              <span className="phase-num">1</span>
              <span className="phase-title">Roll</span>
            </div>
            <RollPhaseContent
              game={game} setGame={setGame} currentPlayer={currentPlayer}
              onRollLogged={handleRollLogged}
              onRollUndone={handleRollUndone}
              turnAdvanceCounter={turnAdvanceCounter} />
          </div>
        ) : (
          <div className="phase-section collapsed" onClick={() => setTurnPhase('roll')}>
            <span className="phase-num done">✓</span>
            <span className="phase-summary">
              {currentPlayer.name} rolled <b>{lastRollTotal ?? '—'}</b>
            </span>
            <span className="phase-edit">Edit ›</span>
          </div>
        )}

        {/* Phase 2 — Build */}
        <div className={'phase-section' + (turnPhase === 'build' ? ' active' : ' locked')}>
          <div className="phase-header">
            <span className={'phase-num' + (turnPhase === 'build' ? '' : ' future')}>2</span>
            <span className="phase-title">Build</span>
            {turnPhase === 'roll' && <span className="phase-hint">Roll first</span>}
          </div>
          <BuildPhaseContent game={game} setGame={setGame} currentPlayer={currentPlayer} />
          {turnPhase === 'build' && (
            <button className="btn end-turn-btn ready" onClick={endTurn} style={{ marginTop: 6 }}>
              End Turn ›
            </button>
          )}
        </div>

        {/* Always-on stats panel + collapsible game state. */}
        <LiveStatsSection game={game} />
        <GameStateSection game={game} setGame={setGame} onEndGame={endGame} />

        {settingsOpen && (
          <div className="modal-backdrop" onClick={() => setSettingsOpen(false)}>
            <div className="modal" onClick={(e) => e.stopPropagation()}>
              <h3>Game Options</h3>
              <div className="row">
                <button onClick={() => setSettingsOpen(false)}>Cancel</button>
              </div>
              <div className="row">
                <button onClick={goToGameStateAndEnd}>Go to Game State…</button>
              </div>
              <div className="row">
                <button className="danger" onClick={() => {
                  if (confirm('Abandon this game? It will not be saved to history.')) abandonGame();
                }}>Abandon Game</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  /* =====================================================================
   *  POST_GAME SCREEN
   * =====================================================================
   *  Summary cards + retroactive logging (placements / achievements / dev
   *  VPs). Loads the just-completed game object passed in via flowData.
   * =================================================================== */
  function PostGameScreen({ onNavigate, completedGame, setCompletedGame, onSaveGame }) {
    const game = completedGame;
    if (!game) {
      return (
        <div className="app">
          <h1>No game data</h1>
          <button className="btn" onClick={() => onNavigate('home')}>← Back to Home</button>
        </div>
      );
    }

    const winner = game.players.find((p) => p.id === game.winner);
    const vp = computeVP(game);
    const prod = computeResourceProduction(game);
    const counts = rollDistribution(game.rolls);
    const mostCommon = Object.entries(counts).reduce((best, [k, v]) =>
      (v > best.v ? { k: Number(k), v } : best), { k: null, v: -1 });
    const topProducer = game.players
      .map((p) => ({ p, total: Object.values(prod[p.id] || {}).reduce((a, b) => a + b, 0) }))
      .sort((a, b) => b.total - a.total)[0];

    // Retroactive logging — reuses BuildTab via a player picker.
    const [editing, setEditing] = React.useState(false);
    const [retroPlayerId, setRetroPlayerId] = React.useState(game.players[0].id);
    const retroPlayer = game.players.find((p) => p.id === retroPlayerId);

    return (
      <div className="app">
        <h1>Game Saved</h1>

        {winner && (
          <div className="vp-row" style={{ width: '100%', maxWidth: 520 }}>
            <span className="dot" style={{ background: winner.color }} />
            <div className="vp-col">
              <span className="name">🏆 {winner.name} wins</span>
              <span className="breakdown">
                {game.expansion?.name} · {game.players.length} players · VP target {game.vpTarget}
              </span>
            </div>
            <span className="vp">{vp[winner.id]}</span>
          </div>
        )}

        <StatCard title="Final scores">
          <div className="piece-summary" style={{ border: 'none', padding: 0 }}>
            {game.players
              .slice()
              .sort((a, b) => vp[b.id] - vp[a.id])
              .map((p) => (
                <div key={p.id} className="row">
                  <span className="dot" style={{ background: p.color }} />
                  <span className="name">{p.name}</span>
                  <span className="counts">{vp[p.id]} VP</span>
                </div>
              ))}
          </div>
        </StatCard>

        <StatCard title="Game summary">
          <div style={{ fontSize: '0.85rem', lineHeight: 1.8 }}>
            <div>Turns played: <b>{game.totalTurns || game.currentTurn}</b></div>
            <div>Total rolls: <b>{game.rolls.length}</b></div>
            <div>Most common roll: <b>{mostCommon.k != null ? `${mostCommon.k} (×${mostCommon.v})` : '—'}</b></div>
            {topProducer && (
              <div>Most resources: <b>{topProducer.p.name}</b> ({topProducer.total})</div>
            )}
          </div>
        </StatCard>

        <button className="btn secondary" onClick={() => setEditing(!editing)}>
          {editing ? 'Done editing' : 'Fill in anything I missed'}
        </button>

        {editing && (
          <div className="dist-chart" style={{ width: '100%' }}>
            <h3>Retroactive log</h3>
            <div className="first-player-grid" style={{ marginBottom: 10 }}>
              {game.players.map((p) => (
                <button key={p.id}
                  className={'first-player-btn' + (p.id === retroPlayerId ? ' selected' : '')}
                  onClick={() => setRetroPlayerId(p.id)}>
                  <span className="dot" style={{ background: p.color }} />
                  {p.name}
                </button>
              ))}
            </div>
            <BuildTab game={game} setGame={(g) => {
              const next = { ...g, scores: computeVP(g) };
              setCompletedGame(next);
              onSaveGame(next); // upsert into history
            }} currentPlayer={retroPlayer} />
            <hr style={{ borderColor: 'var(--border)', margin: '12px 0' }} />
            <AchievementRow label="Largest Army"
              holder={game.largestArmy} players={game.players}
              onSet={(pid) => {
                const next = { ...game, largestArmy: pid, scores: computeVP({ ...game, largestArmy: pid }) };
                setCompletedGame(next); onSaveGame(next);
              }} />
            <AchievementRow label="Longest Road"
              holder={game.longestRoad} players={game.players}
              onSet={(pid) => {
                const next = { ...game, longestRoad: pid, scores: computeVP({ ...game, longestRoad: pid }) };
                setCompletedGame(next); onSaveGame(next);
              }} />
            <AchievementRow label="Strongest Ports Trophy"
              holder={game.strongestPortsTrophy} players={game.players}
              onSet={(pid) => {
                const next = { ...game, strongestPortsTrophy: pid, scores: computeVP({ ...game, strongestPortsTrophy: pid }) };
                setCompletedGame(next); onSaveGame(next);
              }} />
          </div>
        )}

        {/* Guest promotion prompt */}
        <GuestPromotion game={game} />

        <div style={{ display: 'flex', gap: 10, width: '100%', maxWidth: 420 }}>
          <button className="btn secondary" style={{ flex: 1 }} onClick={() => onNavigate('home')}>
            ← Back to Home
          </button>
          <button className="btn" style={{ flex: 1 }} onClick={() => onViewStats && onViewStats(game)}>
            View Full Stats
          </button>
        </div>
      </div>
    );
  }

  function GuestPromotion({ game }) {
    const guests = game.players.filter((p) => p.isGuest);
    const [decided, setDecided] = React.useState({}); // pid -> 'promoted' | 'declined'
    if (guests.length === 0) return null;
    const pending = guests.filter((g) => !decided[g.id]);
    if (pending.length === 0) return null;
    const promote = (guest) => {
      const roster = loadRoster();
      // Avoid duplicates by name+color.
      const exists = roster.find((p) => p.name === guest.name && p.color === guest.color);
      if (!exists) {
        roster.push({ id: guest.id, name: guest.name, color: guest.color, isGuest: false });
        saveRoster(roster);
      }
      setDecided((d) => ({ ...d, [guest.id]: 'promoted' }));
    };
    return (
      <div className="dist-chart" style={{ width: '100%' }}>
        <h3>Guest players</h3>
        {pending.map((g) => (
          <div key={g.id} className="row" style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '6px 0' }}>
            <span className="dot" style={{ width: 10, height: 10, borderRadius: '50%', background: g.color, display: 'inline-block', border: '1px solid rgba(0,0,0,0.45)' }} />
            <span style={{ flex: 1, fontSize: '0.88rem' }}>Promote {g.name} to a regular player?</span>
            <button className="seg-btn" style={{ flex: 'none', padding: '6px 12px', borderRadius: 8, border: '1px solid var(--border)' }}
              onClick={() => setDecided((d) => ({ ...d, [g.id]: 'declined' }))}>No</button>
            <button className="seg-btn active" style={{ flex: 'none', padding: '6px 12px', borderRadius: 8 }}
              onClick={() => promote(g)}>Yes</button>
          </div>
        ))}
      </div>
    );
  }

  // Horizontal stacked bar showing resource production per player.
  function ResourceProductionChart({ game }) {
    const prod = computeResourceProduction(game);
    const players = game.players;
    // Determine the max total across players for scaling.
    const totals = players.map((p) => Object.values(prod[p.id] || {}).reduce((a, b) => a + b, 0));
    const max = Math.max(1, ...totals);
    return (
      <>
        <div className="res-legend">
          {RESOURCE_BAR_ORDER.map((k) => (
            <span key={k}><i style={{ background: RESOURCE_BAR_COLORS[k] }} />{k}</span>
          ))}
        </div>
        {players.map((p, i) => {
          const r = prod[p.id] || {};
          const tot = totals[i];
          return (
            <div key={p.id} className="res-bar-row">
              <span className="name">{p.name}</span>
              <div className="res-bar">
                {RESOURCE_BAR_ORDER.map((k) => {
                  const v = r[k] || 0;
                  const pct = max > 0 ? (v / max) * 100 : 0;
                  if (pct === 0) return null;
                  return (
                    <div key={k} className="res-bar-segment"
                      style={{ width: `${pct}%`, background: RESOURCE_BAR_COLORS[k] }}
                      title={`${k}: ${v}`} />
                  );
                })}
              </div>
              <span className="total">{tot}</span>
            </div>
          );
        })}
      </>
    );
  }

                <tr>
                  <th>Player</th>
                  <th>Largest Army</th>
                  <th>Longest Road</th>
                  <th>Strongest Ports</th>
                  <th>Knights Played</th>
                </tr>
              </thead>
              <tbody>
                {trophies.map((p) => (
                  <tr key={p.id}>
                    <td>
                      <span className="dot" style={{ display: 'inline-block', width: 9, height: 9, borderRadius: '50%', background: p.color, marginRight: 5, verticalAlign: 'middle' }} />
                      {p.name}
                    </td>
                    <td>{p.la}</td>
                    <td>{p.lr}</td>
                    <td>{p.ports}</td>
                    <td>{p.knights}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        <div className="detail-section">
          <h2>Nemesis &amp; Victim</h2>
          <div className="subtitle" style={{ fontSize: '0.72rem' }}>Who robs whom across all games</div>
          {nv.map((p) => (
            <div key={p.id} className="stat-row">
              <span className="dot" style={{ background: p.color }} />
              <span className="name">{p.name}</span>
              <span className="val" style={{ textAlign: 'right' }}>
                <div>Nemesis: {p.nemesis ? `${p.nemesis.name} (${p.nemesis.count}×)` : '—'}</div>
                <div>Victim:&nbsp; {p.victim  ? `${p.victim.name} (${p.victim.count}×)`   : '—'}</div>
              </span>
            </div>
          ))}
        </div>

        <div className="detail-section">
          <h2>Luck Score</h2>
          <div className="subtitle" style={{ fontSize: '0.72rem' }}>Actual production ÷ expected. 1.0 = neutral, &gt;1 = lucky, &lt;1 = unlucky.</div>
          {luck.map((p) => (
            <div key={p.id} className="stat-row">
              <span className="dot" style={{ background: p.color }} />
              <span className="name">{p.name}</span>
              <span className="val">
                {p.luck != null ? p.luck.toFixed(2) : '—'}
                <span style={{ color: 'var(--muted)', fontSize: '0.72rem', marginLeft: 4 }}>
                  ({p.gamesScored} game{p.gamesScored === 1 ? '' : 's'})
                </span>
              </span>
            </div>
          ))}
        </div>

        <div className="detail-section">
          <h2>Records</h2>
          {leaderboard.map((r) => {
            const recs    = computeVPRecords(games, r.name);
            const streaks = computeStreaks(games, r.name);
            return (
              <div key={r.id} className="stat-row" style={{ alignItems: 'flex-start' }}>
                <span className="dot" style={{ background: r.color, marginTop: 3 }} />
                <span className="name">{r.name}</span>
                <span className="val" style={{ textAlign: 'right', fontSize: '0.8rem' }}>
                  <div>Highest VP: <b>{recs.highestVP}</b></div>
                  {recs.lowestWin != null && <div>Lowest winning VP: <b>{recs.lowestWin}</b></div>}
                  <div>Best win streak: <b>{streaks.maxWin}</b></div>
                  <div>Worst loss streak: <b>{streaks.maxLoss}</b></div>
                  {streaks.currentStreak > 1 && (
                    <div>Current: <b>{streaks.currentStreak} {streaks.currentStreakType}s</b></div>
                  )}
                </span>
              </div>
            );
          })}
        </div>

        <div className="detail-section">
          <h2>Placement Tendencies</h2>
          <div className="subtitle" style={{ fontSize: '0.72rem' }}>Average starting pip score across all games</div>
          {leaderboard.map((r) => {
            const avg = avgStartingScore(games, r.name);
            return (
              <div key={r.id} className="stat-row">
                <span className="dot" style={{ background: r.color }} />
                <span className="name">{r.name}</span>
                <span className="val">{avg != null ? avg.toFixed(1) + ' pips' : '—'}</span>
              </div>
            );
          })}
        </div>

        <div className="detail-section">
          <h2>Most Robbed</h2>
          {(() => {
            const robbed = computeMostRobbed(games);
            const entries = Object.entries(robbed).sort((a, b) => b[1] - a[1]);
            if (entries.length === 0) {
              return <p className="subtitle" style={{ margin: 0 }}>No robber events recorded.</p>;
            }
            return entries.map(([name, count]) => {
              const player = leaderboard.find((p) => p.name === name);
              return (
                <div key={name} className="stat-row">
                  {player && <span className="dot" style={{ background: player.color }} />}
                  {!player && <span className="dot" style={{ background: 'transparent', borderStyle: 'dashed' }} />}
                  <span className="name">{name}</span>
                  <span className="val">{count}×</span>
                </div>
              );
            });
          })()}
        </div>

        <div className="detail-section">
          <h2>Kingmaker</h2>
          <div className="subtitle" style={{ fontSize: '0.72rem' }}>Who wins most often when you don't</div>
          {leaderboard.map((r) => {
            const km = computeKingmaker(games, r.name);
            if (km.length === 0) return null;
            return (
              <div key={r.id} className="stat-row" style={{ alignItems: 'flex-start' }}>
                <span className="dot" style={{ background: r.color, marginTop: 3 }} />
                <span className="name">{r.name}</span>
                <span className="val" style={{ textAlign: 'right', fontSize: '0.8rem' }}>
                  {km.slice(0, 2).map((k) => (
                    <div key={k.name}>{k.name}: <b>{k.count}×</b></div>
                  ))}
                </span>
              </div>
            );
          })}
        </div>

        <div className="detail-section">
          <h2>Player Cards</h2>
          <div className="subtitle" style={{ fontSize: '0.72rem' }}>Five-axis radar — relative within your pool</div>
          {(() => {
            const radar = computePlayerRadar(games, leaderboard);
            return (
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12, justifyContent: 'center' }}>
                {leaderboard.map((p) => (
                  <div key={p.id} style={{
                    display: 'flex', flexDirection: 'column', alignItems: 'center',
                    gap: 4, padding: 8, border: '1px solid var(--border)', borderRadius: 8,
                    background: 'rgba(255,255,255,0.02)', minWidth: 130,
                  }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: '0.8rem', fontWeight: 600 }}>
                      <span className="dot" style={{ background: p.color }} />
                      {p.name}
                    </div>
                    <RadarChart values={radar[p.id]} color={p.color} size={120} />
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
      </div>
    );
  }

  function App() {
    const [screen, setScreen] = React.useState('home');
    const [flowData, setFlowData] = React.useState({});
    const [roster, setRoster] = React.useState(() => loadRoster());
    const [games, setGames] = React.useState(() => loadGames());
    const [activeGame, setActiveGame] = React.useState(() => loadActiveGame());
    const [completedGame, setCompletedGame] = React.useState(null);
    const [detailGame, setDetailGame] = React.useState(null);

    // Keep a ref so the Firestore effect can read latest activeGame without
    // being re-registered every time it changes.
    const activeGameRef = React.useRef(activeGame);
    React.useEffect(() => { activeGameRef.current = activeGame; }, [activeGame]);

    // Firestore real-time sync. Runs once on mount; cleans up on unmount.
    React.useEffect(() => {
      const db = window.__catanDb;
      if (!db) return;

      // One-time: if another device had an active game and we don't, load it.
      db.collection('catan_meta').doc('data').get().then((snap) => {
        if (!snap.exists) return;
        const data = snap.data();
        if (data.activeGame && !activeGameRef.current) {
          lsWrite(ACTIVE_GAME_KEY, data.activeGame);
          setActiveGame(data.activeGame);
        }
      }).catch(console.error);

      // Live roster sync.
      const unsubMeta = db.collection('catan_meta').doc('data').onSnapshot((snap) => {
        if (!snap.exists) return;
        const r = snap.data().roster;
        if (r) {
          lsWrite(ROSTER_KEY, r);
          setRoster(r);
        }
      }, console.error);

      // Live games history sync.
      const unsubGames = db.collection('catan_games').onSnapshot((snap) => {
        const list = snap.docs.map((d) => d.data())
                              .sort((a, b) => new Date(b.date) - new Date(a.date));
        lsWrite(GAMES_KEY, list);
        setGames(list);
      }, console.error);

      return () => { unsubMeta(); unsubGames(); };
    }, []); // eslint-disable-line react-hooks/exhaustive-deps

    const navigate = (nextScreen, data) => {
      if (data) setFlowData((prev) => ({ ...prev, ...data }));
      setScreen(nextScreen);
    };

    const discardActive = () => {
      clearActiveGame();
      setActiveGame(null);
    };

    // Finalize a game: move from active → completed list, navigate to POST_GAME.
    const handleGameComplete = (completed) => {
      const allGames = loadGames();
      // Upsert by id in case the user later returns to POST_GAME to edit.
      const idx = allGames.findIndex((g) => g.id === completed.id);
      if (idx >= 0) allGames[idx] = completed;
      else allGames.push(completed);
      saveGames(allGames);
      setGames(allGames);
      clearActiveGame();
      setActiveGame(null);
      setCompletedGame(completed);
      setScreen('post_game');
    };

    // Upsert a game in the history list — used for retroactive POST_GAME edits.
    const handleUpsertGame = (g) => {
      const allGames = loadGames();
      const idx = allGames.findIndex((x) => x.id === g.id);
      if (idx >= 0) allGames[idx] = g;
      else allGames.push(g);
      saveGames(allGames);
      setGames(allGames);
    };

    if (screen === 'home') {
      return <HomeScreen
        onNavigate={navigate}
        activeGame={activeGame}
        totalGames={games.length}
        onDiscardActive={discardActive}
      />;
    }
    if (screen === 'setup') {
      return <SetupScreen
        onNavigate={navigate}
        flowData={flowData}
        setFlowData={setFlowData}
        roster={roster}
        setRoster={setRoster}
      />;
    }
    if (screen === 'map_gen') {
      return <MapGenScreen
        onNavigate={navigate}
        flowData={flowData}
        setFlowData={setFlowData}
      />;
    }
    if (screen === 'map_gen_only') {
      return <MapGenOnlyScreen onNavigate={navigate} />;
    }
    if (screen === 'game') {
      return <GameScreen
        onNavigate={navigate}
        flowData={flowData}
        activeGame={activeGame}
        setActiveGame={setActiveGame}
        onGameComplete={handleGameComplete}
      />;
    }
    if (screen === 'post_game') {
      return <PostGameScreen
        onNavigate={navigate}
        completedGame={completedGame}
        setCompletedGame={setCompletedGame}
        onSaveGame={handleUpsertGame}
        onViewStats={(g) => { setDetailGame(g); setScreen('game_detail'); }}
      />;
    }
    if (screen === 'history') {
      return <HistoryScreen
        onNavigate={navigate}
        games={games}
        onPickGame={(g) => setDetailGame(g)}
        onClearAll={() => { lsWrite(GAMES_KEY, []); clearGamesFirestore(); setGames([]); }}
      />;
    }
    if (screen === 'game_detail') {
      return <GameDetailScreen onNavigate={navigate} detailGame={detailGame} />;
    }
    if (screen === 'lifetime_stats') {
      return <LifetimeStatsScreen onNavigate={navigate} games={games} />;
    }
    return <HomeScreen onNavigate={navigate} activeGame={activeGame} totalGames={games.length} onDiscardActive={discardActive} />;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
