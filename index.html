<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Catan Map Generator</title>

  <!-- React + Babel via CDN. No build step: this file runs as-is on GitHub Pages. -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg: #11161c;
      --panel: #1a222c;
      --text: #e7edf3;
      --muted: #8aa0b2;
      --accent: #3da9fc;
      --border: #2a3642;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }
    #root { display: flex; justify-content: center; }
    .app {
      width: 100%;
      max-width: 520px;
      padding: 16px 12px calc(24px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .app h1 {
      font-size: 1.15rem;
      font-weight: 650;
      margin: 4px 0 0;
      letter-spacing: 0.2px;
    }
    .subtitle { color: var(--muted); font-size: 0.8rem; margin: 0; }
    .board-wrap {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }
    .board-wrap svg { width: 100%; height: auto; display: block; }
    .btn {
      appearance: none;
      border: none;
      background: var(--accent);
      color: #04121f;
      font-size: 1rem;
      font-weight: 650;
      padding: 13px 22px;
      border-radius: 12px;
      width: 100%;
      max-width: 320px;
      cursor: pointer;
      transition: transform 0.05s ease, filter 0.15s ease;
    }
    .btn:active { transform: scale(0.98); filter: brightness(1.05); }
    .seg {
      display: flex;
      width: 100%;
      max-width: 360px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .seg-btn {
      flex: 1;
      appearance: none;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 650;
      padding: 10px 6px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .seg-btn + .seg-btn { border-left: 1px solid var(--border); }
    .seg-btn.active { background: var(--accent); color: #04121f; }
    .sf-controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 360px;
    }
    .scenario-select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 36px 11px 14px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--panel) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8"><path d="M1 1l5 5 5-5" fill="none" stroke="%238aa0b2" stroke-width="2"/></svg>') no-repeat right 14px center;
    }
    .subtitle .tag {
      display: block;
      margin-top: 3px;
      font-size: 0.68rem;
      font-style: italic;
      color: var(--muted);
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px 12px;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .legend i {
      width: 11px; height: 11px; border-radius: 3px; display: inline-block;
    }
    .setup {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
    }
    .setup h2 { font-size: 1rem; font-weight: 650; margin: 0 0 14px; }
    .setup-group { margin-bottom: 16px; }
    .setup-group:last-child { margin-bottom: 0; }
    .setup-group h3 {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--muted);
      margin: 0 0 8px;
    }
    .setup ul { list-style: none; margin: 0; padding: 0; }
    .setup li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.92rem;
    }
    .setup li:last-child { border-bottom: none; }
    .setup .name { display: inline-flex; align-items: center; }
    .setup .swatch {
      width: 13px; height: 13px; border-radius: 3px; margin-right: 9px; flex: none;
    }
    .setup .qty { font-weight: 700; font-variant-numeric: tabular-nums; }
    .tokens-line {
      margin: 0;
      font-size: 0.92rem;
      line-height: 1.8;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    /* ============================================================
     * Stat-tracker UI (HOME / SETUP / MAP_GEN / GAME / HISTORY / ...)
     * ============================================================ */
    .screen { width: 100%; min-height: 100vh; box-sizing: border-box; }
    .home-title { font-size: 1.7rem; font-weight: 700; letter-spacing: 0.4px; margin: 12px 0 4px; }
    .home-sub   { color: var(--muted); font-size: 0.85rem; margin: 0 0 18px; }
    .home-actions { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; margin: 8px 0 16px; }
    .home-actions .btn { width: 100%; max-width: none; padding: 16px 18px; font-size: 1rem; }
    .home-actions .btn.secondary { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
    .home-meta  { color: var(--muted); font-size: 0.78rem; }
    .active-banner {
      width: 100%; max-width: 360px;
      background: #2b3848;
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 4px;
    }
    .active-banner .title { font-size: 0.82rem; font-weight: 700; color: var(--accent); letter-spacing: 0.3px; }
    .active-banner .who { font-size: 0.85rem; color: var(--text); }
    .active-banner .row { display: flex; gap: 8px; }
    .active-banner .row button {
      flex: 1; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text); font-weight: 650; cursor: pointer; font-size: 0.85rem;
    }
    .active-banner .row button.primary { background: var(--accent); color: #04121f; border-color: var(--accent); }

    .player-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--panel); border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 999px; font-size: 0.78rem;
    }
    .player-chip .dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.4); flex: none; }
    .player-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 12px; width: 100%;
      min-height: 48px; cursor: pointer; transition: border-color 0.15s ease;
    }
    .player-row:hover, .player-row:active { border-color: var(--accent); }
    .player-row .dot { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.55); flex: none; }
    .player-row .name { flex: 1; font-size: 0.92rem; }
    .player-row .badge { font-size: 0.66rem; color: var(--muted); padding: 2px 7px; border-radius: 999px; border: 1px solid var(--border); }
    .player-row .remove { background: transparent; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 4px 6px; }
    .player-row.placeholder { color: var(--muted); border-style: dashed; }

    .color-swatches { display: flex; flex-wrap: wrap; gap: 8px; }
    .color-swatch {
      width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--border);
      cursor: pointer; appearance: none; padding: 0;
      transition: transform 0.1s ease, border-color 0.15s ease;
    }
    .color-swatch.selected { border-color: var(--accent); transform: scale(1.12); }
    .color-swatch.disabled { opacity: 0.3; cursor: not-allowed; }

    .sheet-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 50;
    }
    .sheet {
      width: 100%; max-width: 520px;
      background: var(--bg); border-top: 1px solid var(--border);
      border-radius: 18px 18px 0 0;
      padding: 16px 16px calc(20px + env(safe-area-inset-bottom));
      max-height: 88vh; overflow-y: auto;
      display: flex; flex-direction: column; gap: 10px;
    }
    .sheet h3 { margin: 0 0 6px; font-size: 1rem; }
    .sheet .field {
      display: flex; flex-direction: column; gap: 6px;
    }
    .sheet input[type=text] {
      background: var(--panel); border: 1px solid var(--border);
      color: var(--text); padding: 11px 12px; border-radius: 10px; font-size: 1rem;
    }
    .sheet .actions { display: flex; gap: 10px; margin-top: 6px; }
    .sheet .actions button {
      flex: 1; padding: 12px; border-radius: 10px; font-weight: 650;
      border: 1px solid var(--border); background: var(--panel); color: var(--text); cursor: pointer;
    }
    .sheet .actions button.primary { background: var(--accent); color: #04121f; border-color: var(--accent); }
    .sheet .actions button.primary[disabled] { opacity: 0.4; cursor: not-allowed; }

    .toggle-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 12px; width: 100%; max-width: 360px;
      cursor: pointer; font-size: 0.88rem;
    }
    .toggle-row input { width: 18px; height: 18px; accent-color: var(--accent); }
    .toggle-row .desc { color: var(--muted); font-size: 0.74rem; }

    .first-player-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .first-player-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 16px; min-height: 44px;
      border: 1px solid var(--border); background: var(--panel); color: var(--text);
      border-radius: 999px; cursor: pointer; font-size: 0.92rem;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .first-player-btn.selected { background: var(--accent); color: #04121f; border-color: var(--accent); }
    .first-player-btn .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.45); }

    .stepper {
      display: flex; flex-direction: column; gap: 18px; width: 100%; max-width: 420px;
    }
    .stepper section { display: flex; flex-direction: column; gap: 10px; }
    .stepper section h2 {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--muted); margin: 0;
    }
    .stepper .display-value {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px; font-size: 0.92rem; color: var(--text);
    }

    /* GAME screen */
    .game-header {
      width: 100%; max-width: 520px;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 12px;
    }
    .game-header .current { flex: 1; display: flex; align-items: center; gap: 8px; }
    .game-header .current .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.55); }
    .game-header .current .name { font-weight: 700; font-size: 0.95rem; }
    .game-header .turn { color: var(--muted); font-size: 0.8rem; font-variant-numeric: tabular-nums; }
    .game-header .gear {
      background: transparent; border: none; color: var(--text);
      font-size: 1.3rem; padding: 4px 8px; cursor: pointer;
    }
    .tab-bar {
      width: 100%; max-width: 520px;
      display: flex; background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      position: sticky; top: 8px; z-index: 5;
    }
    .tab-bar button {
      flex: 1; padding: 11px 8px; background: transparent;
      border: none; color: var(--muted); font-weight: 650; font-size: 0.88rem;
      cursor: pointer; transition: background 0.12s ease, color 0.12s ease;
    }
    .tab-bar button + button { border-left: 1px solid var(--border); }
    .tab-bar button.active { background: var(--accent); color: #04121f; }

    .tab-panel { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 14px; }

    .dice-block { display: flex; flex-direction: column; gap: 8px; align-items: center; }
    .dice-block .label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); }
    .dice-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; width: 100%; max-width: 360px; }
    .dice-btn {
      min-height: 52px;
      background: var(--panel); border: 1px solid var(--border);
      color: var(--text); font-weight: 700; font-size: 1.1rem;
      border-radius: 10px; cursor: pointer; transition: all 0.1s ease;
    }
    .dice-btn.selected { background: var(--accent); color: #04121f; border-color: var(--accent); transform: scale(1.05); }
    .roll-total {
      width: 100%; max-width: 360px; text-align: center;
      padding: 10px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; font-size: 0.95rem;
    }
    .roll-total b { font-size: 1.4rem; font-weight: 800; color: var(--accent); display: block; margin-top: 2px; }

    .roll-history { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0; width: 100%; max-width: 520px; }
    .roll-chip {
      flex: none; display: inline-flex; align-items: center; gap: 5px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 999px; padding: 5px 10px; font-size: 0.78rem; font-variant-numeric: tabular-nums;
    }
    .roll-chip .dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.45); }
    .roll-chip.seven { border-color: #c01818; color: #ffadad; }

    .dist-chart { width: 100%; max-width: 520px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
    .dist-chart h3 { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); margin: 0 0 8px; }

    /* BUILD tab */
    .hex-picker { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 8px; width: 100%; max-width: 520px; }
    .hex-chip {
      min-height: 48px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
      background: var(--panel); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 6px 4px;
      font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.1s ease;
    }
    .hex-chip .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.4); }
    .hex-chip .num { font-variant-numeric: tabular-nums; }
    .hex-chip .num.red { color: #ff7070; }
    .hex-chip.selected { border-color: var(--accent); background: rgba(61,169,252,0.18); transform: scale(1.04); }
    .hex-chip.disabled { opacity: 0.4; cursor: not-allowed; }

    .piece-summary {
      width: 100%; max-width: 520px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .piece-summary .row {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.85rem; padding: 4px 0;
      border-bottom: 1px dashed var(--border);
    }
    .piece-summary .row:last-child { border-bottom: none; }
    .piece-summary .row .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.45); }
    .piece-summary .row .name { flex: 1; font-weight: 650; }
    .piece-summary .row .counts { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 0.82rem; }

    /* GAME tab — VP tracker */
    .vp-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 12px;
    }
    .vp-row .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.55); flex: none; }
    .vp-row .name { font-weight: 700; flex: 1; font-size: 0.92rem; }
    .vp-row .vp { font-size: 1.5rem; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; min-width: 36px; text-align: right; }
    .vp-row .breakdown { color: var(--muted); font-size: 0.72rem; line-height: 1.4; margin-top: 4px; }
    .vp-row .dev-controls { display: flex; align-items: center; gap: 4px; }
    .vp-row .dev-controls button { width: 26px; height: 26px; padding: 0; border-radius: 6px; border: 1px solid var(--border); background: var(--panel); color: var(--text); font-weight: 700; cursor: pointer; }
    .vp-row .dev-controls span { min-width: 16px; text-align: center; font-variant-numeric: tabular-nums; font-size: 0.85rem; }
    .vp-col { flex: 1; display: flex; flex-direction: column; }

    .ach-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    }
    .ach-row .label { font-size: 0.82rem; flex: 1; }
    .ach-row .holder { color: var(--muted); font-size: 0.82rem; }
    .ach-row .holder.has { color: var(--text); font-weight: 650; }
    .ach-row button {
      background: var(--panel); border: 1px solid var(--border); color: var(--text);
      padding: 6px 10px; border-radius: 8px; font-size: 0.78rem; cursor: pointer;
    }

    .ports-banner {
      width: 100%; max-width: 520px;
      background: #2b3848; border: 1px solid var(--accent);
      border-radius: 12px; padding: 10px 14px;
      font-size: 0.86rem;
    }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center; z-index: 60;
      padding: 16px;
    }
    .modal {
      width: 100%; max-width: 380px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .modal h3 { margin: 0; font-size: 1rem; }
    .modal .row { display: flex; gap: 8px; }
    .modal .row button {
      flex: 1; padding: 11px; border-radius: 10px; font-weight: 650;
      border: 1px solid var(--border); background: var(--panel); color: var(--text); cursor: pointer;
    }
    .modal .row button.primary { background: var(--accent); color: #04121f; border-color: var(--accent); }
    .modal .row button.danger { background: #6b1f1f; color: #ffd6d6; border-color: #8a3030; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
  /* =====================================================================
   *  SECTION 1 — HEX MATH (pure, framework-free)
   * =====================================================================
   *
   *  AXIAL COORDINATE SYSTEM
   *  -----------------------
   *  Every hex is addressed by two axes (q, r) instead of (row, col).
   *  This is the standard "axial" scheme (see redblobgames.com/grids/hexagons).
   *
   *    q  ->  increases to the EAST  (right)
   *    r  ->  increases to the SOUTH-EAST (down-right)
   *
   *  A third implicit axis s = -q - r exists (cube coords) and is handy for
   *  distance math: hexDistance = (|q| + |r| + |q+r|) / 2.
   *
   *  We use POINTY-TOP hexes (a vertex points straight up). With pointy-top,
   *  rows of constant r are horizontal, which is exactly the classic Catan
   *  3-4-5-4-3 layout. The 6 neighbour directions are:
   *
   *        NW   NE
   *          \ /
   *      W ----+---- E          (the top & bottom are VERTICES, not edges)
   *          / \
   *        SW   SE
   *
   *  Pixel conversion for a hex of circumradius `size`:
   *      x = size * sqrt(3) * (q + r/2)
   *      y = size * 3/2 * r
   *  (screen y grows downward, so r = -2 is the top row.)
   * =================================================================== */

  const SQRT3 = Math.sqrt(3);

  // The 6 neighbour directions, indexed 0..5: E, NE, NW, W, SW, SE.
  const DIRECTIONS = [
    { q:  1, r:  0 }, // 0 E
    { q:  1, r: -1 }, // 1 NE
    { q:  0, r: -1 }, // 2 NW
    { q: -1, r:  0 }, // 3 W
    { q: -1, r:  1 }, // 4 SW
    { q:  0, r:  1 }, // 5 SE
  ];

  const hexKey = (q, r) => `${q},${r}`;

  function axialToPixel(q, r, size) {
    return { x: size * SQRT3 * (q + r / 2), y: size * 1.5 * r };
  }

  function hexDistance(a, b) {
    return (Math.abs(a.q - b.q) + Math.abs(a.r - b.r) + Math.abs(a.q + a.r - b.q - b.r)) / 2;
  }

  // Corner k (0..5) of a pointy-top hex centred at (cx, cy).
  function hexCorner(cx, cy, size, k) {
    const angle = (Math.PI / 180) * (60 * k - 30);
    return { x: cx + size * Math.cos(angle), y: cy + size * Math.sin(angle) };
  }

  function hexPolygonPoints(cx, cy, size) {
    return [0, 1, 2, 3, 4, 5]
      .map((k) => { const c = hexCorner(cx, cy, size, k); return `${c.x},${c.y}`; })
      .join(' ');
  }

  // Map a neighbour-direction index -> the edge it sits on, expressed as the
  // pair of corner indices [k, k+1] that bound that edge. Derived from the

  // The 19 hexes of the standard board = a hexagon of radius 2 in axial space.
  function hexagonCoords(radius) {
    const coords = [];
    for (let q = -radius; q <= radius; q++) {
      for (let r = -radius; r <= radius; r++) {
        if (Math.abs(q + r) <= radius) coords.push({ q, r });
      }
    }
    return coords;
  }

  // The one-hex-thick ring of water hexes framing the land board: every hex
  // adjacent to a land hex that isn't itself land. Works for any board shape.
  function waterRing(hexes) {
    const land = new Set(hexes.map((h) => hexKey(h.q, h.r)));
    const seen = new Set();
    const water = [];
    hexes.forEach((h) => {
      DIRECTIONS.forEach((d) => {
        const q = h.q + d.q, r = h.r + d.r, k = hexKey(q, r);
        if (!land.has(k) && !seen.has(k)) { seen.add(k); water.push({ q, r }); }
      });
    });
    return water;
  }

  // --- Helpers shared by the larger Phase 2 boards -------------------------

  // Smallest signed difference between two angles (radians), in (-pi, pi].
  function angleDelta(a, b) {
    let d = a - b;
    while (d > Math.PI) d -= 2 * Math.PI;
    while (d < -Math.PI) d += 2 * Math.PI;
    return d;
  }

  // The 5–6 player board: an elongated hexagon, rows 3-4-5-6-5-4-3 = 30 hexes.
  function board56Coords() {
    const coords = [];
    for (let r = -3; r <= 3; r++) {
      const qMin = Math.max(-3, -3 - r);
      const qMax = Math.min(2, 2 - r);
      for (let q = qMin; q <= qMax; q++) coords.push({ q, r });
    }
    return coords;
  }

  // Evenly distribute `count` ports around the perimeter of any hex set,
  // producing the same { q, r, dir } data shape Phase 1 wrote out by hand.
  // dir is the outward-facing neighbour direction (its hex is off-board).
  function autoPorts(hexes, count) {
    const set = new Set(hexes.map((h) => hexKey(h.q, h.r)));
    let cx = 0, cy = 0;
    hexes.forEach((h) => { const p = axialToPixel(h.q, h.r, 1); cx += p.x; cy += p.y; });
    cx /= hexes.length; cy /= hexes.length;

    // Perimeter hexes (at least one off-board neighbour), ordered clockwise.
    const perim = hexes
      .filter((h) => DIRECTIONS.some((d) => !set.has(hexKey(h.q + d.q, h.r + d.r))))
      .map((h) => {
        const p = axialToPixel(h.q, h.r, 1);
        return { q: h.q, r: h.r, ang: Math.atan2(p.y - cy, p.x - cx) };
      })
      .sort((a, b) => a.ang - b.ang);

    const ports = [];
    for (let i = 0; i < count; i++) {
      const h = perim[Math.floor((i * perim.length) / count)];
      const p = axialToPixel(h.q, h.r, 1);
      const radial = Math.atan2(p.y - cy, p.x - cx);
      // Outward edge = the off-board edge whose midpoint best matches the radial.
      let bestDir = null, best = Infinity;
      DIRECTIONS.forEach((d, di) => {
        if (set.has(hexKey(h.q + d.q, h.r + d.r))) return; // inward edge, skip
        const midAngle = (Math.PI / 180) * (60 * DIR_TO_EDGE[di]);
        const diff = Math.abs(angleDelta(midAngle, radial));
        if (diff < best) { best = diff; bestDir = di; }
      });
      ports.push({ q: h.q, r: h.r, dir: bestDir });
    }
    return ports;
  }

  // Build a layout from named-region coord groups. Each region's hexes are
  // tagged with the region name so per-region tile pools can find them.
  // `locked` is an array of explicit hex specs that bypass randomization —
  // e.g. { q, r, type: 'gold', token: 9 } or { type: 'fields', noToken: true }.
  // `fog` is shorthand for "lock these hexes as type 'fog'" (face-down).
  function buildLayout({ sea = [], port = [], desert = [], regions = {}, locked = [], fog = [] }) {
    const layout = [];
    sea.forEach(([q, r]) => layout.push({ q, r, type: 'sea' }));
    port.forEach(([q, r]) => layout.push({ q, r, type: 'sea' })); // port hexes are sea hexes
    desert.forEach(([q, r]) => layout.push({ q, r, type: 'desert' }));
    fog.forEach(([q, r]) => layout.push({ q, r, type: 'fog' }));
    for (const [region, coords] of Object.entries(regions)) {
      coords.forEach(([q, r]) => layout.push({ q, r, type: 'random', region }));
    }
    locked.forEach((h) => {
      const existingIdx = layout.findIndex((e) => e.q === h.q && e.r === h.r);
      if (h.type === null || h.type === undefined) {
        // Merge mode (Cloth for Catan): the locked entry only adds tokens to a
        // hex already declared elsewhere (e.g. a desert from the `desert` array).
        if (existingIdx >= 0) {
          if (h.token !== undefined) layout[existingIdx].token = h.token;
          if (h.token2 !== undefined) layout[existingIdx].token2 = h.token2;
          if (h.noToken !== undefined) layout[existingIdx].noToken = h.noToken;
        }
      } else {
        // Replace mode: locked spec wins over any earlier entry at this coord
        // (e.g. a 1-hex island region overridden by a locked gold tile).
        if (existingIdx >= 0) layout.splice(existingIdx, 1);
        layout.push({
          q: h.q, r: h.r, type: h.type,
          token: h.token, token2: h.token2, noToken: h.noToken,
          region: h.region, // optional: lets locked hexes join a per-region token pool
        });
      }
    });
    return layout;
  }

  // Phase D: convert a portDirections map ({"q,r": dir}) — matching the user's
  // spec format — into an array of {q,r,dir} the renderer expects. Each `dir`
  // is in the user convention (0=E,1=SE,2=SW,3=W,4=NW,5=NE) and points from
  // the sea hex toward the adjacent land hex it serves.
  function PORT_DIRS(map) {
    return Object.entries(map).map(([k, dir]) => {
      const [q, r] = k.split(',').map(Number);
      return { q, r, dir };
    });
  }

  // Resolve a sea-hex port spec to {q,r,dir} the renderer expects: anchored
  // on the adjacent land hex with `dir` pointing at the sea hex so the port
  // marker renders on the sea tile facing inward to the land it serves.
  // (Legacy auto-detection helper — new scenarios should supply explicit
  // portDirections data per the Phase D spec.)
  function resolveSeaPort(sea, landSet) {
    for (let di = 0; di < DIRECTIONS.length; di++) {
      const d = DIRECTIONS[di];
      const lq = sea.q - d.q, lr = sea.r - d.r;
      if (landSet.has(hexKey(lq, lr))) return { q: lq, r: lr, dir: di };
    }
    return null;
  }

  // correctly after the Port component switched to the user convention.
  const MY_TO_USER_DIR = [0, 5, 4, 3, 2, 1];
  function landPortToSea(p) {
    const d = DIRECTIONS[p.dir];
    return {
      q: p.q + d.q,
      r: p.r + d.r,
      dir: (MY_TO_USER_DIR[p.dir] + 3) % 6, // opposite, then translate to user convention
    };
  }

  // -- Heading for New Shores - 3 player ---------------------------------
  const HFNS_3P_LAYOUT = buildLayout({

   *  TRADERS & BARBARIANS + FISHING ON CATAN
   * =====================================================================
   *  All 10 scenarios from the Traders & Barbarians expansion + Fishing on
   *  Catan, in the user's hex-mapper JSON shape:
   *    sea / main / inner / port — coord lists
   *    locked — fixed-coord tile placements (castles, quarries, river hexes,
   *             fishing grounds, watering holes, etc.)
   *    portDirections — explicit { dir } per port (user dir convention)
   *
   *  noToken rule (matches the rulebook tile counts):
   *    - castle / quarry / glassworks / desert / watering_hole / swamp_river
   *      never get a number disc.
   *    - mountain_river / hills_river / pasture_river DO get standard discs.
   *    - fishing_grounds get a disc from a dedicated fishing pool (region:
   *      'fishing' + tokensPerRegion.fishing).

  // Tile types that NEVER get a disc, regardless of scenario.
  const TB_NO_TOKEN_TYPES = new Set([
    'castle', 'quarry', 'glassworks', 'watering_hole', 'swamp_river',
  ]);

  // Convert a hex-mapper JSON spec to a buildLayout() call.
  function tbBuildLayout(spec, { region = {} } = {}) {
    const regions = spec.inner
      ? { main: spec.main, inner: spec.inner }
      : { main: spec.main };
    return buildLayout({
      sea: spec.sea,
      port: spec.port,
      regions,
      locked: Object.values(spec.locked).map((h) => ({
        q: h.q, r: h.r,
        type: h.tile,
        noToken: TB_NO_TOKEN_TYPES.has(h.tile) || h.tile === 'desert',
        region: region[h.tile],
      })),
    });
  }
  // Convert a portDirections map → [{q,r,dir}, ...] in the Phase D format.
  function tbPortDirs(spec) {
    return Object.entries(spec.portDirections).map(([k, v]) => {
      const [q, r] = k.split(',').map(Number);
      return { q, r, dir: v.dir };
    });
  }
  // Standard Catan port mix: 5 specific 2:1 + (count − 5) generic 3:1.
  function tbPortTypes(count) {
    const out = ['wood', 'brick', 'ore', 'grain', 'wool'];
    while (out.length < count) out.push('3:1');
    return out;
  }
