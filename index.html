        const hexKeys = sorted.filter((kk) => landSet.has(kk));
        const c = hexCorner(cx, cy, HEX_SIZE, k);
        out.push({ x: c.x, y: c.y, hexKeys, key });
      }
    });
    return out;
  }
  function buildEdgeIndex(tiles, water = []) {
    // `tiles` = land hexes (settlements/cities/roads care about these).
    // `water` = optional sea hexes (ships use these to surface open-sea edges).
    // `hexKeys` on each returned entry is filtered to LAND-only so resource
    // math and placement comparisons stay consistent. `key` is the structural
    // sorted pair of ALL coords (land or sea) for stable occupancy checks.
    const landSet = new Set(tiles.map((t) => hexKey(t.q, t.r)));
    const seen = new Set();
    const out = [];
    const anchors = [...tiles, ...water];
    anchors.forEach((t) => {
      const { x: cx, y: cy } = axialToPixel(t.q, t.r, HEX_SIZE);
      for (let k = 0; k < 6; k++) {
        const di = EDGE_NEIGHBOR_DIR[k];
        const d = DIRECTIONS[di];
        const nq = t.q + d.q;
        const nr = t.r + d.r;
        const allKeys = [hexKey(t.q, t.r), hexKey(nq, nr)];
        const sorted = allKeys.slice().sort();
        const key = sorted.join('|');
        if (seen.has(key)) continue;
        seen.add(key);
        const hexKeys = sorted.filter((kk) => landSet.has(kk));
        const c1 = hexCorner(cx, cy, HEX_SIZE, k);
        const c2 = hexCorner(cx, cy, HEX_SIZE, (k + 1) % 6);
        const mx = (c1.x + c2.x) / 2;
        const my = (c1.y + c2.y) / 2;
        out.push({ mx, my, c1, c2, hexKeys, key });
      }
    });
    return out;
  }

  // Parse "q1,r1|q2,r2|q3,r3" -> [{q,r}, ...]
  function parseHexKeyList(key) {
    if (!key) return [];
    return key.split('|').map((s) => {
      const [q, r] = s.split(',').map(Number);
      return { q, r };
    });
  }

  // Pixel position of a vertex given its placement. Prefers the structural
  // vertexKey (which encodes all 3 hex coords, including off-board ones —
  // critical for boundary corners). Falls back to land-only hexKeys for
  // legacy placements from before that field was stored.
  function vertexPixel(placement, tiles) {
    const coords = placement?.vertexKey
      ? parseHexKeyList(placement.vertexKey)
      : (placement?.hexKeys || []).map((k) => {
          const [q, r] = k.split(',').map(Number);
          return { q, r };
        });
    if (coords.length === 0) return null;
    const landSet = new Set(tiles.map((t) => hexKey(t.q, t.r)));
    // Find any anchor land hex from the coord list.
    const anchor = coords.find((c) => landSet.has(hexKey(c.q, c.r)));
    if (!anchor) return null;
    // For anchor (q,r), find the corner k whose neighbour-set matches the
    // remaining listed coords.
    const others = coords
      .filter((c) => !(c.q === anchor.q && c.r === anchor.r))
      .map((c) => hexKey(c.q, c.r));
    const otherSet = new Set(others);
    const { x: cx, y: cy } = axialToPixel(anchor.q, anchor.r, HEX_SIZE);
    for (let k = 0; k < 6; k++) {
      const dirs = CORNER_NEIGHBOR_DIRS[k];
      const expected = dirs.map((di) => {
        const d = DIRECTIONS[di];
        return hexKey(anchor.q + d.q, anchor.r + d.r);
      });
      // All others must be in `expected`, and the expected count must match.
      if (others.every((o) => expected.includes(o))) {
        // Prefer a stricter match (same length), but accept superset for legacy.
        if (others.length === expected.length || placement?.vertexKey) {
          return hexCorner(cx, cy, HEX_SIZE, k);
        }
      }
    }
    // Legacy fallback: any corner whose expected set is a superset of `others`.
    for (let k = 0; k < 6; k++) {
      const dirs = CORNER_NEIGHBOR_DIRS[k];
      const expected = dirs.map((di) => {
        const d = DIRECTIONS[di];
        return hexKey(anchor.q + d.q, anchor.r + d.r);
      });
      if (others.every((o) => expected.includes(o))) {
        return hexCorner(cx, cy, HEX_SIZE, k);
      }
    }
    // Shouldn't happen, but return SOMETHING rather than crash.
    return hexCorner(cx, cy, HEX_SIZE, 0);
  }

  // Pixel endpoints of an edge given its placement. Same approach as
  // vertexPixel: parse the structural edgeKey for the full pair of hex
  // coords (one of which may be off-board), then walk the anchor's 6 edges
  // looking for the one whose neighbour matches.
  function edgePixelEndpoints(placement, tiles, water = []) {
    const coords = placement?.edgeKey
      ? parseHexKeyList(placement.edgeKey)
      : (placement?.hexKeys || []).map((k) => {
          const [q, r] = k.split(',').map(Number);
          return { q, r };
        });
    if (coords.length === 0) return null;
    // Look in land tiles first, then water (so we still anchor on land for
    // historical coastal placements). For ships on open sea, both coords are
    // in water — we fall through to the second pass.
    const landSet = new Set(tiles.map((t) => hexKey(t.q, t.r)));
    const waterSet = new Set(water.map((w) => hexKey(w.q, w.r)));
    const anyAnchorSet = new Set([...landSet, ...waterSet]);
    const anchor = coords.find((c) => anyAnchorSet.has(hexKey(c.q, c.r)));
    if (!anchor) return null;
    const other = coords.find((c) => !(c.q === anchor.q && c.r === anchor.r));
    const { x: cx, y: cy } = axialToPixel(anchor.q, anchor.r, HEX_SIZE);
    if (!other) {
      // No second coord (very legacy data). Fall back to east edge.
      const c1 = hexCorner(cx, cy, HEX_SIZE, 0);
      const c2 = hexCorner(cx, cy, HEX_SIZE, 1);
      return { c1, c2 };
    }
    const otherKey = hexKey(other.q, other.r);
    for (let k = 0; k < 6; k++) {
      const di = EDGE_NEIGHBOR_DIR[k];
      const d = DIRECTIONS[di];
      const neighborKey = hexKey(anchor.q + d.q, anchor.r + d.r);
      if (neighborKey === otherKey) {
        return {
          c1: hexCorner(cx, cy, HEX_SIZE, k),
          c2: hexCorner(cx, cy, HEX_SIZE, (k + 1) % 6),
        };
      }
    }
    // Legacy fallback for placements stored before structural keys: use the
    // edge whose midpoint is geometrically closest to the other hex centre.
    const { x: ox, y: oy } = axialToPixel(other.q, other.r, HEX_SIZE);
    let bestK = 0, bestD = Infinity;
    for (let k = 0; k < 6; k++) {
      const c1 = hexCorner(cx, cy, HEX_SIZE, k);
      const c2 = hexCorner(cx, cy, HEX_SIZE, (k + 1) % 6);
      const mx = (c1.x + c2.x) / 2;
      const my = (c1.y + c2.y) / 2;
      const d = Math.hypot(mx - ox, my - oy);
      if (d < bestD) { bestD = d; bestK = k; }
    }
    return {
      c1: hexCorner(cx, cy, HEX_SIZE, bestK),
      c2: hexCorner(cx, cy, HEX_SIZE, (bestK + 1) % 6),
    };
  }

  // The interactive board picker. Renders the existing Board layout + an
  // overlay layer for the requested mode and any previously-placed pieces.
  //
  // onSelect(item)             - empty vertex / edge / hex tapped
  // onSelectPlacement(pl)      - existing settlement / city / road tapped
  //                               (lets the caller open an edit modal)
  function BoardPicker({
    board, mode, selectedKey, onSelect, onSelectPlacement,
    placements = [], players = [],
    robberHexKey = null, pirateHexKey = null,
    allowRobberPickEverywhere = false,
    includeWaterEdges = false,
  }) {
    const verts = React.useMemo(
      () => mode === 'vertex' ? buildVertexIndex(board.tiles) : [],
      [board, mode]
    );
    const edges = React.useMemo(
      () => mode === 'edge'
        ? buildEdgeIndex(board.tiles, includeWaterEdges ? board.water : [])
        : [],
      [board, mode, includeWaterEdges]
    );
    const playerColor = (pid) => players.find((p) => p.id === pid)?.color || '#fff';

    // Map every occupied vertex / edge to its placement so the interactive
    // overlay can either skip it (no double-placing) or hand the existing
    // piece off to the edit handler. Prefer the structural vertex/edge key
    // (stable across all rendering paths) and fall back to land-only
    // hexKeys for legacy placements stored before that field existed.
    const vertexPlacements = new Map();
    const edgePlacements = new Map();
    placements.forEach((pl) => {
      if (pl.type === 'settlement' || pl.type === 'city') {
        const k = pl.vertexKey || vertexKeyFrom(pl.hexKeys);
        vertexPlacements.set(k, pl);
      } else if (pl.type === 'road' && pl.hexKeys?.length) {
        const k = pl.edgeKey || edgeKeyFrom(pl.hexKeys);
        edgePlacements.set(k, pl);
      }
    });

    // ViewBox math identical to <Board>.
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    [...board.water, ...board.tiles].forEach((h) => {
      const { x, y } = axialToPixel(h.q, h.r, HEX_SIZE);
      minX = Math.min(minX, x); maxX = Math.max(maxX, x);
      minY = Math.min(minY, y); maxY = Math.max(maxY, y);
    });
    const pad = HEX_SIZE * 1.2;
    const vbX = minX - pad, vbY = minY - pad;
    const vbW = (maxX - minX) + pad * 2, vbH = (maxY - minY) + pad * 2;

    // Render existing settlements / cities / roads. Pass the full placement
    // so vertexPixel / edgePixelEndpoints can use the structural key for
    // coastal / boundary spots where land-only hexKeys would be ambiguous.
    const settlementPieces = placements
      .filter((pl) => pl.type === 'settlement' || pl.type === 'city')
      .map((pl) => ({ pl, pos: vertexPixel(pl, board.tiles) }))
      .filter((x) => x.pos);
    const roadPieces = placements
      .filter((pl) => (pl.type === 'road' || pl.type === 'ship') && (pl.edgeKey || pl.hexKeys?.length))
      .map((pl) => ({ pl, ends: edgePixelEndpoints(pl, board.tiles, board.water) }))
      .filter((x) => x.ends);
    const piratePixel = (() => {
      const pk = board.pirateHexKey || null; // optional
      return null; // unused; pirate marker handled below from prop
    })();

    const robberTile = robberHexKey
      ? board.tiles.find((t) => hexKey(t.q, t.r) === robberHexKey)
      : null;

    return (
      <svg viewBox={`${vbX} ${vbY} ${vbW} ${vbH}`} role="img" aria-label="Catan board (interactive)">
        {board.water.map((w) => <WaterHex key={hexKey(w.q, w.r)} hex={w} />)}
        {board.tiles.map((t) => <Hex key={hexKey(t.q, t.r)} tile={t} />)}
        {board.ports.map((p, i) => <Port key={i} port={p} />)}

        {/* Roads + ships render first, so settlements draw on top. Ships use
            a dashed pattern so they read visually distinct from roads. */}
        {roadPieces.map(({ pl, ends }) => {
          const isShip = pl.type === 'ship';
          const midX = (ends.c1.x + ends.c2.x) / 2;
          const midY = (ends.c1.y + ends.c2.y) / 2;
          return (
            <g key={pl.id}
              style={{ cursor: onSelectPlacement ? 'pointer' : 'default' }}
              onClick={onSelectPlacement ? (e) => { e.stopPropagation(); onSelectPlacement(pl); } : undefined}>
              <line
                x1={ends.c1.x} y1={ends.c1.y} x2={ends.c2.x} y2={ends.c2.y}
                stroke={playerColor(pl.playerId)} strokeWidth={6} strokeLinecap="round"
                strokeDasharray={isShip ? '6 4' : undefined}
                opacity={0.95} />
              {isShip && (
                <text x={midX} y={midY + 4} textAnchor="middle" dominantBaseline="central"
                  fontSize={12} pointerEvents="none">⚓</text>
              )}
            </g>
          );
        })}
        {settlementPieces.map(({ pl, pos }) => (
          <g key={pl.id}
            style={{ cursor: onSelectPlacement ? 'pointer' : 'default' }}
            onClick={onSelectPlacement ? (e) => { e.stopPropagation(); onSelectPlacement(pl); } : undefined}>
            {pl.type === 'city' ? (
              <rect x={pos.x - 8} y={pos.y - 8} width={16} height={16}
                fill={playerColor(pl.playerId)} stroke="#0c1116" strokeWidth={1.5} rx={2} />
            ) : (
              <circle cx={pos.x} cy={pos.y} r={7.5}
                fill={playerColor(pl.playerId)} stroke="#0c1116" strokeWidth={1.5} />
            )}
          </g>
        ))}

        {/* Robber marker. */}
        {robberTile && (() => {
          const { x, y } = axialToPixel(robberTile.q, robberTile.r, HEX_SIZE);
          return (
            <g>
              <circle cx={x} cy={y + HEX_SIZE * 0.05} r={HEX_SIZE * 0.32}
                fill="#1b1b1b" stroke="#000" strokeWidth={1} opacity={0.85} />
              <text x={x} y={y + HEX_SIZE * 0.07} textAnchor="middle" dominantBaseline="central"
                fontSize={HEX_SIZE * 0.45} fontWeight="800" fill="#f7f7f7">R</text>
            </g>
          );
        })()}
        {/* Pirate marker (sea hex). */}
        {pirateHexKey && (() => {
          const waterTile = board.water?.find((w) => hexKey(w.q, w.r) === pirateHexKey);
          if (!waterTile) return null;
          const { x, y } = axialToPixel(waterTile.q, waterTile.r, HEX_SIZE);
          return (
            <g>
              <circle cx={x} cy={y + HEX_SIZE * 0.05} r={HEX_SIZE * 0.32}
                fill="#2a0a0a" stroke="#000" strokeWidth={1} opacity={0.9} />
              <text x={x} y={y + HEX_SIZE * 0.07} textAnchor="middle" dominantBaseline="central"
                fontSize={HEX_SIZE * 0.5}>☠</text>
            </g>
          );
        })()}

        {/* Interactive overlay — only empty vertices / edges show as
            tappable picks. Occupied ones are represented by their
            placement markers (above), which themselves are tappable
            via onSelectPlacement. */}
        {mode === 'vertex' && verts
          .filter((v) => !vertexPlacements.has(v.key))
          .map((v) => {
            const isSelected = v.key === selectedKey;
            return (
              <circle key={v.key} cx={v.x} cy={v.y}
                r={isSelected ? 10 : 6}
                fill={isSelected ? 'var(--accent)' : 'rgba(247, 247, 247, 0.45)'}
                stroke="#0c1116" strokeWidth={1.5}
                style={{ cursor: 'pointer' }}
                onClick={() => onSelect(v)} />
            );
          })}
        {mode === 'edge' && edges
          .filter((e) => !edgePlacements.has(e.key))
          .map((e) => {
            const isSelected = e.key === selectedKey;
            return (
              <line key={e.key}
                x1={e.c1.x} y1={e.c1.y} x2={e.c2.x} y2={e.c2.y}
                stroke={isSelected ? 'var(--accent)' : 'rgba(247, 247, 247, 0.35)'}
                strokeWidth={isSelected ? 7 : 4}
                strokeLinecap="round"
                style={{ cursor: 'pointer' }}
                onClick={() => onSelect(e)} />
            );
          })}
        {mode === 'hex' && board.tiles
          .filter((t) => allowRobberPickEverywhere || HEX_RESOURCE[t.resource] || t.resource === 'desert')
          .map((t) => {
            const k = hexKey(t.q, t.r);
            const { x, y } = axialToPixel(t.q, t.r, HEX_SIZE);
            const isSelected = k === selectedKey;
            return (
              <polygon key={k}
                points={hexPolygonPoints(x, y, HEX_SIZE)}
                fill={isSelected ? 'rgba(61, 169, 252, 0.35)' : 'transparent'}
                stroke={isSelected ? 'var(--accent)' : 'rgba(247,247,247,0.0)'}
                strokeWidth={isSelected ? 3 : 0}
                style={{ cursor: 'pointer' }}
                onClick={() => onSelect({ hexKey: k, q: t.q, r: t.r })} />
            );
          })}
        {/* 'sea' mode: pick a sea hex (pirate placement). */}
        {mode === 'sea' && (board.water || []).map((w) => {
          const k = hexKey(w.q, w.r);
          const { x, y } = axialToPixel(w.q, w.r, HEX_SIZE);
          const isSelected = k === selectedKey;
          return (
            <polygon key={k}
              points={hexPolygonPoints(x, y, HEX_SIZE)}
              fill={isSelected ? 'rgba(192,24,24,0.35)' : 'transparent'}
              stroke={isSelected ? '#c01818' : 'rgba(247,247,247,0.0)'}
              strokeWidth={isSelected ? 3 : 0}
              style={{ cursor: 'pointer' }}
              onClick={() => onSelect({ hexKey: k, q: w.q, r: w.r })} />
          );
        })}
      </svg>
    );
  }

  // Legend shows only the hex types present on the current board (so Seafarers
  // adds Gold/Fog automatically). For the base game this yields the same
  // six terrains + Water as before.
  function Legend({ board }) {
    const present = new Set(board.tiles.map((t) => t.resource));
    const order = [
      'fields', 'forest', 'pasture', 'mountains', 'hills', 'desert', 'gold', 'fog',
      // Traders & Barbarians + Fishing types:
      'mountain_river', 'hills_river', 'pasture_river', 'swamp_river',
      'lake_a', 'lake_b', 'fishing_grounds',
      'watering_hole', 'castle', 'quarry', 'glassworks',
    ];
    const items = order.filter((k) => present.has(k));
    // Collapse lake_a + lake_b into one "Lake" legend entry when both present.
    const dedup = [];
    const seen = new Set();
    items.forEach((k) => {
      const label = RESOURCES[k].label;
      if (seen.has(label)) return;
      seen.add(label);
      dedup.push(k);
    });
    dedup.push('water');
    return (
      <div className="legend">
        {dedup.map((k) => (
          <span key={k}>
            <i style={{ background: RESOURCES[k].color }} />
            {RESOURCES[k].label}
          </span>
        ))}
      </div>
    );
  }

  // "Set Up Your Board" — physical tiles + number-token chits for the current
  // map. Counts are read off the generated board, so it refreshes on every
  // regenerate / board switch. Tiles listed in physical-setup order.
  function SetupList({ board }) {
    const tileCounts = {};
    board.tiles.forEach((t) => { tileCounts[t.resource] = (tileCounts[t.resource] || 0) + 1; });

    // "Number Tokens" — standard land discs only. Fishing-grounds discs come
    // from a separate pool and are listed under their own heading; lake hexes
    // carry embedded discs printed on the tile itself (not chits).
    const tokenCounts = {};
    board.tiles.forEach((t) => {
      if (t.token !== null && t.resource !== 'fishing_grounds') {
        tokenCounts[t.token] = (tokenCounts[t.token] || 0) + 1;
      }
    });
    const tokenOrder = Object.keys(tokenCounts).map(Number).sort((a, b) => a - b);

    const TILE_ORDER = [
      'forest', 'pasture', 'fields', 'hills', 'mountains', 'desert', 'gold', 'fog',
      // Traders & Barbarians + Fishing types:
      'mountain_river', 'hills_river', 'pasture_river', 'swamp_river',
      'lake_a', 'lake_b', 'fishing_grounds',
      'watering_hole', 'castle', 'quarry', 'glassworks',
    ];
    const rows = TILE_ORDER
      .filter((k) => tileCounts[k])
      .map((k) => ({ key: k, ...RESOURCES[k], qty: tileCounts[k] }));

    // Port markers are now sea-anchored (Phase D): port.{q,r} IS the sea hex
    // hosting the marker. Split the water frame into plain water vs. those
    // "Port Hex" tiles (a separate 3D print).
    const portHexKeys = new Set(board.ports.map((p) => hexKey(p.q, p.r)));
    const portHexCount = board.water.filter((w) => portHexKeys.has(hexKey(w.q, w.r))).length;
    rows.push({ key: 'water', ...RESOURCES.water, qty: board.water.length - portHexCount });
    rows.push({ key: 'portHex', ...RESOURCES.portHex, qty: portHexCount });

    return (
      <div className="setup">
        <h2>Set Up Your Board</h2>
        <div className="setup-group">
          <h3>Tiles</h3>
          <ul>
            {rows.map((row) => (
              <li key={row.key}>
                <span className="name">
                  <i className="swatch" style={{ background: row.color }} />
                  {row.setup}
                </span>
                <span className="qty">×{row.qty}</span>
              </li>
            ))}
          </ul>
        </div>
        <div className="setup-group">
          <h3>Number Tokens</h3>
          <p className="tokens-line">
            {tokenOrder.map((n) => `${n} ×${tokenCounts[n]}`).join(',  ')}
          </p>
        </div>
        {board.config?.fishingTokens && (
          <div className="setup-group">
            <h3>Fishing Tokens</h3>
            <p className="tokens-line">{board.config.fishingTokens.join(', ')}</p>
          </div>
        )}
        {board.config?.fogPool && (
          <div className="setup-group">
            <h3>Fog Pool (face-down)</h3>
            <ul>
              {Object.entries(board.config.fogPool)
                .filter(([, n]) => n > 0)
                .map(([k, n]) => (
                  <li key={k}>
                    <span className="name">
                      <i className="swatch" style={{ background: RESOURCES[k].color }} />
                      {RESOURCES[k].setup || RESOURCES[k].label}
                    </span>
                    <span className="qty">×{n}</span>
                  </li>
                ))}
            </ul>
            <h3 style={{ marginTop: 14 }}>Fog Tokens (place when revealed)</h3>
            <p className="tokens-line">{board.config.fogTokens.join(', ')}</p>
          </div>
        )}
      </div>
    );
  }

  /* =====================================================================
   *  STAT TRACKER — persistence + helpers
   * =====================================================================
   *  localStorage shape:
   *    "catan_roster"      — array<{id, name, color, isGuest}>
   *    "catan_active_game" — single in-progress game object (or null)
   *    "catan_games"       — array of completed game objects
   *
   *  All helpers are pure JS — no React deps — so they can be reused by the
   *  GAME and stats screens added in Phases B/C.
   * =================================================================== */

  /* =====================================================================
   *  SEAFARERS STAT-TRACKER META (Tier 1 scenarios)
   * =====================================================================
   *  Scenarios that have an entry here unlock the full Seafarers feature
   *  set in the tracker: island VP, pirate alongside robber, home-island
   *  selection. Tier 2+ Seafarers scenarios (Fog, Forgotten, Pirate,
   *  Cloth, Wonders) still get the FOUNDATION features that are gated by
   *  `game.expansion.category === 'seafarers'` directly (ships + gold
   *  production) but skip the meta-gated behaviour.
   * =================================================================== */
  const SEAFARERS_META = {
    'new-shores': {
      islandVPPerRegion: 2,
      playerChoosesHome: false,
      fixedHomeRegions: ['main'],
      hasPirate: true,
      defaultVPTarget: 13,
    },
    'four-islands': {
      islandVPPerRegion: 2,
      playerChoosesHome: true,
      maxHomeIslands: 2,
      fixedHomeRegions: [],
      hasPirate: true,
      defaultVPTarget: 13,
    },
    'through-desert': {
      islandVPPerRegion: 2,
      playerChoosesHome: false,
      fixedHomeRegions: ['main'],
      hasPirate: true,
      defaultVPTarget: 14,
    },
    // New World has no scenarioId — meta lookup falls through to boardId.
    'new_world_34p': {
      islandVPPerRegion: 1,
      playerChoosesHome: true,
      maxHomeIslands: 2,
      fixedHomeRegions: [],
      hasPirate: true,
      defaultVPTarget: 13,
    },
    'new_world_56p': {
      islandVPPerRegion: 1,
      playerChoosesHome: true,
      maxHomeIslands: 2,
      fixedHomeRegions: [],
      hasPirate: true,
      defaultVPTarget: 13,
    },
  };

  // Map the in-app scenario KEY (from GeneratorView's boardMeta.sfKey, e.g.
  // 'hns', 'fi', 'six', 'desert') to the SEAFARERS_META scenarioId.
  // Scenarios that aren't in this table use boardId-based lookup or fall
  // back to "no meta" (foundation features only).
  const SF_KEY_TO_SCENARIO_ID = {
    hns:    'new-shores',
    fi:     'four-islands',
    six:    'four-islands',   // Six Islands shares the Four-Islands ruleset.
    desert: 'through-desert',
    // newworld → no entry; meta lookup uses boardId (new_world_34p / _56p).
  };

  function getSeafarersMeta(game) {
    if (game?.expansion?.category !== 'seafarers') return null;
    const sid = game.expansion.scenarioId;
    const bid = game.expansion.boardId;
    return SEAFARERS_META[sid] || SEAFARERS_META[bid] || null;
  }

  // Compute connected land-hex island components for a board.
  // Returns { [hexKey]: islandId } where islandId is either the tile's
  // explicit `region` (if it starts with "island") or the lex-smallest
  // hexKey in its flood-filled component.
  function computeIslandComponents(board) {
    const result = {};
    if (!board?.tiles) return result;
    const landByKey = {};
    board.tiles.forEach((t) => {
      if (t.type === 'sea' || t.resource === 'desert' || t.resource === 'fog') return;
      landByKey[hexKey(t.q, t.r)] = t;
    });
    const NEIGHBORS = [[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
    const neighbors = (q, r) => NEIGHBORS.map(([dq, dr]) => hexKey(q + dq, r + dr));
    const assigned = {};
    Object.values(landByKey).forEach((tile) => {
      const k = hexKey(tile.q, tile.r);
      if (assigned[k]) return;
      const region = tile.region;
      const isIslandNamed = region && /^island/i.test(region);
      if (isIslandNamed) {
        assigned[k] = region;
        result[k] = region;
        return;
      }
      // Flood-fill connected land hexes (don't cross into named-island land).
      const component = [];
      const queue = [k];
      const visited = new Set([k]);
      while (queue.length) {
        const cur = queue.shift();
        component.push(cur);
        const [cq, cr] = cur.split(',').map(Number);
        neighbors(cq, cr).forEach((nk) => {
          if (visited.has(nk) || !landByKey[nk]) return;
          const nr = landByKey[nk].region;
          if (nr && /^island/i.test(nr)) return; // boundary with named region
          visited.add(nk);
          queue.push(nk);
        });
      }
      const islandId = component.slice().sort()[0];
      component.forEach((ck) => { assigned[ck] = islandId; result[ck] = islandId; });
    });
    return result;
  }

  // Given the island map + a list of region names, return the set of
  // island IDs whose tiles fall in any of those regions. Used to
  // pre-populate `homeIslands` for fixed-home scenarios (HNS, Desert).
  function islandsForRegions(board, islandComponents, regions) {
    if (!board?.tiles || !regions?.length) return [];
    const out = new Set();
    board.tiles.forEach((t) => {
      if (!regions.includes(t.region)) return;
      const id = islandComponents[hexKey(t.q, t.r)];
      if (id) out.add(id);
    });
    return Array.from(out);
  }

  // Sorted island IDs + A/B/C labels for the home-island picker UI.
  function labelIslands(islandComponents) {
    const ids = Array.from(new Set(Object.values(islandComponents))).sort();
    const labels = {};
    ids.forEach((id, i) => {
      // A..Z, then AA, AB, ... in case we ever get more than 26.
      labels[id] = i < 26 ? String.fromCharCode(65 + i)
        : String.fromCharCode(65 + Math.floor(i / 26) - 1) + String.fromCharCode(65 + (i % 26));
    });
    return { ids, labels };
  }

  const ROSTER_KEY = 'catan_roster';
  const ACTIVE_GAME_KEY = 'catan_active_game';
  const GAMES_KEY = 'catan_games';

  // Eight pre-set player colours. Order matters — this is the palette grid
  // shown in the picker. Color is now chosen FRESH per game, not stored on
  // roster entries (those are name + id only).
  const PLAYER_COLORS = [
    { name: 'Orange', hex: '#F4A261' },
    { name: 'Green',  hex: '#2D6A4F' },
    { name: 'Red',    hex: '#E63946' },
    { name: 'Yellow', hex: '#E9C46A' },
    { name: 'Cyan',   hex: '#4DD0E1' },
    { name: 'Blue',   hex: '#457B9D' },
    { name: 'White',  hex: '#F1FAEE' },
    { name: 'Purple', hex: '#6A4C93' },
  ];

  // Safe JSON read with a default. localStorage may throw under privacy
  // settings, so wrap every access.
  function lsRead(key, fallback) {
    try {
      const v = window.localStorage.getItem(key);
      return v == null ? fallback : JSON.parse(v);
    } catch { return fallback; }
  }
  function lsWrite(key, value) {
    try { window.localStorage.setItem(key, JSON.stringify(value)); } catch {}
  }
  function lsDelete(key) {
    try { window.localStorage.removeItem(key); } catch {}
  }

  function loadRoster()      { return lsRead(ROSTER_KEY, []); }
  function loadGames()       { return lsRead(GAMES_KEY, []); }
  function loadActiveGame()  { return lsRead(ACTIVE_GAME_KEY, null); }

  // --- Firestore helpers (fire-and-forget; localStorage stays the source of
  //     truth for synchronous reads; Firestore is the cross-device sync layer) ---
  function _db() { return window.__catanDb; }

  function saveRoster(r) {
    lsWrite(ROSTER_KEY, r);
    const db = _db();
    if (db) db.collection('catan_meta').doc('data')
               .set({ roster: r }, { merge: true })
               .catch(console.error);
  }

  // Each game is stored as its own Firestore document so we never hit the
  // 1 MB document size limit, even for long game histories.
  function saveGames(arr) {
    lsWrite(GAMES_KEY, arr);
    const db = _db();
    if (!db || !arr.length) return;
    const batch = db.batch();
    arr.forEach((g) => {
      batch.set(db.collection('catan_games').doc(g.id), g);
    });
    batch.commit().catch(console.error);
  }

  // Delete all game docs from Firestore (used by "Clear history").
  function clearGamesFirestore() {
    const db = _db();
    if (!db) return;
    db.collection('catan_games').get().then((snap) => {
      const batch = db.batch();
      snap.docs.forEach((d) => batch.delete(d.ref));
      return batch.commit();
    }).catch(console.error);
  }

  function saveActiveGame(g) {
    lsWrite(ACTIVE_GAME_KEY, g);
    const db = _db();
    if (db) db.collection('catan_meta').doc('data')
               .set({ activeGame: g }, { merge: true })
               .catch(console.error);
  }

  function clearActiveGame() {
    lsDelete(ACTIVE_GAME_KEY);
    const db = _db();
    if (db) db.collection('catan_meta').doc('data')
               .set({ activeGame: null }, { merge: true })
               .catch(console.error);
  }

  // Random-enough id for placements / players / games.
  function makeId(prefix) {
    return `${prefix || 'id'}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 7)}`;
  }

  // 2/12 post-processor — mutates the generated board so that every hex
  // currently showing token 2 OR token 12 displays a combined 2/12 disc via
  // the existing DualNumberToken (tile.token=2, tile.token2=12). Hex count
  // and pool size are unchanged; only the visual + production-rule changes.
  // For stat tracking: a hex with token2=12 produces on both 2 and 12 rolls.
  function applyDoubledisc(board) {
    if (!board) return board;
    board.tiles.forEach((t) => {
      if (t.token === 2 || t.token === 12) {
        t.token = 2;
        t.token2 = 12;
        t.red = false;
        t.red2 = false;
      }
    });
    return board;
  }

  // Helper: does this board config support the 2/12 toggle? Only base game
  // boards (which carry the standard 2/12 in their token pool) make sense.
  function supportsDoubledisc(config) {
    if (!config || !config.numberTokens) return false;
    return config.numberTokens.includes(2) && config.numberTokens.includes(12);
  }

  // Game-state helpers used by GameScreen + post-game / lifetime stats.
  // All take a `game` object (see saveActiveGame schema) and return derived
  // data — none mutate.

  // Find the starting robber position — first desert hex (or null if none).
  function initialRobberHex(board) {
    if (!board?.tiles) return null;
    const desert = board.tiles.find((t) => t.resource === 'desert');
    return desert ? hexKey(desert.q, desert.r) : null;
  }

  // Initial blank game built from the SETUP + MAP_GEN flow.
  function createGame(flowData) {
    const players = flowData.players.map((p, i) => ({
      id: p.id, name: p.name, color: p.color, isGuest: !!p.isGuest, turnOrder: i,
    }));
    const firstIdx = Math.max(0, players.findIndex((p) => p.id === flowData.firstPlayerId));
    const meta = flowData.boardMeta || {};
    const category = meta.category || 'base';

    // Build the expansion record. For Seafarers we map the in-app sfKey
    // ('hns', 'fi', etc.) to the SEAFARERS_META scenarioId; boardId is the
    // dispatch key ('hns_3p', 'new_world_34p', etc.) so meta lookup can
    // fall back to it for the New World case.
    const expansion = (() => {
      if (category === 'base') {
        return {
          category: 'base',
          boardId: meta.baseId || null,
          scenarioId: null,
          name: meta.configName || 'Base Game',
        };
      }
      return {
        category,
        boardId: meta.scenarioId || null,
        scenarioId: SF_KEY_TO_SCENARIO_ID[meta.sfKey] || null,
        name: meta.configName || (category === 'seafarers' ? 'Seafarers' : 'Traders & Barbarians'),
      };
    })();

    // Seafarers-only state. Always present but only populated for Seafarers
    // games so base-game logic ignores them.
    const isSeafarers = category === 'seafarers';
    const islandComponents = isSeafarers
      ? computeIslandComponents(flowData.board)
      : {};

    const homeIslands = {};
    const islandVPsAwarded = {};
    players.forEach((p) => {
      homeIslands[p.id] = [];
      islandVPsAwarded[p.id] = [];
    });

    // Pre-populate homeIslands for fixed-home scenarios (HNS, Through the
    // Desert) — all main-region island IDs are home for every player.
    if (isSeafarers) {
      const probe = { expansion, board: flowData.board };
      const sfMeta = getSeafarersMeta(probe);
      if (sfMeta && !sfMeta.playerChoosesHome && sfMeta.fixedHomeRegions?.length) {
        const fixed = islandsForRegions(flowData.board, islandComponents, sfMeta.fixedHomeRegions);
        players.forEach((p) => { homeIslands[p.id] = fixed.slice(); });
      }
      // Per-player home picks done in MAP_GEN (playerChoosesHome:true).
      if (flowData.homeIslands) {
        Object.entries(flowData.homeIslands).forEach(([pid, ids]) => {
          if (homeIslands[pid] != null) homeIslands[pid] = ids.slice();
        });
      }
    }

    return {
      id: makeId('game'),
      date: new Date().toISOString(),
      status: 'active',
      expansion,
      vpTarget: flowData.vpTarget || 10,
      useDoubledisc: !!flowData.useDoubledisc,
      players,
      board: flowData.board,
      firstPlayerId: flowData.firstPlayerId,
      currentTurn: 1,
      currentPlayerIndex: firstIdx,
      rolls: [],
      robberEvents: [],
      robberHexKey: initialRobberHex(flowData.board),
      pirateHexKey: null,
      placements: [],
      knights: [],
      largestArmy: null,
      largestArmyOverridden: false,
      longestRoad: null,
      longestRoadOverridden: false,
      strongestPortsTrophy: null,
      devCardVPs: Object.fromEntries(players.map((p) => [p.id, 0])),
      // Seafarers state — empty objects for base/Tier 2+ games.
      islandComponents,
      homeIslands,
      islandVPsAwarded,
      scores: {},
      winner: null,
      totalTurns: 0,
      // Per-turn VP snapshots: [{ turn, vp: { [playerId]: number } }]. Written
      // on every End Turn press. Defaults to [] for old saved games so all the
      // new VP-history-derived stats can detect "not recorded" and degrade.
      vpHistory: [],
      // Dev cards played: [{ turn, playerId, card, meta }] — card is one of
      // 'knight' | 'road_building' | 'year_of_plenty' | 'monopoly' | 'vp'.
      // Knights also continue to be logged in `knights[]` for back-compat
      // with Largest Army detection.
      devCardEvents: [],
    };
  }

  // Award island VP when a settlement lands on an island the player hasn't
  // already claimed. Returns { game, awarded: { islandId, vp } | null }.
  function checkIslandVP(game, playerId, hexKeys) {
    const meta = getSeafarersMeta(game);
    if (!meta || !game.islandComponents) return { game, awarded: null };
    const islandId = hexKeys
      .map((k) => game.islandComponents[k])
      .find((id) => id != null);
    if (!islandId) return { game, awarded: null };
    const home = game.homeIslands?.[playerId] || [];
    if (home.includes(islandId)) return { game, awarded: null };
    const already = game.islandVPsAwarded?.[playerId] || [];
    if (already.includes(islandId)) return { game, awarded: null };
    const nextAwarded = {
      ...game.islandVPsAwarded,
      [playerId]: [...already, islandId],
    };
    return {
      game: { ...game, islandVPsAwarded: nextAwarded },
      awarded: { islandId, vp: meta.islandVPPerRegion },
    };
  }

  // Knight counts per player.
  function knightCounts(game) {
    const counts = {};
    (game?.players || []).forEach((p) => { counts[p.id] = 0; });
    (game?.knights || []).forEach((k) => { counts[k.playerId] = (counts[k.playerId] || 0) + 1; });
    return counts;
  }

  // Re-evaluate Largest Army based on knights played. Returns an updated
  // game with `largestArmy` set (or unchanged). Never runs when the holder
  // was set manually via the override link.
  function applyLargestArmy(game) {
    if (game.largestArmyOverridden) return game;
    const counts = knightCounts(game);
    const currentHolder = game.largestArmy;
    let newHolder = currentHolder;
    let newCount = currentHolder ? (counts[currentHolder] || 0) : 0;
    game.players.forEach((p) => {
      const c = counts[p.id];
      if (c < 3) return;
      if (!newHolder) { newHolder = p.id; newCount = c; return; }
      if (p.id !== newHolder && c > newCount) {
        newHolder = p.id;
        newCount = c;
      }
    });
    if (newHolder === game.largestArmy) return game;
    return { ...game, largestArmy: newHolder };
  }

  // Given a placement's edgeKey ("q1,r1|q2,r2"), return the two endpoint
  // VERTEX keys (each sorted-join of the 3 hex coords meeting at that
  // corner, including off-board neighbours for boundary edges).
  function edgeEndpointVertexKeys(edgeKey) {
    if (!edgeKey) return null;
    const [a, b] = edgeKey.split('|');
    if (!a || !b) return null;
    const [aq, ar] = a.split(',').map(Number);
    const [bq, br] = b.split(',').map(Number);
    const vertexKeyOf = (q, r, k) => {
      const dirs = CORNER_NEIGHBOR_DIRS[k];
      const allKeys = [hexKey(q, r)];
      dirs.forEach((di) => {
        const d = DIRECTIONS[di];
        allKeys.push(hexKey(q + d.q, r + d.r));
      });
      return allKeys.slice().sort().join('|');
    };
    // Find the edge index k of (aq,ar) whose neighbour is (bq,br).
    for (let k = 0; k < 6; k++) {
      const d = DIRECTIONS[EDGE_NEIGHBOR_DIR[k]];
      if (aq + d.q === bq && ar + d.r === br) {
        return [vertexKeyOf(aq, ar, k), vertexKeyOf(aq, ar, (k + 1) % 6)];
      }
    }
    // Otherwise b is the better anchor.
    for (let k = 0; k < 6; k++) {
      const d = DIRECTIONS[EDGE_NEIGHBOR_DIR[k]];
      if (bq + d.q === aq && br + d.r === ar) {
        return [vertexKeyOf(bq, br, k), vertexKeyOf(bq, br, (k + 1) % 6)];
      }
    }
    return null;
  }

  // Longest contiguous road/ship route for a player. Each edge used at most
  // once; opponent settlements / cities on a vertex break the chain.
  function longestRoute(edges, opponentVertexKeys) {
    if (!edges?.length) return 0;
    const adj = {};
    edges.forEach((pl) => {
      const ends = edgeEndpointVertexKeys(pl.edgeKey);
      if (!ends) return;
      const [v1, v2] = ends;
      if (!adj[v1]) adj[v1] = [];
      if (!adj[v2]) adj[v2] = [];
      adj[v1].push({ neighbor: v2, edgeKey: pl.edgeKey });
      adj[v2].push({ neighbor: v1, edgeKey: pl.edgeKey });
    });
    const usedEdges = new Set();
    let best = 0;
    const dfs = (vertex, length) => {
      if (length > best) best = length;
      (adj[vertex] || []).forEach(({ neighbor, edgeKey }) => {
        if (usedEdges.has(edgeKey)) return;
        if (opponentVertexKeys.has(neighbor)) return;
        usedEdges.add(edgeKey);
        dfs(neighbor, length + 1);
        usedEdges.delete(edgeKey);
      });
    };
    Object.keys(adj).forEach((v) => {
      if (opponentVertexKeys.has(v)) return;
      dfs(v, 0);
    });
    return best;
  }

  // Per-player longest route, and updated Longest Road holder.
  function routeLengths(game) {
    const out = {};
    game.players.forEach((p) => {
      const myEdges = (game.placements || []).filter(
        (pl) => pl.playerId === p.id &&
          (pl.type === 'road' || pl.type === 'ship') && pl.edgeKey
      );
      const oppVertices = new Set(
        (game.placements || [])
          .filter((pl) => pl.playerId !== p.id &&
            (pl.type === 'settlement' || pl.type === 'city') && pl.vertexKey)
          .map((pl) => pl.vertexKey)
      );
      out[p.id] = longestRoute(myEdges, oppVertices);
    });
    return out;
  }

  function applyLongestRoad(game) {
    if (game.longestRoadOverridden) return game;
    const lens = routeLengths(game);
    const currentHolder = game.longestRoad;
    let newHolder = currentHolder;
    let newLen = currentHolder ? (lens[currentHolder] || 0) : 0;
    game.players.forEach((p) => {
      const len = lens[p.id];
      if (len < 5) return;
      if (!newHolder) { newHolder = p.id; newLen = len; return; }
      if (p.id !== newHolder && len > newLen) {
        newHolder = p.id;
        newLen = len;
      }
    });
    if (newHolder === game.longestRoad) return game;
    return { ...game, longestRoad: newHolder };
  }

  // User-spec direction (0=E,1=SE,2=SW,3=W,4=NW,5=NE) → my internal
  // DIRECTIONS index (0=E,1=NE,2=NW,3=W,4=SW,5=SE).
  const USER_TO_MY_DIR = [0, 5, 4, 3, 2, 1];

  // Set of hexKeys that have a port at one of their edges (the "port-adjacent
  // hex" the spec talks about — i.e. the land hex a port faces / serves).
  function portAdjacentHexKeys(board) {
    const set = new Set();
    if (!board?.ports) return set;
    for (const port of board.ports) {
      if (port.dir === undefined || port.dir === null) continue;
      const d = DIRECTIONS[USER_TO_MY_DIR[port.dir]];
      set.add(hexKey(port.q + d.q, port.r + d.r));
    }
    return set;
  }

  // Per-player VP earned by placing settlements/cities on port-adjacent hexes.
  // A placement counts once (1 for settlement, 2 for city) if ANY of its
  // touched hexes is port-adjacent.
  function computePortPieceVPs(game) {
    const out = {};
    if (!game?.players) return out;
    game.players.forEach((p) => { out[p.id] = 0; });
    if (!game.board || !game.placements) return out;
    const portHexes = portAdjacentHexKeys(game.board);
    if (portHexes.size === 0) return out;
    game.placements.forEach((pl) => {
      if (pl.type === 'road') return;
      if (!pl.hexKeys.some((k) => portHexes.has(k))) return;
      out[pl.playerId] += pl.type === 'city' ? 2 : 1;
    });
    return out;
  }

  // Per-player auto-calculated VP totals (settlements + cities + achievements
  // + dev card VPs). Used live during the game and at end-game.
  function computeVP(game) {
    const out = {};
    if (!game?.players) return out;
    const placements = game.placements || [];
    const meta = getSeafarersMeta(game);
    game.players.forEach((p) => {
      const mine = placements.filter((pl) => pl.playerId === p.id);
      let vp = 0;
      vp += mine.filter((x) => x.type === 'settlement').length;
      vp += mine.filter((x) => x.type === 'city').length * 2;
      if (game.largestArmy === p.id) vp += 2;
      if (game.longestRoad === p.id) vp += 2;
      if (game.strongestPortsTrophy === p.id) vp += 2;
      if (meta) {
        const islands = game.islandVPsAwarded?.[p.id]?.length || 0;
        vp += islands * meta.islandVPPerRegion;
      }
      vp += (game.devCardVPs?.[p.id] || 0);
      out[p.id] = vp;
    });
    return out;
  }

  // Player who currently qualifies for the Strongest Ports Trophy — first to
  // reach 3 port-VPs. Returns null if no one qualifies.
  function detectPortsTrophy(game) {
    const portVPs = computePortPieceVPs(game);
    for (const p of game.players) {
      if ((portVPs[p.id] || 0) >= 3) return p.id;
    }
    return null;
  }

  // Per-player resource production: replay every roll and tally adjacent
  // hex production. Settlements add 1; cities add 2. Handles dual-token
  // (2/12 disc) hexes via the existing tile.token2 field.
  const HEX_RESOURCE = {
    forest: 'wood', hills: 'brick', fields: 'wheat', mountains: 'ore', pasture: 'wool',
    gold: 'gold',
  };
  function computeResourceProduction(game) {
    const out = {};
    if (!game?.players) return out;
    game.players.forEach((p) => {
      out[p.id] = { wood: 0, brick: 0, wheat: 0, ore: 0, wool: 0, gold: 0 };
    });
    if (!game.board || !game.rolls || !game.placements) return out;
    const byKey = {};
    game.board.tiles.forEach((t) => { byKey[hexKey(t.q, t.r)] = t; });
    game.rolls.forEach((roll) => {
      const total = roll.total;
      game.placements.forEach((pl) => {
        // Ships and roads produce nothing.
        if (pl.type === 'road' || pl.type === 'ship') return;
        const mult = pl.type === 'city' ? 2 : 1;
        pl.hexKeys.forEach((hk) => {
          const tile = byKey[hk];
          if (!tile) return;
          const produces = tile.token === total || tile.token2 === total;
          if (!produces) return;
          const res = HEX_RESOURCE[tile.resource];
          if (!res) return;
          out[pl.playerId][res] += mult;
        });
      });
    });
    return out;
  }

  // Probabilities of each total (2..12) for two fair d6, used for the live
  // dist chart overlay and the luck score.
  const ROLL_PROBABILITY = {
    2: 1/36, 3: 2/36, 4: 3/36, 5: 4/36, 6: 5/36,
    7: 6/36, 8: 5/36, 9: 4/36, 10: 3/36, 11: 2/36, 12: 1/36,
  };

  // Player resource-production expected value over the whole game. Used as
  // the denominator for the luck score (Phase C).
  function computeExpectedProduction(game) {
    const out = {};
    if (!game?.players) return out;
    game.players.forEach((p) => { out[p.id] = 0; });
    if (!game.board || !game.placements || !game.rolls) return out;
    const totalRolls = game.rolls.length;
    if (totalRolls === 0) return out;
    const byKey = {};
    game.board.tiles.forEach((t) => { byKey[hexKey(t.q, t.r)] = t; });
    game.placements.forEach((pl) => {
      if (pl.type === 'road') return;
      const mult = pl.type === 'city' ? 2 : 1;
      pl.hexKeys.forEach((hk) => {
        const tile = byKey[hk];
        if (!tile) return;
        if (!HEX_RESOURCE[tile.resource]) return;
        let p = (ROLL_PROBABILITY[tile.token] || 0);
        if (tile.token2) p += (ROLL_PROBABILITY[tile.token2] || 0);
        out[pl.playerId] += p * mult * totalRolls;
      });
    });
    return out;
  }

  // Per-player luck: actual resource production / expected. 1.0 = neutral.
  function computeLuckScores(game) {
    const out = {};
    if (!game?.players) return out;
    const prod = computeResourceProduction(game);
    const expected = computeExpectedProduction(game);
    game.players.forEach((p) => {
      const actual = Object.values(prod[p.id] || {}).reduce((a, b) => a + b, 0);
      const exp = expected[p.id] || 0;
      out[p.id] = exp > 0 ? actual / exp : null;
    });
    return out;
  }

  // Land/producing hexes from a board (filters out water, desert, sea, fog).
  function producingHexes(board) {
    if (!board?.tiles) return [];
    return board.tiles.filter((t) => HEX_RESOURCE[t.resource] && (t.token != null || t.token2 != null));
  }

  // Roll-distribution count: { 2: n, 3: n, ..., 12: n } from a game's rolls.
  function rollDistribution(rolls) {
    const out = {};
    for (let i = 2; i <= 12; i++) out[i] = 0;
    (rolls || []).forEach((r) => { out[r.total] = (out[r.total] || 0) + 1; });
    return out;
  }

  // Hot/cold numbers — biggest +/- delta from expected. Returns null until at
  // least 5 rolls are logged (the chart is noise before then).
  function computeHotCold(rolls) {
    const total = rolls.length;
    if (total < 5) return null;
    const counts = rollDistribution(rolls);
    let hotN = null, hotDelta = -Infinity;
    let coldN = null, coldDelta = Infinity;
    for (let n = 2; n <= 12; n++) {
      const expected = ROLL_PROBABILITY[n] * total;
      if (expected < 0.5) continue;
      const delta = (counts[n] || 0) - expected;
      if (delta > hotDelta)  { hotDelta = delta;  hotN = n; }
      if (delta < coldDelta) { coldDelta = delta; coldN = n; }
    }
    return {
      hot:  hotN  != null ? { n: hotN,  actual: counts[hotN]  || 0, expected: ROLL_PROBABILITY[hotN]  * total } : null,
      cold: coldN != null ? { n: coldN, actual: counts[coldN] || 0, expected: ROLL_PROBABILITY[coldN] * total } : null,
    };
  }

  // Resource display colours (mobile dark theme).
  const RESOURCE_BAR_COLORS = {
    wood:  '#5C8A3C',
    brick: '#C1440E',
    wheat: '#D4A017',
    ore:   '#6B7C8E',
    wool:  '#A8C090',
    gold:  '#D4AF37',
  };
  const RESOURCE_BAR_ORDER = ['wood', 'brick', 'wheat', 'ore', 'wool', 'gold'];

  // -------- Lifetime aggregation helpers ----------------------------------

  // Returns just the regular-player ids that appear in any completed game.
  function activeRegularPlayers(games) {
    const seen = new Map(); // id -> {id, name, color}
    games.forEach((g) => g.players.forEach((p) => {
      if (p.isGuest) return;
      if (!seen.has(p.id)) seen.set(p.id, { id: p.id, name: p.name, color: p.color });
    }));
    return Array.from(seen.values());
  }

  // Leaderboard rows: { id, name, color, games, wins, winRate, avgVP }.
  function computeLeaderboard(games) {
    const players = activeRegularPlayers(games);
    return players.map((p) => {
      let played = 0, wins = 0, vpTotal = 0;
      games.forEach((g) => {
        const inGame = g.players.find((x) => x.id === p.id);
        if (!inGame) return;
        played++;
        if (g.winner === p.id) wins++;
        vpTotal += (g.scores?.[p.id] || 0);
      });
      return {
        ...p,
        games: played,
        wins,
        winRate: played > 0 ? wins / played : 0,
        avgVP: played > 0 ? vpTotal / played : 0,
      };
    }).sort((a, b) => b.wins - a.wins || b.winRate - a.winRate || a.name.localeCompare(b.name));
  }

  // Win-rate breakdown per player by game player-count (3..8).
  const PLAYER_COUNT_BUCKETS = [3, 4, 5, 6, 7, 8];
  function computeWinRateByPlayerCount(games) {
    const players = activeRegularPlayers(games);
    return players.map((p) => {
      const byCount = {};
      PLAYER_COUNT_BUCKETS.forEach((n) => { byCount[n] = { g: 0, w: 0 }; });
      games.forEach((g) => {
        const n = g.players.length;
        if (!byCount[n]) return;
        if (!g.players.some((x) => x.id === p.id)) return;
        byCount[n].g++;
        if (g.winner === p.id) byCount[n].w++;
      });
      return { ...p, byCount };
    });
  }

  // Pairwise head-to-head: out[playerA][playerB] = { played, aWins, bWins }.
  function computeHeadToHead(games) {
    const players = activeRegularPlayers(games);
    const out = {};
    players.forEach((a) => {
      out[a.id] = {};
      players.forEach((b) => {
        if (a.id === b.id) return;
        out[a.id][b.id] = { played: 0, aWins: 0, bWins: 0 };
      });
    });
    games.forEach((g) => {
      const ids = g.players.filter((p) => !p.isGuest).map((p) => p.id);
      for (let i = 0; i < ids.length; i++) {
        for (let j = i + 1; j < ids.length; j++) {
          const a = ids[i], b = ids[j];
          if (!out[a]?.[b]) continue;
          out[a][b].played++; out[b][a].played++;
          if (g.winner === a) { out[a][b].aWins++; out[b][a].bWins++; }
          if (g.winner === b) { out[b][a].aWins++; out[a][b].bWins++; }
        }
      }
    });
    return { players, matrix: out };
  }

  // All-time roll distribution.
  function lifetimeRollDistribution(games) {
    const out = {};
    for (let i = 2; i <= 12; i++) out[i] = 0;
    games.forEach((g) => g.rolls.forEach((r) => { out[r.total] = (out[r.total] || 0) + 1; }));
    return out;
  }

  // Per-player avg resource production per game by resource type.
  function computeResourceTendencies(games) {
    const players = activeRegularPlayers(games);
    return players.map((p) => {
      const totals = { wood: 0, brick: 0, wheat: 0, ore: 0, wool: 0 };
      let played = 0;
      games.forEach((g) => {
        if (!g.players.some((x) => x.id === p.id)) return;
        played++;
        const prod = computeResourceProduction(g)[p.id] || {};
        RESOURCE_BAR_ORDER.forEach((k) => { totals[k] += (prod[k] || 0); });
      });
      const avg = {};
      RESOURCE_BAR_ORDER.forEach((k) => { avg[k] = played > 0 ? totals[k] / played : 0; });
      return { ...p, played, avg };
    });
  }

  // Trophy tallies — LA / LR / Ports.
  function computeTrophyBoard(games) {
    const players = activeRegularPlayers(games);
    return players.map((p) => {
      let la = 0, lr = 0, ports = 0, knights = 0;
      games.forEach((g) => {
        if (g.largestArmy === p.id) la++;
        if (g.longestRoad === p.id) lr++;
        if (g.strongestPortsTrophy === p.id) ports++;
        knights += (g.knights || []).filter((k) => k.playerId === p.id).length;
      });
      return { ...p, la, lr, ports, knights };
    });
  }

  // Nemesis / victim: who targeted player X the most (nemesis), and who
  // player X targeted the most (victim).
  function computeNemesisVictim(games) {
    const players = activeRegularPlayers(games);
    const playerById = Object.fromEntries(players.map((p) => [p.id, p]));
    return players.map((p) => {
      const targetedMe = {}; // attacker -> count
      const iTargeted = {};  // victim -> count
      games.forEach((g) => {
        (g.robberEvents || []).forEach((ev) => {
          if (ev.targetPlayerId === p.id && ev.playerId !== p.id) {
            targetedMe[ev.playerId] = (targetedMe[ev.playerId] || 0) + 1;
          }
          if (ev.playerId === p.id && ev.targetPlayerId && ev.targetPlayerId !== p.id) {
            iTargeted[ev.targetPlayerId] = (iTargeted[ev.targetPlayerId] || 0) + 1;
          }
        });
      });
      const topOf = (m) => {
        const entries = Object.entries(m).filter(([id]) => playerById[id]);
        entries.sort((a, b) => b[1] - a[1]);
        return entries[0];
      };
      const nemesis = topOf(targetedMe);
      const victim = topOf(iTargeted);
      return {
        ...p,
        nemesis: nemesis ? { ...playerById[nemesis[0]], count: nemesis[1] } : null,
        victim:  victim  ? { ...playerById[victim[0]],  count: victim[1] }  : null,
      };
    });
  }

  // Average luck score per player across all games they played in.
  function computeAvgLuck(games) {
    const players = activeRegularPlayers(games);
    return players.map((p) => {
      let sum = 0, count = 0;
      games.forEach((g) => {
        if (!g.players.some((x) => x.id === p.id)) return;
        const luck = computeLuckScores(g)[p.id];
        if (luck != null && isFinite(luck)) { sum += luck; count++; }
      });
      return { ...p, luck: count > 0 ? sum / count : null, gamesScored: count };
    });
  }

  // -------- Expanded per-game stats ---------------------------------------
  //
  // (Note: `pipCount` is already declared near the generator helpers — we
  //  reuse the same `(n) => 6 - |7-n|` formula here.)

  // Sum of pip values of all hexes adjacent to a player's first 2 settlements.
  // "First 2" = the 2 settlements with the lowest turn numbers for that
  // player. Higher = statistically stronger starting position.
  function computeStartingPlacementScore(game) {
    const out = {};
    if (!game?.players || !game.board) return out;
    const byKey = {};
    game.board.tiles.forEach((t) => { byKey[hexKey(t.q, t.r)] = t; });
    game.players.forEach((p) => {
      const starts = (game.placements || [])
        .filter((pl) => pl.playerId === p.id && pl.type === 'settlement')
        .sort((a, b) => (a.turn ?? 0) - (b.turn ?? 0))
        .slice(0, 2);
      let score = 0;
      starts.forEach((pl) => {
        (pl.hexKeys || []).forEach((hk) => {
          const tile = byKey[hk];
          if (tile?.token)  score += pipCount(tile.token);
          if (tile?.token2) score += pipCount(tile.token2);
        });
      });
      out[p.id] = score;
    });
    return out;
  }

  // Non-road placements per turn. Excludes roads and ships (infrastructure,
  // not scoring).
  function computeBuildRate(game) {
    const out = {};
    if (!game?.players) return out;
    const turns = game.totalTurns || game.currentTurn || 1;
    game.players.forEach((p) => {
      const builds = (game.placements || []).filter(
        (pl) => pl.playerId === p.id && pl.type !== 'road' && pl.type !== 'ship'
      ).length;
      out[p.id] = turns > 0 ? builds / turns : 0;
    });
    return out;
  }

  // Measures how evenly a player's resource production is spread across
  // types. Returns 0–1 where 1.0 = perfectly even, 0 = all one resource.
  function computeEconomyBalance(game) {
    const out = {};
    if (!game?.players) return out;
    const prod = computeResourceProduction(game);
    game.players.forEach((p) => {
      const vals = Object.values(prod[p.id] || {}).filter((v) => v > 0);
      if (vals.length === 0) { out[p.id] = null; return; }
      const mean = vals.reduce((s, v) => s + v, 0) / vals.length;
      if (mean === 0) { out[p.id] = null; return; }
      const variance = vals.reduce((s, v) => s + (v - mean) ** 2, 0) / vals.length;
      const cv = Math.sqrt(variance) / mean;     // 0 = perfectly even
      out[p.id] = Math.max(0, 1 - cv / 2);       // normalise roughly to 0–1
    });
    return out;
  }

  // How many times the robber was sitting on one of a player's hex
  // adjacencies when that hex's number was rolled. Reconstructs robber
  // position per turn from robberEvents history.
  function computeRobberBlocksAbsorbed(game) {
    const out = {};
    if (!game?.players) return out;
    game.players.forEach((p) => { out[p.id] = 0; });
    if (!game.rolls || !game.robberEvents || !game.placements || !game.board) return out;

    const byKey = {};
    game.board.tiles.forEach((t) => { byKey[hexKey(t.q, t.r)] = t; });

    const events = (game.robberEvents || [])
      .filter((e) => e.moverType !== 'pirate' && e.hexKey)
      .sort((a, b) => a.turn - b.turn);

    const desert = game.board.tiles.find((t) => t.resource === 'desert');
    let robberHex = desert ? hexKey(desert.q, desert.r) : null;
    let evIdx = 0;

    game.rolls.forEach((roll) => {
      while (evIdx < events.length && events[evIdx].turn <= roll.turn) {
        robberHex = events[evIdx].hexKey;
        evIdx++;
      }
      if (!robberHex) return;
      const tile = byKey[robberHex];
      if (!tile) return;
      const producesThisRoll = tile.token === roll.total || tile.token2 === roll.total;
      if (!producesThisRoll) return;
      game.placements.forEach((pl) => {
        if (pl.type === 'road' || pl.type === 'ship') return;
        if ((pl.hexKeys || []).includes(robberHex)) out[pl.playerId]++;
      });
    });
    return out;
  }

  // Returns { [playerId]: turn } for the first turn each player reached
  // `threshold` VP. null for players who never reached it.
  function computeFirstToVP(game, threshold) {
    const out = {};
    if (!game?.players) return out;
    game.players.forEach((p) => { out[p.id] = null; });
    (game.vpHistory || []).forEach(({ turn, vp }) => {
      game.players.forEach((p) => {
        if (out[p.id] == null && (vp[p.id] || 0) >= threshold) {
          out[p.id] = turn;
        }
      });
    });
    return out;
  }

  // Returns { [playerId]: [{ turn, vp }] } — the full VP history per player.
  function vpOverTime(game) {
    const out = {};
    if (!game?.players) return out;
    game.players.forEach((p) => { out[p.id] = []; });
    (game.vpHistory || []).forEach(({ turn, vp }) => {
      game.players.forEach((p) => {
        out[p.id].push({ turn, vp: vp[p.id] || 0 });
      });
    });
    return out;
  }

  // For each player, the largest VP deficit they were behind the leader at
  // any recorded turn. Only meaningful for the winner.
  function computeBiggestComeback(game) {
    const out = {};
    if (!game?.players) return out;
    game.players.forEach((p) => { out[p.id] = 0; });
    if (!game.vpHistory?.length || !game.winner) return out;
    (game.vpHistory || []).forEach(({ vp }) => {
      const maxVP = Math.max(...Object.values(vp));
      game.players.forEach((p) => {
        if (p.id !== game.winner) return;
        const deficit = maxVP - (vp[p.id] || 0);
        if (deficit > out[p.id]) out[p.id] = deficit;
      });
    });
    return out;
  }

  // Fraction of logged turns where a player was within `margin` VP of the
  // leader. Only meaningful if vpHistory has data.
  function computeClutchFactor(game, margin = 2) {
    const out = {};
    if (!game?.players) return out;
    game.players.forEach((p) => { out[p.id] = null; });
    if (!game.vpHistory?.length) return out;
    const counts = {};
    game.players.forEach((p) => { counts[p.id] = { close: 0, total: 0 }; });
    game.vpHistory.forEach(({ vp }) => {
      const maxVP = Math.max(...Object.values(vp));
      game.players.forEach((p) => {
        counts[p.id].total++;
        if (maxVP - (vp[p.id] || 0) <= margin) counts[p.id].close++;
      });
    });
    game.players.forEach((p) => {
      const c = counts[p.id];
      out[p.id] = c.total > 0 ? c.close / c.total : null;
    });
    return out;
  }

  // Fraction of robber moves (rolls + knights) where the targeted player
  // was the current VP leader at that turn.
  function computeRobberAggression(game) {
    const out = {};
    if (!game?.players) return out;
    game.players.forEach((p) => { out[p.id] = { targeted: 0, targetedLeader: 0 }; });
    if (!game.vpHistory?.length) return out;

    const vpAtTurn = {};
    game.vpHistory.forEach(({ turn, vp }) => { vpAtTurn[turn] = vp; });
    const getLeaderAt = (turn) => {
      let closest = null, closestTurn = -1;
      Object.entries(vpAtTurn).forEach(([t, vp]) => {
        const tn = Number(t);
        if (tn <= turn && tn > closestTurn) { closestTurn = tn; closest = vp; }
      });
      if (!closest) return null;
      return Object.entries(closest).sort((a, b) => b[1] - a[1])[0]?.[0];
    };

    const allEvents = [
      ...(game.robberEvents || []).map((e) => ({ ...e, source: 'roll' })),
      ...(game.knights || []).map((k) => ({ ...k, source: 'knight' })),
    ];
    allEvents.forEach((ev) => {
      if (!ev.targetPlayerId || !out[ev.playerId]) return;
      out[ev.playerId].targeted++;
      const leader = getLeaderAt(ev.turn);
      if (leader === ev.targetPlayerId) out[ev.playerId].targetedLeader++;
    });
    return out;
  }

  // Average turn of knight plays per player. Lower = earlier aggression.
  function computeKnightTiming(game) {
    const out = {};
    if (!game?.players) return out;
    game.players.forEach((p) => { out[p.id] = null; });
    game.players.forEach((p) => {
      const mine = (game.knights || []).filter((k) => k.playerId === p.id);
      if (mine.length === 0) return;
      out[p.id] = mine.reduce((s, k) => s + k.turn, 0) / mine.length;
    });
    return out;
  }

  // Average turn of first city placement per player.
  function computeFirstCityTurn(game) {
    const out = {};
    if (!game?.players) return out;
    game.players.forEach((p) => {
      const cities = (game.placements || [])
        .filter((pl) => pl.playerId === p.id && pl.type === 'city')
        .sort((a, b) => (a.turn ?? 0) - (b.turn ?? 0));
      out[p.id] = cities.length > 0 ? cities[0].turn : null;
    });
    return out;
  }

  // -------- Expanded lifetime aggregation helpers -------------------------

  // Win / loss streaks for a named player across all completed games,
  // sorted oldest first.
  function computeStreaks(games, playerName) {
    const sorted = games
      .filter((g) => g.players.some((p) => p.name === playerName))
      .sort((a, b) => new Date(a.date) - new Date(b.date));

    let currentStreak = 0, currentStreakType = null;
    let maxWin = 0, maxLoss = 0;
    let winStreak = 0, lossStreak = 0;

    sorted.forEach((g) => {
      const p = g.players.find((x) => x.name === playerName);
      if (!p) return;
      const won = g.winner === p.id;
      if (won) { winStreak++; lossStreak = 0; }
      else      { lossStreak++; winStreak = 0; }
      if (winStreak > maxWin)   maxWin  = winStreak;
      if (lossStreak > maxLoss) maxLoss = lossStreak;
      currentStreakType = won ? 'win' : 'loss';
      currentStreak = won ? winStreak : lossStreak;
    });
    return { currentStreak, currentStreakType, maxWin, maxLoss };
  }

  // Highest VP recorded and lowest winning VP per named player.
  function computeVPRecords(games, playerName) {
    let highestVP = 0, lowestWin = Infinity;
    games.forEach((g) => {
      const p = g.players.find((x) => x.name === playerName);
      if (!p) return;
      const vp = g.scores?.[p.id] ?? computeVP(g)[p.id] ?? 0;
      if (vp > highestVP) highestVP = vp;
      if (g.winner === p.id && vp < lowestWin) lowestWin = vp;
    });
    return { highestVP, lowestWin: lowestWin === Infinity ? null : lowestWin };
  }

  // Average starting pip score across all games for a named player.
  function avgStartingScore(games, playerName) {
    const scores = [];
    games.forEach((g) => {
      const p = g.players.find((x) => x.name === playerName);
      if (!p || !g.board) return;
      const score = computeStartingPlacementScore(g)[p.id];
      if (score != null) scores.push(score);
    });
    return scores.length ? scores.reduce((a, b) => a + b, 0) / scores.length : null;
  }

  // Kingmaker: games where this player didn't win but was present.
  // Returns { name, count }[] of who benefited most from their losses.
  function computeKingmaker(games, playerName) {
    const tally = {};
    games.forEach((g) => {
      const self = g.players.find((p) => p.name === playerName);
      if (!self || g.winner === self.id) return;
      const winner = g.players.find((p) => p.id === g.winner);
      if (!winner) return;
      tally[winner.name] = (tally[winner.name] || 0) + 1;
    });
    return Object.entries(tally)
      .map(([name, count]) => ({ name, count }))
      .sort((a, b) => b.count - a.count);
  }

  // Most robbed lifetime: { [playerName]: count }
  function computeMostRobbed(games) {
    const tally = {};
    games.forEach((g) => {
      (g.robberEvents || []).forEach((ev) => {
        if (!ev.targetPlayerId) return;
        const target = g.players.find((p) => p.id === ev.targetPlayerId);
        if (!target) return;
        tally[target.name] = (tally[target.name] || 0) + 1;
      });
    });
    return tally;
  }

  // Radar values 0–1 per regular player. Five axes:
  //   aggression   — robber + knight events per game (normalised across pool)
  //   builder      — avg build rate (non-road placements per turn)
  //   luck         — avg luck score
  //   efficiency   — avg starting pip score
  //   consistency  — inverse VP std dev (lower variance = more consistent)
  function computePlayerRadar(games, playerList) {
    const raw = {};
    playerList.forEach((p) => {
      raw[p.id] = { aggression: 0, builder: 0, luck: 0, efficiency: 0, consistency: 0 };
    });

    playerList.forEach((p) => {
      let events = 0, gamesPlayed = 0;
      let rateSum = 0, rateCount = 0;
      let luckSum = 0, luckCount = 0;
      let effSum = 0, effCount = 0;
      const vps = [];
      games.forEach((g) => {
        const inGame = g.players.find((x) => x.id === p.id);
        if (!inGame) return;
        gamesPlayed++;
        events += (g.robberEvents || []).filter((e) => e.playerId === p.id).length;
        events += (g.knights || []).filter((k) => k.playerId === p.id).length;

        const rate = computeBuildRate(g)[p.id];
        if (rate != null) { rateSum += rate; rateCount++; }

        const lk = computeLuckScores(g)[p.id];
        if (lk != null && isFinite(lk)) { luckSum += lk; luckCount++; }

        const score = computeStartingPlacementScore(g)[p.id];
        if (score != null) { effSum += score; effCount++; }

        const vp = g.scores?.[p.id] ?? computeVP(g)[p.id] ?? 0;
        vps.push(vp);
      });
      raw[p.id].aggression  = gamesPlayed > 0 ? events / gamesPlayed : 0;
      raw[p.id].builder     = rateCount > 0   ? rateSum / rateCount  : 0;
      raw[p.id].luck        = luckCount > 0   ? luckSum / luckCount  : 1;
      raw[p.id].efficiency  = effCount > 0    ? effSum / effCount    : 0;
      if (vps.length < 2) {
        raw[p.id].consistency = 0;
      } else {
        const mean = vps.reduce((a, b) => a + b, 0) / vps.length;
        const variance = vps.reduce((a, b) => a + (b - mean) ** 2, 0) / vps.length;
        raw[p.id].consistency = Math.sqrt(variance); // inverted below
      }
    });

    // Normalise each axis to 0–1 across the player pool.
    const normalize = (key, inverse = false) => {
      const vals = playerList.map((p) => raw[p.id][key]);
      const min = Math.min(...vals), max = Math.max(...vals);
      const range = max - min;
      playerList.forEach((p) => {
        const v = raw[p.id][key];
        let norm = range > 0 ? (v - min) / range : 0.5;
        if (inverse) norm = 1 - norm;
        raw[p.id][key] = norm;
      });
    };
    normalize('aggression');
    normalize('builder');
    normalize('luck');
    normalize('efficiency');
    normalize('consistency', true);
    return raw;
  }

  /* =====================================================================
   *  GeneratorView — the map-generator UI that was previously the entire App.
   * =====================================================================
   *  Lives inside MapGenScreen (during stat-tracker game flow) and inside
   *  HomeScreen via the "Just generate a map" path. Accepts optional props
   *  to lock the player count (used when the surrounding stat-tracker flow
   *  already knows how many players are playing).
   *
   *  Props:
   *    showDoubledisc — boolean. If true, surface the 2/12 disc checkbox for
   *      base-game configs that support it.
   *    onBoardChange  — (board, meta) => void. Notify the parent whenever
   *      the board, useDoubledisc flag, or config changes. Lets the
   *      stat-tracker flow know which board the user "approved".
   *    initial — { category, baseId, sfKey, sfCount, tbKey, tbCount,
   *      useDoubledisc } — initial state. Persists between MAP_GEN re-entries.
   * =================================================================== */
  function GeneratorView({ showDoubledisc = false, onBoardChange, initial, lockedCategory, locked = false }) {
    const init = initial || {};
    // When lockedCategory is provided the category is fixed and the top
    // "Base / Seafarers / T & B" segmented control is hidden.
    const [category, setCategory] = React.useState(
      lockedCategory || init.category || 'base'
    );
    const [baseId, setBaseId] = React.useState(init.baseId || BOARDS[0].id);
    const [sfKey,   setSfKey]   = React.useState(init.sfKey   || SEAFARERS_CHOICES[0].key);
    const [sfCount, setSfCount] = React.useState(init.sfCount || null);
    const [tbKey,   setTbKey]   = React.useState(init.tbKey   || TRADERS_CHOICES[0].key);
    const [tbCount, setTbCount] = React.useState(init.tbCount || null);
    const [useDoubledisc, setUseDoubledisc] = React.useState(!!init.useDoubledisc);

    // Generator Distribution Options — persisted across sessions.
    const OPTS_KEY = 'catan_gen_opts';
    const [opts, setOpts] = React.useState(() => {
      const stored = lsRead(OPTS_KEY, {});
      return {
        tileMode:   stored.tileMode   || 'balanced',
        tokenMode:  stored.tokenMode  || 'balanced',
        desertMode: stored.desertMode || 'random',
      };
    });
    const [optsOpen, setOptsOpen] = React.useState(false);

    const isTrad = category === 'traders';
    const choices = isTrad ? TRADERS_CHOICES : SEAFARERS_CHOICES;
    const byKey   = isTrad ? TRADERS_BY_KEY  : SEAFARERS_BY_KEY;
    const scenarioKey = isTrad ? tbKey   : sfKey;
    const playerCount = isTrad ? tbCount : sfCount;
    const currentScenario = byKey[scenarioKey];
    const currentCount = currentScenario.counts.find((c) => c.label === playerCount);
    const scenarioId = currentCount ? currentCount.id : null;

    const buildConfig = (cat, bId, sId) => {
      if (cat === 'base') return BOARDS.find((b) => b.id === bId);
      if (cat === 'seafarers') return sId ? seafarersConfig(sId) : null;
      if (cat === 'traders')   return sId ? tradersConfig(sId)   : null;
      return null;
    };

    const generateWithToggle = (cfg, dbl, genOpts) => {
      if (!cfg) return null;
      const useOpts = genOpts || opts;
      const b = generateBoard(cfg, useOpts);
      return dbl && supportsDoubledisc(cfg) ? applyDoubledisc(b) : b;
    };

    // Seed initial board: respect lockedCategory if provided. For Seafarers
    // / Traders we need a scenarioId to generate a board; if none is supplied
    // pick the first variant of the first scenario in that category.
    const initialBoard = (() => {
      const cat = lockedCategory || init.category || 'base';
      if (cat === 'base') return buildConfig('base', init.baseId || BOARDS[0].id);
      if (cat === 'seafarers') {
        const k = init.sfKey || SEAFARERS_CHOICES[0].key;
        const c = init.sfCount || SEAFARERS_BY_KEY[k].counts[0]?.label;
        const id = SEAFARERS_BY_KEY[k].counts.find((x) => x.label === c)?.id;
        return id ? buildConfig('seafarers', null, id) : null;
      }
      if (cat === 'traders') {
        const k = init.tbKey || TRADERS_CHOICES[0].key;
        const c = init.tbCount || TRADERS_BY_KEY[k].counts[0]?.label;
        const id = TRADERS_BY_KEY[k].counts.find((x) => x.label === c)?.id;
        return id ? buildConfig('traders', null, id) : null;
      }
      return null;
    })();
    const [board, setBoard] = React.useState(() =>
      generateWithToggle(initialBoard, !!init.useDoubledisc)
    );
    // If lockedCategory is seafarers/traders but no sfCount/tbCount was
    // seeded, also auto-set the count state so the scenario picker shows
    // the matching variant active.
    React.useEffect(() => {
      if (!lockedCategory) return;
      if (lockedCategory === 'seafarers' && !sfCount) {
        const auto = SEAFARERS_BY_KEY[sfKey].counts[0];
        if (auto) setSfCount(auto.label);
      }
      if (lockedCategory === 'traders' && !tbCount) {
        const auto = TRADERS_BY_KEY[tbKey].counts[0];
        if (auto) setTbCount(auto.label);
      }
    }, []); // eslint-disable-line

    // Surface every board change to the parent so it can capture the
    // "approved" board for downstream screens (GAME).
    React.useEffect(() => {
      if (!onBoardChange) return;
      const cfg = buildConfig(category, baseId, scenarioId);
      onBoardChange(board, {
        category, baseId, sfKey, sfCount, tbKey, tbCount, useDoubledisc,
        scenarioId, configName: cfg?.name,
      });
    }, [board, useDoubledisc]); // eslint-disable-line

    const regen = (cat, bId, sId, dbl, genOpts) => {
      const cfg = buildConfig(cat, bId, sId);
      setBoard(generateWithToggle(cfg, dbl !== undefined ? dbl : useDoubledisc, genOpts));
    };

    const setOpt = (key, value) => {
      const next = { ...opts, [key]: value };
      setOpts(next);
      lsWrite(OPTS_KEY, next);
      regen(category, baseId, currentScenarioId(category), undefined, next);
    };
    const currentScenarioId = (cat) => {
      if (cat === 'seafarers') {
        const c = SEAFARERS_BY_KEY[sfKey].counts.find((x) => x.label === sfCount);
        return c ? c.id : null;
      }
      if (cat === 'traders') {
        const c = TRADERS_BY_KEY[tbKey].counts.find((x) => x.label === tbCount);
        return c ? c.id : null;
      }
      return null;
    };
    const regenerate = () => regen(category, baseId, currentScenarioId(category));
    const pickCategory = (cat) => { setCategory(cat); regen(cat, baseId, currentScenarioId(cat)); };
    const pickBase = (id) => { setBaseId(id); regen('base', id, null); };
    const pickScenarioKey = (key) => {
      const map = isTrad ? TRADERS_BY_KEY  : SEAFARERS_BY_KEY;
      const setKey   = isTrad ? setTbKey   : setSfKey;
      const setCount = isTrad ? setTbCount : setSfCount;
      setKey(key);
      const scen = map[key];
      const auto = scen.counts.length === 1 ? scen.counts[0] : null;
      setCount(auto ? auto.label : null);
      regen(category, baseId, auto ? auto.id : null);
    };
    const pickCount = (label) => {
      const count = currentScenario.counts.find((c) => c.label === label);
      if (!count) return;
      const setCount = isTrad ? setTbCount : setSfCount;
      setCount(label);
      regen(category, baseId, count.id);
    };
    const toggleDoubledisc = (next) => {
      setUseDoubledisc(next);
      regen(category, baseId, currentScenarioId(category), next);
    };

    const config = buildConfig(category, baseId, scenarioId);
    const showDoubledisscRow = showDoubledisc && supportsDoubledisc(config);

    return (
      <>
        {/* Top-level category — hidden when the surrounding screen has
            locked the expansion (e.g. picked in SETUP). */}
        {!lockedCategory && (
        <div className="seg">
          <button className={'seg-btn' + (category === 'base' ? ' active' : '')}
            onClick={() => pickCategory('base')}>Base Game</button>
          <button className={'seg-btn' + (category === 'seafarers' ? ' active' : '')}
            onClick={() => pickCategory('seafarers')}>Seafarers</button>
          <button className={'seg-btn' + (category === 'traders' ? ' active' : '')}
            onClick={() => pickCategory('traders')}>T &amp; B</button>
        </div>
        )}

        {category === 'base' ? (
          <div className="seg">
            {BOARDS.map((b) => (
              <button key={b.id}
                className={'seg-btn' + (b.id === baseId ? ' active' : '')}
                onClick={() => pickBase(b.id)}>{b.short}</button>
            ))}
          </div>
        ) : (
          <div className="sf-controls">
            <select className="scenario-select" value={scenarioKey}
              onChange={(e) => pickScenarioKey(e.target.value)}>
              {choices.map((s) => (
                <option key={s.key} value={s.key}>{s.name}</option>
              ))}
            </select>
            <div className="seg">
              {currentScenario.counts.map((c) => (
                <button key={c.label}
                  className={'seg-btn' + (c.label === playerCount ? ' active' : '')}
                  onClick={() => pickCount(c.label)}>{c.label}</button>
              ))}
            </div>
          </div>
        )}

        {showDoubledisscRow && (
          <label className="toggle-row">
            <input type="checkbox" checked={useDoubledisc}
              onChange={(e) => toggleDoubledisc(e.target.checked)} />
            <span>
              Use 2/12 disc
              <div className="desc">Hexes showing 2 or 12 use the combined 2/12 disc and produce on both rolls.</div>
            </span>
          </label>
        )}

        <div style={{ width: '100%', maxWidth: 380 }}>
          <button className="btn secondary"
            style={{ width: 'auto', maxWidth: 'none', padding: '8px 14px', fontSize: '0.84rem' }}
            onClick={() => setOptsOpen((v) => !v)}>
            ⚙ Generation Settings {optsOpen ? '▾' : '▸'}
          </button>
          {optsOpen && (
            <div className="gen-opts">
              <div className="gen-opt-row">
                <span className="gen-opt-label">Tiles</span>
                <div className="seg">
