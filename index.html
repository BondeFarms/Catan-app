<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Catan Map Generator</title>

  <!-- React + Babel via CDN. No build step: this file runs as-is on GitHub Pages. -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Pinned to Babel 7.x: 8.0 switched the react preset to the automatic
       JSX runtime by default, which emits `import` statements the in-page
       <script type="text/babel"> cannot resolve (browsers reject the import
       and React never mounts → blank-blue screen). 7.24.7 keeps the classic
       runtime so this app continues to work without a build step. -->
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <!-- Firebase (compat build — no bundler needed) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg: #11161c;
      --panel: #1a222c;
      --text: #e7edf3;
      --muted: #8aa0b2;
      --accent: #3da9fc;
      --border: #2a3642;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }
    #root { display: flex; justify-content: center; }
    .app {
      width: 100%;
      max-width: 520px;
      padding: 16px 12px calc(24px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .app h1 {
      font-size: 1.15rem;
      font-weight: 650;
      margin: 4px 0 0;
      letter-spacing: 0.2px;
    }
    .subtitle { color: var(--muted); font-size: 0.8rem; margin: 0; }
    .board-wrap {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }
    .board-wrap svg { width: 100%; height: auto; display: block; }
    .btn {
      appearance: none;
      border: none;
      background: var(--accent);
      color: #04121f;
      font-size: 1rem;
      font-weight: 650;
      padding: 13px 22px;
      border-radius: 12px;
      width: 100%;
      max-width: 320px;
      cursor: pointer;
      transition: transform 0.05s ease, filter 0.15s ease;
    }
    .btn:active { transform: scale(0.98); filter: brightness(1.05); }
    .seg {
      display: flex;
      width: 100%;
      max-width: 360px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .seg-btn {
      flex: 1;
      appearance: none;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 650;
      padding: 10px 6px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .seg-btn + .seg-btn { border-left: 1px solid var(--border); }
    .seg-btn.active { background: var(--accent); color: #04121f; }
    .sf-controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 360px;
    }
    .scenario-select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 36px 11px 14px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--panel) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8"><path d="M1 1l5 5 5-5" fill="none" stroke="%238aa0b2" stroke-width="2"/></svg>') no-repeat right 14px center;
    }
    .subtitle .tag {
      display: block;
      margin-top: 3px;
      font-size: 0.68rem;
      font-style: italic;
      color: var(--muted);
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px 12px;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .legend i {
      width: 11px; height: 11px; border-radius: 3px; display: inline-block;
    }
    .setup {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
    }
    .setup h2 { font-size: 1rem; font-weight: 650; margin: 0 0 14px; }
    .setup-group { margin-bottom: 16px; }
    .setup-group:last-child { margin-bottom: 0; }
    .setup-group h3 {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--muted);
      margin: 0 0 8px;
    }
    .setup ul { list-style: none; margin: 0; padding: 0; }
    .setup li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.92rem;
    }
    .setup li:last-child { border-bottom: none; }
    .setup .name { display: inline-flex; align-items: center; }
    .setup .swatch {
      width: 13px; height: 13px; border-radius: 3px; margin-right: 9px; flex: none;
    }
    .setup .qty { font-weight: 700; font-variant-numeric: tabular-nums; }
    .tokens-line {
      margin: 0;
      font-size: 0.92rem;
      line-height: 1.8;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    /* ============================================================
     * Stat-tracker UI (HOME / SETUP / MAP_GEN / GAME / HISTORY / ...)
     * ============================================================ */
    .screen { width: 100%; min-height: 100vh; box-sizing: border-box; }
    .home-title { font-size: 1.7rem; font-weight: 700; letter-spacing: 0.4px; margin: 12px 0 4px; }
    .home-sub   { color: var(--muted); font-size: 0.85rem; margin: 0 0 18px; }
    .home-actions { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; margin: 8px 0 16px; }
    .home-actions .btn { width: 100%; max-width: none; padding: 16px 18px; font-size: 1rem; }
    .home-actions .btn.secondary { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
    .home-meta  { color: var(--muted); font-size: 0.78rem; }
    .active-banner {
      width: 100%; max-width: 360px;
      background: #2b3848;
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 4px;
    }
    .active-banner .title { font-size: 0.82rem; font-weight: 700; color: var(--accent); letter-spacing: 0.3px; }
    .active-banner .who { font-size: 0.85rem; color: var(--text); }
    .active-banner .row { display: flex; gap: 8px; }
    .active-banner .row button {
      flex: 1; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text); font-weight: 650; cursor: pointer; font-size: 0.85rem;
    }
    .active-banner .row button.primary { background: var(--accent); color: #04121f; border-color: var(--accent); }

    .player-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--panel); border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 999px; font-size: 0.78rem;
    }
    .player-chip .dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.4); flex: none; }
    .player-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 12px; width: 100%;
      min-height: 48px; cursor: pointer; transition: border-color 0.15s ease;
    }
    .player-row:hover, .player-row:active { border-color: var(--accent); }
    .player-row .dot { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.55); flex: none; }
    .player-row .name { flex: 1; font-size: 0.92rem; }
    .player-row .badge { font-size: 0.66rem; color: var(--muted); padding: 2px 7px; border-radius: 999px; border: 1px solid var(--border); }
    .player-row .remove { background: transparent; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 4px 6px; }
    .player-row.placeholder { color: var(--muted); border-style: dashed; }

    .color-swatches { display: flex; flex-wrap: wrap; gap: 8px; }
    .color-swatch {
      width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--border);
      cursor: pointer; appearance: none; padding: 0;
      transition: transform 0.1s ease, border-color 0.15s ease;
    }
    .color-swatch.selected { border-color: var(--accent); transform: scale(1.12); }
    .color-swatch.disabled { opacity: 0.3; cursor: not-allowed; }

    .sheet-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 50;
    }
    .sheet {
      width: 100%; max-width: 520px;
      background: var(--bg); border-top: 1px solid var(--border);
      border-radius: 18px 18px 0 0;
      padding: 16px 16px calc(20px + env(safe-area-inset-bottom));
      max-height: 88vh; overflow-y: auto;
      display: flex; flex-direction: column; gap: 10px;
    }
    .sheet h3 { margin: 0 0 6px; font-size: 1rem; }
    .sheet .field {
      display: flex; flex-direction: column; gap: 6px;
    }
    .sheet input[type=text] {
      background: var(--panel); border: 1px solid var(--border);
      color: var(--text); padding: 11px 12px; border-radius: 10px; font-size: 1rem;
    }
    .sheet .actions { display: flex; gap: 10px; margin-top: 6px; }
    .sheet .actions button {
      flex: 1; padding: 12px; border-radius: 10px; font-weight: 650;
      border: 1px solid var(--border); background: var(--panel); color: var(--text); cursor: pointer;
    }
    .sheet .actions button.primary { background: var(--accent); color: #04121f; border-color: var(--accent); }
    .sheet .actions button.primary[disabled] { opacity: 0.4; cursor: not-allowed; }

    .toggle-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 12px; width: 100%; max-width: 360px;
      cursor: pointer; font-size: 0.88rem;
    }
    .gen-opts {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
      margin-top: 8px;
    }
    .gen-opt-row {
      display: flex; align-items: center; gap: 10px;
    }
    .gen-opt-label {
      font-size: 0.74rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--muted);
      width: 70px; flex: none;
    }
    .gen-opts .seg { flex: 1; }
    .gen-opts .seg-btn { padding: 7px 5px; font-size: 0.76rem; }
    .toggle-row input { width: 18px; height: 18px; accent-color: var(--accent); }
    .toggle-row .desc { color: var(--muted); font-size: 0.74rem; }

    .first-player-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .first-player-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 16px; min-height: 44px;
      border: 1px solid var(--border); background: var(--panel); color: var(--text);
      border-radius: 999px; cursor: pointer; font-size: 0.92rem;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .first-player-btn.selected { background: var(--accent); color: #04121f; border-color: var(--accent); }
    .first-player-btn .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.45); }

    .stepper {
      display: flex; flex-direction: column; gap: 18px; width: 100%; max-width: 420px;
    }
    .stepper section { display: flex; flex-direction: column; gap: 10px; }
    .stepper section h2 {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--muted); margin: 0;
    }
    .stepper .display-value {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px; font-size: 0.92rem; color: var(--text);
    }
    .vp-input {
      background: var(--panel); border: 1px solid var(--border);
      color: var(--text); padding: 12px 14px;
      border-radius: 12px; font-size: 1rem; font-weight: 650;
      width: 120px;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }
    .vp-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }

    /* GAME screen */
    .game-header {
      width: 100%; max-width: 520px;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 12px;
    }
    .game-header .current { flex: 1; display: flex; align-items: center; gap: 8px; }
    .game-header .current .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.55); }
    .game-header .current .name { font-weight: 700; font-size: 0.95rem; }
    .game-header .turn { color: var(--muted); font-size: 0.8rem; font-variant-numeric: tabular-nums; }
    .game-header .gear {
      background: transparent; border: none; color: var(--text);
      font-size: 1.3rem; padding: 4px 8px; cursor: pointer;
    }
    .end-turn-btn {
      min-height: 36px;
      padding: 6px 12px;
      font-size: 0.84rem;
      font-weight: 700;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .end-turn-btn.ready {
      background: var(--accent);
      color: #04121f;
      border-color: var(--accent);
    }
    .knight-btn {
      width: 100%;
      max-width: 360px;
      align-self: center;
    }
    .tab-bar {
      width: 100%; max-width: 520px;
      display: flex; background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      position: sticky; top: 8px; z-index: 5;
    }
    .tab-bar button {
      flex: 1; padding: 11px 8px; background: transparent;
      border: none; color: var(--muted); font-weight: 650; font-size: 0.88rem;
      cursor: pointer; transition: background 0.12s ease, color 0.12s ease;
    }
    .tab-bar button + button { border-left: 1px solid var(--border); }
    .tab-bar button.active { background: var(--accent); color: #04121f; }

    .tab-panel { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 14px; }

    /* Phase-based turn flow — Roll → Build sequential sections. */
    .phase-section {
      width: 100%; max-width: 520px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; margin-bottom: 10px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .phase-section.locked { opacity: 0.45; pointer-events: none; }
    .phase-section.collapsed {
      cursor: pointer; flex-direction: row; align-items: center; gap: 10px;
      padding: 10px 14px;
    }
    .phase-header { display: flex; align-items: center; gap: 8px; }
    .phase-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); color: #04121f;
      font-size: 0.78rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .phase-num.done   { background: #2D6A4F; color: #fff; }
    .phase-num.future { background: var(--border); color: var(--muted); }
    .phase-title { font-weight: 650; font-size: 0.92rem; letter-spacing: 0.3px; }
    .phase-hint  { color: var(--muted); font-size: 0.75rem; margin-left: auto; }
    .phase-summary { flex: 1; font-size: 0.88rem; }
    .phase-edit { color: var(--accent); font-size: 0.78rem; font-weight: 650; }

    /* Collapsible sections (Live Stats, Game State). */
    .collapsible-section {
      width: 100%; max-width: 520px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 10px; overflow: hidden;
    }
    .collapsible-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; cursor: pointer; font-weight: 650; font-size: 0.92rem;
      user-select: none;
    }
    .collapsible-body {
      padding: 0 14px 14px; display: flex; flex-direction: column; gap: 14px;
    }
    .section-label {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--muted);
      margin: 4px 0 8px;
    }

    /* Live Stats — compact tabular displays. */
    .live-stats-table {
      display: grid; grid-template-columns: 1fr auto auto auto;
      gap: 6px 10px; font-size: 0.82rem; align-items: center;
    }
    .live-stats-table .h { color: var(--muted); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .live-stats-table .num { text-align: right; }
    .vp-snap-bar {
      height: 6px; border-radius: 3px; background: var(--accent);
    }

    /* Dev Card row inside the Roll phase. */
    .devcard-row {
      display: flex; flex-direction: column; gap: 8px;
      padding: 10px; border: 1px dashed var(--border); border-radius: 10px;
    }
    .devcard-options {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
    }
    .devcard-options button {
      padding: 9px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--panel);
      color: var(--text); font-weight: 600; font-size: 0.82rem;
      cursor: pointer; transition: background 0.12s ease;
    }
    .devcard-options button:hover { background: rgba(255,255,255,0.04); }

    .dice-block { display: flex; flex-direction: column; gap: 8px; align-items: center; }
    .dice-block .label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); }
    .dice-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; width: 100%; max-width: 360px; }
    .total-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; width: 100%; max-width: 380px; }
    .dice-btn {
      min-height: 52px;
      background: var(--panel); border: 1px solid var(--border);
      color: var(--text); font-weight: 700; font-size: 1.1rem;
      border-radius: 10px; cursor: pointer; transition: all 0.1s ease;
    }
    .dice-btn.selected { background: var(--accent); color: #04121f; border-color: var(--accent); transform: scale(1.05); }
    .dice-btn.seven { color: #ff7070; border-color: rgba(192, 24, 24, 0.5); }
    .dice-btn.seven.selected { background: #c01818; color: #fff; border-color: #c01818; }
    .roll-total {
      width: 100%; max-width: 360px; text-align: center;
      padding: 10px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; font-size: 0.95rem;
    }
    .roll-total b { font-size: 1.4rem; font-weight: 800; color: var(--accent); display: block; margin-top: 2px; }

    .roll-history { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0; width: 100%; max-width: 520px; }
    .roll-chip {
      flex: none; display: inline-flex; align-items: center; gap: 5px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 999px; padding: 5px 10px; font-size: 0.78rem; font-variant-numeric: tabular-nums;
    }
    .roll-chip .dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.45); }
    .roll-chip.seven { border-color: #c01818; color: #ffadad; }

    .dist-chart { width: 100%; max-width: 520px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
    .dist-chart h3 { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); margin: 0 0 8px; }

    /* BUILD tab */
    .hex-picker { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 8px; width: 100%; max-width: 520px; }
    .hex-chip {
      min-height: 48px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
      background: var(--panel); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 6px 4px;
      font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.1s ease;
    }
    .hex-chip .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.4); }
    .hex-chip .num { font-variant-numeric: tabular-nums; }
    .hex-chip .num.red { color: #ff7070; }
    .hex-chip.selected { border-color: var(--accent); background: rgba(61,169,252,0.18); transform: scale(1.04); }
    .hex-chip.disabled { opacity: 0.4; cursor: not-allowed; }

    .piece-summary {
      width: 100%; max-width: 520px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .piece-summary .row {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.85rem; padding: 4px 0;
      border-bottom: 1px dashed var(--border);
    }
    .piece-summary .row:last-child { border-bottom: none; }
    .piece-summary .row .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.45); }
    .piece-summary .row .name { flex: 1; font-weight: 650; }
    .piece-summary .row .counts { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 0.82rem; }

    /* GAME tab — VP tracker */

  <script type="text/babel" data-presets="react">
  /* =====================================================================
   *  SECTION 1 — HEX MATH (pure, framework-free)
   * =====================================================================
   *
   *  AXIAL COORDINATE SYSTEM
   *  -----------------------
   *  Every hex is addressed by two axes (q, r) instead of (row, col).
   *  This is the standard "axial" scheme (see redblobgames.com/grids/hexagons).
   *
   *    q  ->  increases to the EAST  (right)
   *    r  ->  increases to the SOUTH-EAST (down-right)
   *
   *  A third implicit axis s = -q - r exists (cube coords) and is handy for
   *  distance math: hexDistance = (|q| + |r| + |q+r|) / 2.
   *
   *  We use POINTY-TOP hexes (a vertex points straight up). With pointy-top,
   *  rows of constant r are horizontal, which is exactly the classic Catan
   *  3-4-5-4-3 layout. The 6 neighbour directions are:
   *
   *        NW   NE
   *          \ /
   *      W ----+---- E          (the top & bottom are VERTICES, not edges)
   *          / \
   *        SW   SE
   *
   *  Pixel conversion for a hex of circumradius `size`:
   *      x = size * sqrt(3) * (q + r/2)
   *      y = size * 3/2 * r
   *  (screen y grows downward, so r = -2 is the top row.)
   * =================================================================== */

  const SQRT3 = Math.sqrt(3);

  // The 6 neighbour directions, indexed 0..5: E, NE, NW, W, SW, SE.
  const DIRECTIONS = [
    { q:  1, r:  0 }, // 0 E
    { q:  1, r: -1 }, // 1 NE
    { q:  0, r: -1 }, // 2 NW
    { q: -1, r:  0 }, // 3 W
    { q: -1, r:  1 }, // 4 SW
    { q:  0, r:  1 }, // 5 SE
  ];

  const hexKey = (q, r) => `${q},${r}`;

  function axialToPixel(q, r, size) {
    return { x: size * SQRT3 * (q + r / 2), y: size * 1.5 * r };
  }

  function hexDistance(a, b) {
    return (Math.abs(a.q - b.q) + Math.abs(a.r - b.r) + Math.abs(a.q + a.r - b.q - b.r)) / 2;
  }

  // Corner k (0..5) of a pointy-top hex centred at (cx, cy).
  function hexCorner(cx, cy, size, k) {
    const angle = (Math.PI / 180) * (60 * k - 30);
    return { x: cx + size * Math.cos(angle), y: cy + size * Math.sin(angle) };
  }

  function hexPolygonPoints(cx, cy, size) {
    return [0, 1, 2, 3, 4, 5]
      .map((k) => { const c = hexCorner(cx, cy, size, k); return `${c.x},${c.y}`; })
      .join(' ');
  }

  // Map a neighbour-direction index -> the edge it sits on, expressed as the
  // pair of corner indices [k, k+1] that bound that edge. Derived from the
  // edge-midpoint angles (edge k midpoint is at 60*k degrees).
  const DIR_TO_EDGE = [0, 5, 4, 3, 2, 1]; // for DIRECTIONS index 0..5


  /* =====================================================================
   *  SECTION 2 — BOARD CONFIGS (data only)
   * =====================================================================
   *  A board is fully described by data: which hex coordinates exist, how
   *  many of each resource tile, the number-token multiset, and the port
   *  positions/types. Adding Seafarers / Cities & Knights / a bigger board
   *  later means adding another config object here -- no logic changes.
   * =================================================================== */

  // Resource (tile) metadata: display label + dark-theme fill colour.
  // `setup` is the physical-tile name shown in the "Set Up Your Board" list.
  const RESOURCES = {
    fields:    { label: 'Wheat',  color: '#d7ad3f', setup: 'Fields (Wheat)' },
    forest:    { label: 'Wood',   color: '#2f7d34', setup: 'Forest (Wood)' },
    pasture:   { label: 'Sheep',  color: '#86c040', setup: 'Pasture (Sheep)' },
    mountains: { label: 'Ore',    color: '#7c8a99', setup: 'Mountains (Ore)' },
    hills:     { label: 'Brick',  color: '#b5552e', setup: 'Hills (Brick)' },
    desert:    { label: 'Desert', color: '#c2b280', setup: 'Desert' },
    water:     { label: 'Water',  color: '#1f6b8f', setup: 'Water' },
    portHex:   { label: 'Port Hex', color: '#2f9bc4', setup: 'Port Hex' },
    // Seafarers hex types:
    gold:      { label: 'Gold',   color: '#f2b705', setup: 'Gold Field' }, // produces any resource; gets a token
    fog:       { label: 'Fog',    color: '#374151', setup: 'Fog Hex' },    // face-down until revealed

    // Traders & Barbarians + Fishing hex types:
    fishing_grounds: { label: 'Fish',  color: '#2f7ea7', setup: 'Fishing Grounds' }, // locked sea tile; gets fishing-pool token
    lake_a:          { label: 'Lake',  color: '#5fb0d4', setup: 'Lake A (2·3·11·12)' }, // 4 embedded discs (2x2 grid)
    lake_b:          { label: 'Lake',  color: '#5fb0d4', setup: 'Lake B (4·10)' },     // 2 embedded discs (pair)
    // River variants share their base resource colour; a wavy overlay marks the river.
    mountain_river:  { label: 'Ore',   color: '#7c8a99', setup: 'Mountains River', river: true,  baseResource: 'mountains' },
    hills_river:     { label: 'Brick', color: '#b5552e', setup: 'Hills River',     river: true,  baseResource: 'hills' },
    pasture_river:   { label: 'Sheep', color: '#86c040', setup: 'Pasture River',   river: true,  baseResource: 'pasture' },
    swamp_river:     { label: 'Swamp', color: '#5f6b3a', setup: 'Swamp River',     river: true }, // swamp = green-olive
    watering_hole:   { label: 'Watering Hole', color: '#a89668', setup: 'Watering Hole', glyph: '💧' },
    castle:          { label: 'Castle',     color: '#6c7075', setup: 'Castle',     glyph: '♜' },
    quarry:          { label: 'Quarry',     color: '#9a9aa0', setup: 'Quarry',     glyph: '◇' },
    glassworks:      { label: 'Glassworks', color: '#d49f4c', setup: 'Glassworks', glyph: '✦' },
  };

  // Lake hexes carry fixed (embedded) number discs that come with the tile itself.
  // Render as multiple small discs instead of one standard token.
  const EMBEDDED_TOKENS = {
    lake_a: [2, 3, 11, 12],
    lake_b: [4, 10],
  };

  // Port-type metadata: label, ratio, and a tint colour.
  const PORTS_META = {
    '3:1':  { label: '3:1',   ratio: '3:1', color: '#52677a' },
    wood:   { label: 'Wood',  ratio: '2:1', color: '#2f7d34' },
    brick:  { label: 'Brick', ratio: '2:1', color: '#b5552e' },
    ore:    { label: 'Ore',   ratio: '2:1', color: '#7c8a99' },
    grain:  { label: 'Grain', ratio: '2:1', color: '#d7ad3f' },
    wool:   { label: 'Wool',  ratio: '2:1', color: '#86c040' },
  };

  // The 19 hexes of the standard board = a hexagon of radius 2 in axial space.
  function hexagonCoords(radius) {
    const coords = [];
    for (let q = -radius; q <= radius; q++) {
      for (let r = -radius; r <= radius; r++) {
        if (Math.abs(q + r) <= radius) coords.push({ q, r });
      }
    }
    return coords;
  }

  // The one-hex-thick ring of water hexes framing the land board: every hex
  // adjacent to a land hex that isn't itself land. Works for any board shape.
  function waterRing(hexes) {
    const land = new Set(hexes.map((h) => hexKey(h.q, h.r)));
    const seen = new Set();
    const water = [];
    hexes.forEach((h) => {
      DIRECTIONS.forEach((d) => {
        const q = h.q + d.q, r = h.r + d.r, k = hexKey(q, r);
        if (!land.has(k) && !seen.has(k)) { seen.add(k); water.push({ q, r }); }
      });
    });
    return water;
  }

  // Base Game 3-4P — explicit hex-mapper layout (sea + main + ports). Lives
  // on the same coord plane as the Seafarers and T&B scenarios so all maps
  // can share the renderer's auto-fit viewBox.
  const BASE_BOARD_3P_LAYOUT = buildLayout({
    sea: [[-7,0],[-7,2],[-6,3],[-4,3],[-2,1],[-1,-1],[-1,-3],[-3,-3],[-5,-2]],
    port: [[-7,1],[-7,3],[-5,3],[-3,2],[-1,0],[-1,-2],[-2,-3],[-4,-3],[-6,-1]],
    regions: {
      main: [
        [-6,0],[-5,-1],[-4,-2],[-5,0],[-4,-1],[-3,-2],[-2,-2],[-2,-1],[-2,0],[-3,1],
        [-4,2],[-5,2],[-6,2],[-6,1],[-5,1],[-4,1],[-4,0],[-3,0],[-3,-1],
      ],
    },
  });
  const BASE_BOARD = {
    id: 'base-3-4',
    name: 'Base Game (3–4 players)',
    short: '3–4p',
    layout: BASE_BOARD_3P_LAYOUT,
    // 4 fields, 4 forest, 4 pasture, 3 mountains, 3 hills, 1 desert = 19.
    assignTiles: (layout) => {
      const random = layout.filter((h) => h.type === 'random'); // 19
      const pool = buildResourcePool({
        fields: 4, forest: 4, pasture: 4, mountains: 3, hills: 3, desert: 1,
      });
      const m = new Map();
      random.forEach((h, i) => m.set(hexKey(h.q, h.r), pool[i]));
      return m;
    },
    // 18 tokens for the 18 non-desert hexes. 6 and 8 are the "red" tokens.
    numberTokens: [2, 3, 3, 4, 4, 5, 5, 6, 6, 8, 8, 9, 9, 10, 10, 11, 11, 12],
    redTokens: [6, 8],
    ports: PORT_DIRS({
      "-4,-3": 1, "-6,-1": 0, "-7,1": 0, "-7,3": 5, "-5,3":  4,
      "-3,2":  4, "-1,0":  3, "-1,-2": 2, "-2,-3": 2,
    }),
    portTypes: ['3:1', '3:1', '3:1', '3:1', 'wood', 'brick', 'ore', 'grain', 'wool'],
  };

  // --- Helpers shared by the larger Phase 2 boards -------------------------

  // Smallest signed difference between two angles (radians), in (-pi, pi].
  function angleDelta(a, b) {
    let d = a - b;
    while (d > Math.PI) d -= 2 * Math.PI;
    while (d < -Math.PI) d += 2 * Math.PI;
    return d;
  }

  // The 5–6 player board: an elongated hexagon, rows 3-4-5-6-5-4-3 = 30 hexes.
  function board56Coords() {
    const coords = [];
    for (let r = -3; r <= 3; r++) {
      const qMin = Math.max(-3, -3 - r);
      const qMax = Math.min(2, 2 - r);
      for (let q = qMin; q <= qMax; q++) coords.push({ q, r });
    }
    return coords;
  }

  // Evenly distribute `count` ports around the perimeter of any hex set,
  // producing the same { q, r, dir } data shape Phase 1 wrote out by hand.
  // dir is the outward-facing neighbour direction (its hex is off-board).
  function autoPorts(hexes, count) {
    const set = new Set(hexes.map((h) => hexKey(h.q, h.r)));
    let cx = 0, cy = 0;
    hexes.forEach((h) => { const p = axialToPixel(h.q, h.r, 1); cx += p.x; cy += p.y; });
    cx /= hexes.length; cy /= hexes.length;

    // Perimeter hexes (at least one off-board neighbour), ordered clockwise.
    const perim = hexes
      .filter((h) => DIRECTIONS.some((d) => !set.has(hexKey(h.q + d.q, h.r + d.r))))
      .map((h) => {
        const p = axialToPixel(h.q, h.r, 1);
        return { q: h.q, r: h.r, ang: Math.atan2(p.y - cy, p.x - cx) };
      })
      .sort((a, b) => a.ang - b.ang);

    const ports = [];
    for (let i = 0; i < count; i++) {
      const h = perim[Math.floor((i * perim.length) / count)];
      const p = axialToPixel(h.q, h.r, 1);
      const radial = Math.atan2(p.y - cy, p.x - cx);
      // Outward edge = the off-board edge whose midpoint best matches the radial.
      let bestDir = null, best = Infinity;
      DIRECTIONS.forEach((d, di) => {
        if (set.has(hexKey(h.q + d.q, h.r + d.r))) return; // inward edge, skip
        const midAngle = (Math.PI / 180) * (60 * DIR_TO_EDGE[di]);
        const diff = Math.abs(angleDelta(midAngle, radial));
        if (diff < best) { best = diff; bestDir = di; }
      });
      ports.push({ q: h.q, r: h.r, dir: bestDir });
    }
    return ports;
  }

  // Base Game 5-6P — explicit hex-mapper layout (sea + main + ports). The
  // 30-hex elongated hexagon on the shared coord plane.
  const BASE_BOARD_56_LAYOUT = buildLayout({
    sea: [[-7,0],[-7,3],[-6,4],[-4,4],[-1,1],[0,-1],[0,-2],[0,-4],[-2,-4],[-4,-3],[-5,-2]],
    port: [[-7,1],[-7,2],[-7,4],[-5,4],[-3,3],[-2,2],[0,0],[0,-3],[-1,-4],[-3,-4],[-6,-1]],
    regions: {
      main: [
        [-6,0],[-5,-1],[-4,-2],[-3,-3],[-2,-3],[-1,-3],[-1,-2],[-1,-1],[-1,0],[-2,1],
        [-3,2],[-4,3],[-5,3],[-6,3],[-6,2],[-6,1],[-5,2],[-4,2],[-5,1],[-4,1],
        [-3,1],[-2,0],[-3,0],[-4,0],[-5,0],[-4,-1],[-3,-1],[-3,-2],[-2,-2],[-2,-1],
      ],
    },
  });
  const BOARD_56 = {
    id: 'base-5-6',
    name: 'Base Game (5–6 players)',
    short: '5–6p',

  // Build a layout from named-region coord groups. Each region's hexes are

  // `locked` is an array of explicit hex specs that bypass randomization —
  // e.g. { q, r, type: 'gold', token: 9 } or { type: 'fields', noToken: true }.
  // `fog` is shorthand for "lock these hexes as type 'fog'" (face-down).
  function buildLayout({ sea = [], port = [], desert = [], regions = {}, locked = [], fog = [] }) {
    const layout = [];
    sea.forEach(([q, r]) => layout.push({ q, r, type: 'sea' }));
    port.forEach(([q, r]) => layout.push({ q, r, type: 'sea' })); // port hexes are sea hexes
    desert.forEach(([q, r]) => layout.push({ q, r, type: 'desert' }));
    fog.forEach(([q, r]) => layout.push({ q, r, type: 'fog' }));
    for (const [region, coords] of Object.entries(regions)) {
      coords.forEach(([q, r]) => layout.push({ q, r, type: 'random', region }));
    }
    locked.forEach((h) => {
      const existingIdx = layout.findIndex((e) => e.q === h.q && e.r === h.r);
      if (h.type === null || h.type === undefined) {
        // Merge mode (Cloth for Catan): the locked entry only adds tokens to a
        // hex already declared elsewhere (e.g. a desert from the `desert` array).
        if (existingIdx >= 0) {
          if (h.token !== undefined) layout[existingIdx].token = h.token;
          if (h.token2 !== undefined) layout[existingIdx].token2 = h.token2;
          if (h.noToken !== undefined) layout[existingIdx].noToken = h.noToken;
        }
      } else {
        // Replace mode: locked spec wins over any earlier entry at this coord
        // (e.g. a 1-hex island region overridden by a locked gold tile).
        if (existingIdx >= 0) layout.splice(existingIdx, 1);
        layout.push({
          q: h.q, r: h.r, type: h.type,
          token: h.token, token2: h.token2, noToken: h.noToken,
          region: h.region, // optional: lets locked hexes join a per-region token pool
        });

    });
    return layout;

  function PORT_DIRS(map) {
    return Object.entries(map).map(([k, dir]) => {
      const [q, r] = k.split(',').map(Number);
      return { q, r, dir };

  /* =====================================================================
   *  TRADERS & BARBARIANS + FISHING ON CATAN
   * =====================================================================
   *  All 10 scenarios from the Traders & Barbarians expansion + Fishing on
   *  Catan, in the user's hex-mapper JSON shape:
   *    sea / main / inner / port — coord lists
   *    locked — fixed-coord tile placements (castles, quarries, river hexes,
   *             fishing grounds, watering holes, etc.)
   *    portDirections — explicit { dir } per port (user dir convention)
   *
   *  noToken rule (matches the rulebook tile counts):
   *    - castle / quarry / glassworks / desert / watering_hole / swamp_river
   *      never get a number disc.
   *    - mountain_river / hills_river / pasture_river DO get standard discs.
   *    - fishing_grounds get a disc from a dedicated fishing pool (region:
   *      'fishing' + tokensPerRegion.fishing).
   *    - lake_a (4) and lake_b (2) carry embedded discs baked into the tile
   *      — placed by assignTiles at a randomly chosen inner-zone hex.
   * =================================================================== */

  // Tile types that NEVER get a disc, regardless of scenario.
  const TB_NO_TOKEN_TYPES = new Set([
    'castle', 'quarry', 'glassworks', 'watering_hole', 'swamp_river',
  ]);

  // Convert a hex-mapper JSON spec to a buildLayout() call.
  function tbBuildLayout(spec, { region = {} } = {}) {
    const regions = spec.inner
      ? { main: spec.main, inner: spec.inner }
      : { main: spec.main };
    return buildLayout({
      sea: spec.sea,
      port: spec.port,
      regions,
      locked: Object.values(spec.locked).map((h) => ({
        q: h.q, r: h.r,
        type: h.tile,
        noToken: TB_NO_TOKEN_TYPES.has(h.tile) || h.tile === 'desert',
        region: region[h.tile],
      })),
    });
  }
  // Convert a portDirections map → [{q,r,dir}, ...] in the Phase D format.
  function tbPortDirs(spec) {
    return Object.entries(spec.portDirections).map(([k, v]) => {
      const [q, r] = k.split(',').map(Number);
      return { q, r, dir: v.dir };
    });
  }
  // Standard Catan port mix: 5 specific 2:1 + (count − 5) generic 3:1.
  function tbPortTypes(count) {
    const out = ['wood', 'brick', 'ore', 'grain', 'wool'];
    while (out.length < count) out.push('3:1');
    return out;
  }

  /* ---- Fishing on Catan 3-4P ----

  /* =====================================================================
   *  SECTION 3 — GENERATOR (pure functions, no React / no DOM)
   * =====================================================================
   *  generateBoard(config) -> a plain board object the UI can render.
   *  Kept entirely UI-free so the future stat tracker / other boards reuse it.
   * =================================================================== */

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Expand { fields:4, ... } into a flat shuffled array of resource keys.
  function buildResourcePool(tileCounts) {
    const pool = [];
    for (const [res, n] of Object.entries(tileCounts)) {
      for (let i = 0; i < n; i++) pool.push(res);
    }
    return shuffle(pool);
  }

  // For each hex index, the indices of its on-board, token-bearing neighbours.
  function buildAdjacency(hexes) {
    const index = new Map();
    hexes.forEach((h, i) => index.set(hexKey(h.q, h.r), i));
    return hexes.map((h) =>
      DIRECTIONS
        .map((d) => index.get(hexKey(h.q + d.q, h.r + d.r)))
        .filter((i) => i !== undefined)
    );
  }

  // Count same-resource adjacent pairs in a `pool` whose i-th entry maps to
  // `hexes[i]`. Used to score candidate resource shuffles in bestOfNPools.
  function sameResourceAdjacencyScore(pool, hexes) {
    const adj = buildAdjacency(hexes);
    let score = 0;
    hexes.forEach((_, i) => {
      adj[i].forEach((j) => {
        if (j > i && pool[i] !== undefined && pool[i] === pool[j]) score++;
      });
    });
    return score;
  }

  // Try N random shuffles of `pool` and return the one with the FEWEST
  // same-resource adjacent pairs across `hexes`. Keeps the existing
  // randomness feel but smooths out the most egregious clumps (e.g.
  // three ore hexes in a row).
  function bestOfNPools(pool, hexes, n = 20) {
    let best = shuffle(pool.slice());
    let bestScore = sameResourceAdjacencyScore(best, hexes);
    for (let i = 1; i < n; i++) {
      const candidate = shuffle(pool.slice());
      const score = sameResourceAdjacencyScore(candidate, hexes);
      if (score < bestScore) { best = candidate; bestScore = score; }
      if (bestScore === 0) break;
    }
    return best;
  }

  // ---- Desert-placement helpers (Generator Distribution Options) -----

  // Pick the N hexes from `hexes` closest to the centroid of the whole set.
  function pickCenterHexes(hexes, count) {
    if (count <= 0 || hexes.length === 0) return [];
    const cx = hexes.reduce((s, h) => s + h.q, 0) / hexes.length;
    const cr = hexes.reduce((s, h) => s + h.r, 0) / hexes.length;
    const dist = (h) => (h.q - cx) ** 2 + (h.r - cr) ** 2;
    return hexes.slice().sort((a, b) => dist(a) - dist(b)).slice(0, count);
  }
  // Pick the N hexes with the fewest neighbours in `hexes` (most coastal).
  // Ties broken randomly so the desert isn't always in the same corner.
  function pickCoastalHexes(hexes, count) {
    if (count <= 0 || hexes.length === 0) return [];
    const adj = buildAdjacency(hexes);
    const scored = shuffle(hexes.map((h, i) => ({ h, n: adj[i].length })));
    scored.sort((a, b) => a.n - b.n);
    return scored.slice(0, count).map(({ h }) => h);
  }
  // Move desert tiles into `targetHexes` by swapping resources between
  // misplaced deserts and the producers currently occupying target hexes.
  // Mutates `tiles` in place. No-op when a desert is already at a target
  // position (handled by the misplaced/wrong-resource filtering).
  function repositionDeserts(tiles, targetHexes) {
    if (!targetHexes || targetHexes.length === 0) return tiles;
    const targetKeys = new Set(targetHexes.map((h) => hexKey(h.q, h.r)));
    const misplacedDeserts = tiles.filter(
      (t) => t.resource === 'desert' && !targetKeys.has(hexKey(t.q, t.r))
    );
    const wrongResourceInTarget = tiles.filter(
      (t) => t.resource !== 'desert' && targetKeys.has(hexKey(t.q, t.r))
    );
    const swapCount = Math.min(misplacedDeserts.length, wrongResourceInTarget.length);
    for (let i = 0; i < swapCount; i++) {
      const tmp = misplacedDeserts[i].resource;
      misplacedDeserts[i].resource = wrongResourceInTarget[i].resource;
      wrongResourceInTarget[i].resource = tmp;
    }
    return tiles;
  }
  // Does this config produce randomly placed deserts (so the UI should
  // surface a desert-mode control)?
  function configHasRandomDesert(config) {
    if (!config) return false;
    if ((config.tileCounts?.desert || 0) > 0) return true;       // base game
    if ((config.randomTiles?.desert || 0) > 0) return true;       // Phase A
    // Seafarers/T&B configs use assignTiles which can put 'desert' into the
    // random pool inside the closure. Run a single dry-pass and see if any
    // 'random'-type layout entry ends up assigned 'desert'.
    if (typeof config.assignTiles === 'function' && Array.isArray(config.layout)) {
      try {
        const map = config.assignTiles(config.layout);
        for (const h of config.layout) {
          if (h.type !== 'random') continue;
          const r = map?.get?.(hexKey(h.q, h.r));
          if (r === 'desert') return true;
        }
      } catch { /* ignore — best-effort detection */ }
    }
    return false;
  }

  // Assign the token multiset to `hexes` so that no two red tokens (6/8) are
  // adjacent, plus any per-hex constraints supplied via `forbid(hex, value)`
  // (returns true if `value` is NOT allowed on `hex` — e.g. no reds on gold,
  // no low values on forest/pasture).
  //
  // Hexes with a pre-set `.lockedToken` value (Phase B+: locked small island
  // tokens, fixed-resource hexes that already carry a token) keep that value
  // and are excluded from `tokenSet`, but still participate in the adjacency
  // graph so the no-adjacent-red rule sees them.
  //
  // Fast path: rejection sampling. Guaranteed fallback: randomized backtracking.
  function placeTokens(hexes, tokenSet, redTokens, forbid, strict = false) {
    const adj = buildAdjacency(hexes);
    const isRed = (v) => redTokens.includes(v);
    // "Hot" numbers — 5/6/8/9 are the highest-probability rolls. Spreading
    // them out (not just 6/8) makes for fairer boards in playtest.
    const isHot = (v) => v === 5 || v === 6 || v === 8 || v === 9;
    const forbidFn = forbid || (() => false);

    // Separate locked positions (already have a token) from unlocked ones.
    const lockedAt = [];   // [{ idx, value }]
    const openIdx = [];    // indices to fill from tokenSet
    hexes.forEach((h, i) => {
      if (h.lockedToken !== undefined && h.lockedToken !== null) {
        lockedAt.push({ idx: i, value: h.lockedToken });
      } else {
        openIdx.push(i);
      }
    });

    const writeLocked = (assignment) => {
      lockedAt.forEach(({ idx, value }) => { assignment[idx] = value; });
    };
    // Hard constraint:
    //   balanced (default) = official rule (no two red 6/8 adjacent)
    //   strict             = no two adjacent hexes share ANY value
    // Hot-number (5/6/8/9) spreading is enforced as a SOFT preference via
    // optimizeTokenSpread below, regardless of mode.
    const valid = (assignment) =>
      assignment.every((v, i) =>
        v == null ||
        (!forbidFn(hexes[i], v) &&
         (strict
           ? adj[i].every((j) => assignment[j] == null || assignment[j] !== v)
           : (!isRed(v) || adj[i].every((j) => assignment[j] == null || !isRed(assignment[j])))))
      );

    for (let attempt = 0; attempt < 2000; attempt++) {
      const shuffled = shuffle(tokenSet);
      const assignment = new Array(hexes.length).fill(null);
      writeLocked(assignment);
      openIdx.forEach((idx, j) => { assignment[idx] = shuffled[j]; });
      if (valid(assignment)) return optimizeTokenSpread(assignment, hexes, redTokens, lockedAt, strict);
    }

    // Backtracking fallback — fills only the open positions, respecting locked
    // values in the adjacency check. Capped at MAX_STEPS so a pathologically
    // constrained scenario can never hang the UI; on cap we fall back to the
    // last-attempted shuffle (which the caller can re-attempt by regenerating).
    const tokens = shuffle(tokenSet);
    const tokIndices = tokens.map((_, i) => i); // pre-allocated once
    const used = new Array(tokens.length).fill(false);
    const assignment = new Array(hexes.length).fill(null);
    writeLocked(assignment);

    const order = shuffle(openIdx.slice());
    const MAX_STEPS = 200000;
    let steps = 0;
    let aborted = false;
    const bt = (k) => {
      if (aborted) return false;
      if (++steps > MAX_STEPS) { aborted = true; return false; }
      if (k === order.length) return true;
      const pos = order[k];
      const tokOrder = shuffle(tokIndices.slice());
      for (const ti of tokOrder) {
        if (used[ti]) continue;
        const v = tokens[ti];
        if (forbidFn(hexes[pos], v)) continue;
        if (strict) {
          if (adj[pos].some((j) => assignment[j] !== null && assignment[j] === v)) continue;
        } else if (isRed(v) && adj[pos].some((j) => assignment[j] !== null && isRed(assignment[j]))) {
          continue;
        }
        used[ti] = true;
        assignment[pos] = v;
        if (bt(k + 1)) return true;
        used[ti] = false;
        assignment[pos] = null;
      }
      return false;
    };
    if (bt(0)) return optimizeTokenSpread(assignment, hexes, redTokens, lockedAt, strict);

    // Backtracking exhausted/aborted — fill any remaining open slots from the
    // unused tokens in shuffled order. May leave a few adjacent-red pairs in
    // degenerate cases; the swap pass below will repair them when possible.
    let ti = 0;
    for (const pos of order) {
      if (assignment[pos] !== null) continue;
      while (ti < tokens.length && used[ti]) ti++;
      if (ti >= tokens.length) break;
      assignment[pos] = tokens[ti];
      used[ti] = true;
      ti++;
    }
    return optimizeTokenSpread(assignment, hexes, redTokens, lockedAt, strict);
  }

  // Greedy hill-climber that swaps two tokens whenever doing so REDUCES
  // adjacency badness. In `strict` mode any same-value adjacency counts
  // 1000x (so swaps that introduce one are rejected); otherwise the
  // red-adjacency rule counts 100x. Hot-number adjacency always counts 1x.
  // Never accepts a worsening swap, so the upstream constraint produced by
  // placeTokens is preserved (and even repaired when the fallback fill
  // left violations). Locked-token positions are off-limits.
  function optimizeTokenSpread(assignment, hexes, redTokens, lockedAt, strict = false) {
    const adj = buildAdjacency(hexes);
    const isRed = (v) => redTokens.includes(v);
    const isHot = (v) => v === 5 || v === 6 || v === 8 || v === 9;
    const lockedSet = new Set((lockedAt || []).map((l) => l.idx));
    const score = () => {
      let s = 0;
      for (let i = 0; i < assignment.length; i++) {
        const vi = assignment[i];
        if (vi == null) continue;
        for (const j of adj[i]) {
          if (j <= i) continue;
          const vj = assignment[j];
          if (vj == null) continue;
          if (strict && vi === vj) s += 1000;
          if (isRed(vi) && isRed(vj)) s += 100;
          else if (isHot(vi) && isHot(vj)) s += 1;
        }
      }
      return s;
    };
    let current = score();
    const iters = 1200;
    for (let it = 0; it < iters && current > 0; it++) {
      const i = Math.floor(Math.random() * assignment.length);
      const j = Math.floor(Math.random() * assignment.length);
      if (i === j) continue;
      if (assignment[i] == null || assignment[j] == null) continue;
      if (lockedSet.has(i) || lockedSet.has(j)) continue;
      const tmp = assignment[i];
      assignment[i] = assignment[j];
      assignment[j] = tmp;
      const next = score();
      if (next < current) {
        current = next;
      } else {
        // Revert.
        const back = assignment[i];
        assignment[i] = assignment[j];
        assignment[j] = back;
      }
    }
    return assignment;
  }

  // Assign a resource-type pool to `hexes` so that no two adjacent hexes
  // share the same resource. Hard constraint; mirrors placeTokens.
  //
  //   Fast path     — rejection sampling (400 attempts)
  //   Fallback      — randomized backtracking (max 300k steps)
  //   Last resort   — bestOfNPools (never crashes; may have a few
  //                   adjacent-same pairs for pathologically constrained
  //                   pools / tiny regions)
  //
  // Hex objects with .type set to anything other than 'random' are treated
  // as locked: they keep `.type` as their assignment and participate in the
  // adjacency check but are not part of the pool. For base game and most
  // Seafarers callers, only 'random'-type hexes are passed in.
  function placeResources(hexes, pool) {
    const adj = buildAdjacency(hexes);
    const lockedAt = [];
    const openIdx = [];
    hexes.forEach((h, i) => {
      if (h.type && h.type !== 'random') {
        lockedAt.push({ idx: i, resource: h.type });
      } else {
        openIdx.push(i);
      }
    });
    const writeLocked = (a) => {
      lockedAt.forEach(({ idx, resource }) => { a[idx] = resource; });
    };
    const valid = (a) =>
      a.every((v, i) =>
        v == null || adj[i].every((j) => a[j] == null || a[j] !== v)
      );

    // Fast path — rejection sampling.
    for (let attempt = 0; attempt < 400; attempt++) {
      const shuffled = shuffle(pool.slice());
      const a = new Array(hexes.length).fill(null);
      writeLocked(a);
      openIdx.forEach((idx, j) => { a[idx] = shuffled[j]; });
      if (valid(a)) return a;
    }

    // Backtracking fallback.
    const tokens = shuffle(pool.slice());
    const used = new Array(tokens.length).fill(false);
    const a = new Array(hexes.length).fill(null);
    writeLocked(a);
    const order = shuffle(openIdx.slice());
    const tokIdx = tokens.map((_, i) => i);
    const MAX_STEPS = 300000;
    let steps = 0;
    let aborted = false;
    const bt = (k) => {
      if (aborted) return false;
      if (++steps > MAX_STEPS) { aborted = true; return false; }
      if (k === order.length) return true;
      const pos = order[k];
      const tokOrder = shuffle(tokIdx.slice());
      for (const ti of tokOrder) {
        if (used[ti]) continue;
        const v = tokens[ti];
        if (adj[pos].some((j) => a[j] != null && a[j] === v)) continue;
        a[pos] = v;
        used[ti] = true;
        if (bt(k + 1)) return true;
        used[ti] = false;
        a[pos] = null;
      }
      return false;
    };
    if (bt(0)) return a;

    // Last resort — never hangs, may not be optimal.
    return bestOfNPools(pool, hexes);
  }

  function generateBoard(config, opts = {}) {
    // Seafarers boards carry an explicit per-hex `layout`; route them to the
    // island-aware generator. Base-game configs fall through unchanged.
    if (config.layout) return generateSeafarersBoard(config, opts);

    const tileMode   = opts.tileMode   || 'balanced';
    const tokenMode  = opts.tokenMode  || 'balanced';
    const desertMode = opts.desertMode || 'random';

    // 1. Resources -> hexes. Balanced mode enforces no-adjacent-same-resource
    // as a hard constraint via placeResources (rejection sampling +
    // backtracking, mirrors placeTokens).
    const rawPool = buildResourcePool(config.tileCounts);
    const pool = tileMode === 'random'
      ? shuffle(rawPool)
      : placeResources(config.hexes, rawPool);
    const tiles = config.hexes.map((h, i) => ({
      q: h.q,
      r: h.r,
      resource: pool[i],
      token: null,
      red: false,
    }));

    // 1b. Desert positioning (center / coast)
    const desertCount = (config.tileCounts?.desert) || 0;
    if (desertCount > 0 && desertMode !== 'random') {
      const targets = desertMode === 'center'
        ? pickCenterHexes(config.hexes, desertCount)
        : pickCoastalHexes(config.hexes, desertCount);
      repositionDeserts(tiles, targets);
    }

    // 2. Number tokens onto every non-desert hex
    const tokenHexes = tiles.filter((t) => t.resource !== 'desert');
    if (tokenMode === 'random') {
      const shuffled = shuffle(config.numberTokens.slice());
      tokenHexes.forEach((t, i) => {
        t.token = shuffled[i];
        t.red = config.redTokens.includes(shuffled[i]);
      });
    } else {
      const strict = tokenMode === 'strict';
      const tokenValues = placeTokens(tokenHexes, config.numberTokens, config.redTokens, config.forbidToken, strict);
      tokenHexes.forEach((t, i) => {
        t.token = tokenValues[i];
        t.red = config.redTokens.includes(tokenValues[i]);
      });
    }

    // 3. Ports — randomize which type lands at each fixed perimeter slot.
    const types = shuffle(config.portTypes);
    const ports = config.portPositions.map((p, i) => ({ ...landPortToSea(p), type: types[i] }));

    // 4. Water frame (deterministic from the land layout)
    const water = waterRing(config.hexes);

    return { config, tiles, ports, water };
  }

  // Seafarers generator: an explicit per-hex layout with multiple islands and
  // a sea fill. Produces the SAME { config, tiles, ports, water } shape the
  // renderer already understands — water = sea hexes, tiles = everything else
  // (land / gold / fog / desert) — so no rendering rework is needed.
  function generateSeafarersBoard(config, opts = {}) {
    const tileMode   = opts.tileMode   || 'balanced';
    const tokenMode  = opts.tokenMode  || 'balanced';
    const desertMode = opts.desertMode || 'random';

    // 1. Resources for the randomized hexes.
    const assignments = config.assignTiles ? config.assignTiles(config.layout) : null;
    let pool, pi = 0;
    if (!assignments) {
      const randomHexes = config.layout.filter((h) => h.type === 'random');
      const rawPool = buildResourcePool(config.randomTiles || {});
      pool = tileMode === 'random'
        ? shuffle(rawPool)
        : placeResources(randomHexes, rawPool);
    } else if (tileMode !== 'random') {
      // Per-region pools: enforce no-adjacent-same-resource within each
      // region independently (so an island with 5 sheep doesn't end up with
      // sheep clumped together). Skip placeResources for tiny regions where
      // the constraint may not be satisfiable.
      const byRegion = {};
      config.layout.forEach((h) => {
        if (h.type !== 'random') return;
        const r = h.region || '__none__';
        if (!byRegion[r]) byRegion[r] = [];
        byRegion[r].push(h);
      });
      Object.values(byRegion).forEach((regionHexes) => {
        const resources = regionHexes.map((h) => assignments.get(hexKey(h.q, h.r)));
        if (resources.some((x) => x === undefined) || regionHexes.length < 3) return;
        const optimized = placeResources(regionHexes, resources);
        regionHexes.forEach((h, i) => assignments.set(hexKey(h.q, h.r), optimized[i]));
      });
    }
    // tileMode === 'random' with assignTiles: assignTiles already shuffled
    // (via buildResourcePool which calls shuffle), so leave the map as-is.

    const tiles = [];
    const sea = [];
    config.layout.forEach((h) => {
      if (h.type === 'sea') { sea.push({ q: h.q, r: h.r }); return; }
      let resource;
      if (h.type === 'random') {
        resource = assignments ? assignments.get(hexKey(h.q, h.r)) : pool[pi++];
      } else {
        resource = h.type; // gold/fog/desert/fixed resource (fields/forest/...)
      }
      // assignTiles or random pools may return 'sea' — treat those as ocean.
      if (resource === 'sea') { sea.push({ q: h.q, r: h.r }); return; }
      const hasLockedToken = h.token !== undefined && h.token !== null;
      const hasToken2 = h.token2 !== undefined && h.token2 !== null;
      // Lake hexes carry an embedded multi-disc token set baked into the tile
      // itself — exclude them from standard token placement and attach the
      // fixed numbers directly.
      const embedded = EMBEDDED_TOKENS[resource];
      tiles.push({
        q: h.q, r: h.r, resource,
        region: h.region, // present on type:'random' hexes; lets per-region token placement target them
        token: hasLockedToken ? h.token : null,
        token2: hasToken2 ? h.token2 : null, // Cloth for Catan: dual-token hex (second number)
        tokens: embedded ? embedded.slice() : null, // Lakes (lake_a / lake_b): fixed embedded discs
        red: hasLockedToken && config.redTokens.includes(h.token),
        red2: hasToken2 && config.redTokens.includes(h.token2),
        lockedToken: hasLockedToken ? h.token : undefined,
        noToken: !!h.noToken || !!embedded, // lakes carry embedded tokens, not standard
      });
    });

    // 1c. Desert positioning — only deserts that came from the random pool
    // (layout type 'random' AND resource 'desert' after assignment). Locked
    // deserts (type 'desert' in layout, listed in `desert: []`) stay put.
    const randomLayoutKeys = new Set(
      config.layout.filter((h) => h.type === 'random').map((h) => hexKey(h.q, h.r))
    );
    const randomDesertTiles = tiles.filter(
      (t) => t.resource === 'desert' && randomLayoutKeys.has(hexKey(t.q, t.r))
    );
    if (randomDesertTiles.length > 0 && desertMode !== 'random') {
      // Eligible swap targets: random-pool land tiles (NOT fog, NOT lockedToken).
      const eligible = tiles.filter((t) =>
        randomLayoutKeys.has(hexKey(t.q, t.r)) &&
        t.resource !== 'fog' &&
        t.lockedToken === undefined
      );
      const targets = desertMode === 'center'
        ? pickCenterHexes(eligible, randomDesertTiles.length)
        : pickCoastalHexes(eligible, randomDesertTiles.length);
      repositionDeserts(tiles, targets);
    }

    // 2. Number tokens on every producing hex.
    const strictTokens = tokenMode === 'strict';
    const handledRegions = new Set();
    if (config.tokensPerRegion) {
      for (const [region, tokens] of Object.entries(config.tokensPerRegion)) {
        handledRegions.add(region);
        const regionHexes = tiles.filter((t) =>
          t.region === region && t.resource !== 'desert' && t.resource !== 'fog' && !t.noToken
        );
        if (regionHexes.length === 0) continue;
        if (tokenMode === 'random') {
          const shuffledTokens = shuffle(tokens.slice());
          let si = 0;
          regionHexes.forEach((t) => {
            if (t.lockedToken !== undefined) return;
            t.token = shuffledTokens[si++];
            t.red = config.redTokens.includes(t.token);
          });
        } else {
          const tokenValues = placeTokens(regionHexes, tokens, config.redTokens, config.forbidToken, strictTokens);
          regionHexes.forEach((t, i) => {
            if (t.lockedToken !== undefined) return;
            t.token = tokenValues[i];
            t.red = config.redTokens.includes(tokenValues[i]);
          });
        }
      }
    }
    if (config.numberTokens) {
      const tokenHexes = tiles.filter((t) =>
        t.resource !== 'desert' && t.resource !== 'fog' && !t.noToken &&
        !handledRegions.has(t.region) && t.token === null
      );
      if (tokenHexes.length > 0) {
        if (tokenMode === 'random') {
          const shuffledTokens = shuffle(config.numberTokens.slice());
          let si = 0;
          tokenHexes.forEach((t) => {
            if (t.lockedToken !== undefined) return;
            t.token = shuffledTokens[si++];
            t.red = config.redTokens.includes(t.token);
          });
        } else {
          const tokenValues = placeTokens(tokenHexes, config.numberTokens, config.redTokens, config.forbidToken, strictTokens);
          tokenHexes.forEach((t, i) => {
            if (t.lockedToken !== undefined) return;
            t.token = tokenValues[i];
            t.red = config.redTokens.includes(tokenValues[i]);
          });
        }
      }
    }

    // 3. Ports on sea hexes adjacent to land. Three input forms accepted:
    //    - number → autoPorts evenly distributes that many around the coast
    //    - [[q,r], ...] sea-hex coordinates → resolved to {q,r,dir} anchored
    //      on an adjacent land hex (each port faces the land it serves)
    //    - [{q,r,dir}, ...] already-resolved positions → used as-is.
    //    The renderer expects the {q,r,dir} form (q,r = the coastal LAND hex,
    //    dir = neighbour direction toward the sea hex hosting the port marker).
    const landCoords = tiles.map((t) => ({ q: t.q, r: t.r }));
    let positions;
    if (typeof config.ports === 'number') {
      // autoPorts returns land-anchored data; convert to sea+user_dir.
      positions = autoPorts(landCoords, config.ports).map(landPortToSea);
    } else {
      const landSet = new Set(tiles.map((t) => hexKey(t.q, t.r)));
      positions = config.ports.map((p) => {
        const coord = Array.isArray(p) ? { q: p[0], r: p[1] } : p;
        // Phase D: explicit {q,r,dir} (sea+user_dir) — use directly.
        if (coord.dir !== undefined) return coord;
        // Legacy fallback: resolve adjacent land then convert.
        const landP = resolveSeaPort(coord, landSet);
        return landP ? landPortToSea(landP) : null;
      }).filter(Boolean);
    }
    const types = shuffle(config.portTypes);
    const ports = positions.map((p, i) => ({ ...p, type: types[i] }));

    // SHIP ROUTES (future Seafarers phase): players build ship routes along sea
    // edges between coastal settlements. The generator would attach a
    // `shipRoutes` array here (e.g. { from:{q,r,corner}, to:{q,r,corner} }), and
    // <Board> would render a <ShipRoutes> layer for it — above the water,
    // below the ports. (See the matching note in <Board>.)

    return { config, tiles, ports, water: sea };
  }


  /* =====================================================================
   *  SECTION 4 — UI COMPONENTS (React + SVG)
   * =====================================================================
   *  Components only READ the board object produced above. All randomness
   *  and game rules live in Section 3.
   * =================================================================== */

  const HEX_SIZE = 46; // circumradius in SVG units

  // Standard Catan pip count for a number (dots under the token).
  const pipCount = (n) => 6 - Math.abs(7 - n);

  function NumberToken({ cx, cy, value, red }) {
    const r = HEX_SIZE * 0.42;
    const textColor = red ? '#c01818' : '#1b1b1b';
    const pips = pipCount(value);
    const pipR = 1.5;
    const gap = 4.5;
    const startX = cx - ((pips - 1) * gap) / 2;
    return (
      <g>
        <circle cx={cx} cy={cy} r={r} fill="#f2e6c7" stroke="#3a2f1c" strokeWidth="1" />
        <text
          x={cx}
          y={cy - 2}
          textAnchor="middle"
          dominantBaseline="central"
          fontSize={HEX_SIZE * 0.42}
          fontWeight="700"
          fill={textColor}
        >
          {value}
        </text>
        {Array.from({ length: pips }).map((_, i) => (
          <circle key={i} cx={startX + i * gap} cy={cy + r * 0.55} r={pipR} fill={textColor} />
        ))}
      </g>
    );
  }

  // Cloth for Catan: hexes that produce on either of two numbers. Numbers
  // stack vertically inside a slightly taller token area; each keeps the
  // standard red colour for 6/8 and its pip dots beneath.
  // Cloth-for-Catan dual-token hex: renders two separate side-by-side number
  // discs, each looking like a standalone Catan chit (circle + number + pips).
  // Replaces the earlier ellipse-with-divider style so dual-token hexes read
  // as "two different discs" instead of "one disc split in half".
  function DualNumberToken({ cx, cy, value, value2, red, red2 }) {
    const r = HEX_SIZE * 0.30;
    const dx = r * 1.05;   // half the center-to-center horizontal separation
    const colorA = red  ? '#c01818' : '#1b1b1b';
    const colorB = red2 ? '#c01818' : '#1b1b1b';
    const fontSize = HEX_SIZE * 0.24;
    const pipR = 1.0;
    const pipGap = 2.4;
    const pipsA = pipCount(value);
    const pipsB = pipCount(value2);
    const startXA = (cx - dx) - ((pipsA - 1) * pipGap) / 2;
    const startXB = (cx + dx) - ((pipsB - 1) * pipGap) / 2;
    const pipY = cy + r * 0.5;
    return (
      <g>
        {/* Left disc */}
        <circle cx={cx - dx} cy={cy} r={r} fill="#f2e6c7" stroke="#3a2f1c" strokeWidth="1" />
        <text x={cx - dx} y={cy - r * 0.12} textAnchor="middle" dominantBaseline="central"
          fontSize={fontSize} fontWeight="700" fill={colorA}>{value}</text>
        {Array.from({ length: pipsA }).map((_, i) => (
          <circle key={`a${i}`} cx={startXA + i * pipGap} cy={pipY} r={pipR} fill={colorA} />
        ))}
        {/* Right disc */}
        <circle cx={cx + dx} cy={cy} r={r} fill="#f2e6c7" stroke="#3a2f1c" strokeWidth="1" />
        <text x={cx + dx} y={cy - r * 0.12} textAnchor="middle" dominantBaseline="central"
          fontSize={fontSize} fontWeight="700" fill={colorB}>{value2}</text>
        {Array.from({ length: pipsB }).map((_, i) => (
          <circle key={`b${i}`} cx={startXB + i * pipGap} cy={pipY} r={pipR} fill={colorB} />
        ))}
      </g>
    );
  }

  // Multi-disc number token — renders an array of discs in a layout that
  // depends on count. Used for Fishing-on-Catan lake hexes (lake_a has 4
  // embedded discs, lake_b has 2). Each disc honours the standard red-token
  // colour rule via `reds`.
  function MultiNumberToken({ cx, cy, values, reds }) {
    if (!values || values.length === 0) return null;
    if (values.length === 1) {
      return <NumberToken cx={cx} cy={cy} value={values[0]} red={reds && reds[0]} />;
    }
    const small = HEX_SIZE * 0.24; // small disc radius
    const fontSize = HEX_SIZE * 0.22;
    // 2 discs: side-by-side. 3+ discs: 2-row grid (top row first).
    const layout2 = [
      { dx: -small * 1.2, dy: 0 },
      { dx:  small * 1.2, dy: 0 },
    ];
    const layout4 = [
      { dx: -small * 1.2, dy: -small * 1.2 },
      { dx:  small * 1.2, dy: -small * 1.2 },
      { dx: -small * 1.2, dy:  small * 1.2 },
      { dx:  small * 1.2, dy:  small * 1.2 },
    ];
    const layout = values.length === 2 ? layout2 : layout4;
    return (
      <g>
        {values.map((v, i) => {
          const pos = layout[i] || { dx: 0, dy: 0 };
          const red = !!(reds && reds[i]);
          const color = red ? '#c01818' : '#1b1b1b';
          return (
            <g key={i}>
              <circle cx={cx + pos.dx} cy={cy + pos.dy} r={small}
                fill="#f2e6c7" stroke="#3a2f1c" strokeWidth="1" />
              <text x={cx + pos.dx} y={cy + pos.dy} textAnchor="middle" dominantBaseline="central"
                fontSize={fontSize} fontWeight="700" fill={color}>{v}</text>
            </g>
          );
        })}
      </g>
    );
  }

  // Wavy river path drawn across a hex from one side to the opposite side.
  // Used for `_river` tile variants in Rivers of Catan.
  function riverPath(cx, cy, size) {
    // Span from the west corner to the east corner (corners 3 and 0).
    const c3 = hexCorner(cx, cy, size, 3);
    const c0 = hexCorner(cx, cy, size, 0);
    const dx = c0.x - c3.x;
    const my = (c3.y + c0.y) / 2;
    const amp = size * 0.18;
    // Cubic-like wavy curve through 4 control points.
    return [
      `M ${c3.x} ${my}`,
      `C ${c3.x + dx * 0.25} ${my - amp},`,
      `  ${c3.x + dx * 0.25} ${my + amp},`,
      `  ${c3.x + dx * 0.5} ${my}`,
      `C ${c3.x + dx * 0.75} ${my - amp},`,
      `  ${c3.x + dx * 0.75} ${my + amp},`,
      `  ${c0.x} ${my}`,
    ].join(' ');
  }

  function Hex({ tile }) {
    const meta = RESOURCES[tile.resource];
    const { x, y } = axialToPixel(tile.q, tile.r, HEX_SIZE);

    // Fog hex (Seafarers): rendered face-down — hidden terrain shown as a
    // tile back with a "?" until it's revealed during play.
    if (tile.resource === 'fog') {
      return (
        <g>
          <polygon points={hexPolygonPoints(x, y, HEX_SIZE)} fill={meta.color}
            stroke="#9ca3af" strokeWidth="1.5" strokeDasharray="4 3" strokeLinejoin="round" />
          <text x={x} y={y} textAnchor="middle" dominantBaseline="central"
            fontSize={HEX_SIZE * 0.7} fontWeight="700" fill="#d1d5db">?</text>
          <title>Fog tile — revealed when a road or ship reaches an adjacent intersection</title>
        </g>
      );
    }

    return (
      <g>
        <polygon
          points={hexPolygonPoints(x, y, HEX_SIZE)}
          fill={meta.color}
          stroke="#0c1116"
          strokeWidth="2"
          strokeLinejoin="round"
        />
        {/* River overlay for *_river tile variants. */}
        {meta.river && (
          <path d={riverPath(x, y, HEX_SIZE)} fill="none"
            stroke="#7fc4ec" strokeWidth="3" strokeLinecap="round" opacity="0.85" />
        )}
        <text
          x={x}
          y={y - HEX_SIZE * 0.6}
          textAnchor="middle"
          dominantBaseline="central"
          fontSize="11"
          fontWeight="600"
          fill="rgba(0,0,0,0.62)"
        >
          {meta.label}
        </text>
        {/* Gold field: star marks "produces any resource". */}
        {tile.resource === 'gold' && (
          <text x={x} y={y - HEX_SIZE * 0.32} textAnchor="middle" dominantBaseline="central"
            fontSize="13" fill="rgba(0,0,0,0.6)">★</text>
        )}
        {/* Fishing grounds: small fish glyph above the token. */}
        {tile.resource === 'fishing_grounds' && (
          <text x={x} y={y - HEX_SIZE * 0.3} textAnchor="middle" dominantBaseline="central"
            fontSize="16" fill="rgba(255,255,255,0.85)">🐟</text>
        )}
        {/* Special-tile glyph (castle / quarry / glassworks / watering hole). */}
        {meta.glyph && (
          <text x={x} y={y + HEX_SIZE * 0.05} textAnchor="middle" dominantBaseline="central"
            fontSize={HEX_SIZE * 0.6} fill="rgba(0,0,0,0.7)">{meta.glyph}</text>
        )}
        {/* Lake: render embedded multi-disc tokens (lake_a = 4 discs, lake_b = 2). */}
        {tile.tokens && tile.tokens.length > 0 ? (
          <MultiNumberToken cx={x} cy={y + HEX_SIZE * 0.05}
            values={tile.tokens}
            reds={tile.tokens.map((v) => v === 6 || v === 8)} />
        ) : tile.token !== null && tile.token2 !== null && tile.token2 !== undefined ? (
          <DualNumberToken cx={x} cy={y + HEX_SIZE * 0.05}
            value={tile.token} value2={tile.token2} red={tile.red} red2={tile.red2} />
        ) : tile.token !== null ? (
          <NumberToken cx={x} cy={y + HEX_SIZE * 0.05} value={tile.token} red={tile.red} />
        ) : null}
      </g>
    );
  }

  // Port direction convention (user spec, Phase D):
  //   port.{q,r} = the SEA hex hosting the port marker
  //   port.dir   = direction (0..5) from sea center toward the adjacent land:
  //                0=E  1=SE  2=SW  3=W  4=NW  5=NE   (60° per step)
  // The wedge points toward the land hex; docks run from the marker to the two
  // corners of that edge. No adjacent-land auto-detection — data drives this.
  function Port({ port }) {
    const meta = PORTS_META[port.type];
    if (port.dir === undefined || port.dir === null) {
      console.warn('Port missing direction at', port.q, port.r); // data error per spec
      return null;
    }
    const { x: cx, y: cy } = axialToPixel(port.q, port.r, HEX_SIZE);

    // The edge in `dir` direction is bounded by hex corners (dir) and (dir+1).
    const cA = hexCorner(cx, cy, HEX_SIZE, port.dir);
    const cB = hexCorner(cx, cy, HEX_SIZE, (port.dir + 1) % 6);

    // Marker sits slightly offset from the sea center toward the land edge.
    const angle = port.dir * (Math.PI / 3);
    const markerOffset = HEX_SIZE * 0.18;
    const mx = cx + Math.cos(angle) * markerOffset;
    const my = cy + Math.sin(angle) * markerOffset;
    const rad = HEX_SIZE * 0.42;

    return (
      <g>
        <line x1={mx} y1={my} x2={cA.x} y2={cA.y} stroke="#c9a35b" strokeWidth="2.5" strokeLinecap="round" />
        <line x1={mx} y1={my} x2={cB.x} y2={cB.y} stroke="#c9a35b" strokeWidth="2.5" strokeLinecap="round" />
        <circle cx={mx} cy={my} r={rad} fill={meta.color} stroke="#0c1116" strokeWidth="2" />
        {port.type === '3:1' ? (
          <text x={mx} y={my} textAnchor="middle" dominantBaseline="central"
            fontSize="13" fontWeight="700" fill="#f7f7f7">
            3:1
          </text>
        ) : (
          <g>
            <text x={mx} y={my - 4} textAnchor="middle" dominantBaseline="central"
              fontSize="11" fontWeight="700" fill="#f7f7f7">
              {meta.label}
            </text>
            <text x={mx} y={my + 8} textAnchor="middle" dominantBaseline="central"
              fontSize="10" fontWeight="700" fill="#f7f7f7">
              2:1
            </text>
          </g>
        )}
      </g>
    );
  }

  function WaterHex({ hex }) {
    const { x, y } = axialToPixel(hex.q, hex.r, HEX_SIZE);
    return (
      <polygon
        points={hexPolygonPoints(x, y, HEX_SIZE)}
        fill={RESOURCES.water.color}
        stroke="#0c1116"
        strokeWidth="2"
        strokeLinejoin="round"
      />
    );
  }

  function Board({ board }) {
    // Fit the viewBox to the water frame (the outermost layer) plus a margin
    // for the hex corners. Ports sit on the water ring, so they're covered too.
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    [...board.water, ...board.tiles].forEach((h) => {
      const { x, y } = axialToPixel(h.q, h.r, HEX_SIZE);
      minX = Math.min(minX, x); maxX = Math.max(maxX, x);
      minY = Math.min(minY, y); maxY = Math.max(maxY, y);
    });
    const pad = HEX_SIZE * 1.2;
    const vbX = minX - pad;
    const vbY = minY - pad;
    const vbW = (maxX - minX) + pad * 2;
    const vbH = (maxY - minY) + pad * 2;

    return (
      <svg viewBox={`${vbX} ${vbY} ${vbW} ${vbH}`} role="img" aria-label="Catan board">
        {board.water.map((w) => <WaterHex key={hexKey(w.q, w.r)} hex={w} />)}
        {/* SHIP ROUTES (future Seafarers phase) render HERE — above the water
            and below the land/ports — e.g. {board.shipRoutes?.map(...)}. */}
        {board.tiles.map((t) => <Hex key={hexKey(t.q, t.r)} tile={t} />)}
        {board.ports.map((p, i) => <Port key={i} port={p} />)}
      </svg>
    );
  }

  /* =====================================================================
   *  BOARD PICKER — interactive board for placing pieces / moving the robber
   * =====================================================================
   *  Reuses the Board's layout but overlays clickable elements:
   *    mode='vertex' — clickable circles at every hex corner (settlement/city)
   *    mode='edge'   — clickable line segments along every hex edge (road)
   *    mode='hex'    — clickable polygons over every land hex (robber)
   *
   *  Vertex and edge keys are stable identifiers built from the SORTED list
   *  of touching hexKeys so the same vertex/edge always produces the same
   *  string regardless of which neighbouring hex we walked through.
   * =================================================================== */

  // Canonical vertex key from a list of touching hexKeys.
  function vertexKeyFrom(hexKeys) {
    return hexKeys.slice().sort().join('|');
  }
  function edgeKeyFrom(hexKeys) {
    return hexKeys.slice().sort().join('|');
  }

  // Build vertex / edge indices for a board. Vertices and edges are deduped
  // by their rounded pixel position so each shared element appears once.
  // For corner k of a pointy-top hex, the two NEIGHBOUR hex offsets that
  // share that corner (along with the hex itself). Indexed by k=0..5.
  const CORNER_NEIGHBOR_DIRS = [
    [0, 1], // corner 0 (upper-right): E + NE neighbours
    [0, 5], // corner 1 (lower-right): E + SE
    [4, 5], // corner 2 (bottom):      SW + SE
    [3, 4], // corner 3 (lower-left):  W + SW
    [2, 3], // corner 4 (upper-left):  NW + W
    [1, 2], // corner 5 (top):         NE + NW
  ];
  // Edge k of pointy-top hex (between corners k and k+1) is shared with this
  // neighbour direction.
  const EDGE_NEIGHBOR_DIR = [0, 5, 4, 3, 2, 1]; // E, SE, SW, W, NW, NE

  // Structural vertex / edge indices — key off hex coords + corner/edge
  // index so floating-point error in pixel math can never split a shared
  // vertex/edge into two.
  //
  // The dedup `key` is the SORTED list of ALL 3 (vertex) or 2 (edge) hex
  // coords meeting there, INCLUDING any that are off the board. This lets
  // boundary vertices/edges (where one or more neighbours sit in the water)
  // stay unique. `hexKeys` is filtered to land-only for resource math.
  function buildVertexIndex(tiles) {
    const landSet = new Set(tiles.map((t) => hexKey(t.q, t.r)));
    const seen = new Set();
    const out = [];
    tiles.forEach((t) => {
      const { x: cx, y: cy } = axialToPixel(t.q, t.r, HEX_SIZE);
      for (let k = 0; k < 6; k++) {
        const dirs = CORNER_NEIGHBOR_DIRS[k];
        const allKeys = [hexKey(t.q, t.r)];
        dirs.forEach((di) => {
          const d = DIRECTIONS[di];
          allKeys.push(hexKey(t.q + d.q, t.r + d.r));
        });
        const sorted = allKeys.slice().sort();
        const key = sorted.join('|');
        if (seen.has(key)) continue;
        seen.add(key);
